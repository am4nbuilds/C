<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Match</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

<style>

body{
background:#0b1020;
font-family:Inter,system-ui;
color:white;
margin:0;
padding:20px;
}

.match-card{

background:#1f2340;
border-radius:16px;
padding:16px;
margin-bottom:20px;

}

.match-title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

.match-info{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:14px;
}

.join-btn{

width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#3f3ef2;
color:white;
font-weight:700;
font-size:16px;
cursor:pointer;

}

.join-btn:disabled{
opacity:.6;
cursor:not-allowed;
}

.input-box{

width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:12px;
background:#111827;
color:white;

}

.error{
color:#ef4444;
margin-top:10px;
font-size:14px;
}

.success{
color:#10b981;
margin-top:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="match-card">

<div class="match-title" id="matchName">Loading...</div>

<div class="match-info">
<span>Entry</span>
<span id="entryFee">₹0</span>
</div>

<div class="match-info">
<span>Prize Pool</span>
<span id="prizePool">₹0</span>
</div>

<div class="match-info">
<span>Slots</span>
<span id="slots">0</span>
</div>

<input 
type="text"
id="ign"
class="input-box"
placeholder="Enter your in-game name"
/>

<button
id="joinBtn"
class="join-btn"
onclick="joinMatch()"
>
Join Match
</button>

<div id="msg"></div>

</div>

<script>

/* =========================
FIREBASE CONFIG
========================= */

const FIREBASE_CONFIG = {
                apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
                authDomain: "eliteprosofficial.firebaseapp.com",
                databaseURL: "https://eliteprosofficial-default-rtdb.firebaseio.com", // kept but unused
                projectId: "eliteprosofficial",
                storageBucket: "eliteprosofficial.firebasestorage.app",
                messagingSenderId: "646561207100",
                appId: "1:646561207100:web:47de7b648695367e208439"
            };

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

/* =========================
CONFIG
========================= */

const API_BASE="https://elitepros-backend.onrender.com";

/* =========================
GET MATCH ID FROM URL
========================= */

const urlParams=new URLSearchParams(window.location.search);
const matchId=urlParams.get("matchId");

/* =========================
LOAD MATCH DATA
========================= */

async function loadMatch(){

const user=auth.currentUser;

if(!user){
location.href="login.html";
return;
}

const token=await user.getIdToken();

const res=await fetch(`${API_BASE}/api/match/${matchId}`,{
headers:{
Authorization:`Bearer ${token}`
}
});

const data=await res.json();

document.getElementById("matchName").innerText=data.name;
document.getElementById("entryFee").innerText=`₹${data.entryFee}`;
document.getElementById("prizePool").innerText=`₹${data.prizePool}`;
document.getElementById("slots").innerText=`${data.joinedCount}/${data.slots}`;

}

/* =========================
JOIN MATCH
========================= */

let joining=false;

async function joinMatch(){

if(joining) return;

const ign=document.getElementById("ign").value.trim();

if(!ign){
showMsg("Enter IGN","error");
return;
}

const btn=document.getElementById("joinBtn");

btn.disabled=true;
btn.innerText="Joining...";
joining=true;

try{

const user=auth.currentUser;

const token=await user.getIdToken();

const res=await fetch(`${API_BASE}/join-match`,{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:`Bearer ${token}`
},

body:JSON.stringify({
matchId:matchId,
ign:ign
})

});

const data=await res.json();

if(data.status==="SUCCESS"){

showMsg("Match Joined Successfully","success");

btn.innerText="Joined";

return;

}

if(data.error==="MATCH_FULL")
showMsg("Match is full","error");

else if(data.error==="INSUFFICIENT_BALANCE")
showMsg("Insufficient balance","error");

else if(data.error==="MATCH_NOT_FOUND")
showMsg("Match not found","error");

else
showMsg("Join failed","error");

btn.disabled=false;
btn.innerText="Join Match";
joining=false;

}catch(e){

showMsg("Network error","error");

btn.disabled=false;
btn.innerText="Join Match";
joining=false;

}

}

/* =========================
MESSAGE
========================= */

function showMsg(text,type){

const msg=document.getElementById("msg");

msg.className=type;

msg.innerText=text;

}

/* =========================
AUTH STATE
========================= */

auth.onAuthStateChanged(user=>{

if(user){

loadMatch();

}else{

location.href="login.html";

}

});

</script>

</body>
</html>
