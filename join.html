<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Join Match – ElitePros</title>

    <!-- Firebase (only auth compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <!-- NO database script -->

    <!-- Tailwind + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0b1020;
            --card-bg: #1f2340;
            --card-dark: #121322;
            --accent: #3f3ef2;
            --muted: #9aa3b2;
            --deposit: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-bottom: 24px;
        }

        /* header like wallet */
        .header-bar {
            background: var(--card-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        .centered-logo-inline-container {
            display: flex;
            align-items: center;
            gap: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .app-logo-header {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(99,102,241,0.5);
        }

        .centered-logo-inline-label {
            font-weight: 800;
            font-size: 18px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        /* ---------- tournament card exact match (from tournaments.html) ---------- */
        .tournament-card { 
            border-radius: 16px; 
            overflow: hidden; 
            background: linear-gradient(135deg, #1f2340 0%, #121322 100%); 
            border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 8px 30px rgba(2,6,23,0.7); 
            margin: 16px 16px; 
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .banner-container { 
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #0b1020;
        }
        .banner-container img { 
            width: 100%; 
            height: 100%; 
            display: block; 
            object-fit: cover;
            object-position: center;
        }

        /* status badge removed (no OPEN tag) */

        .details { 
            background: var(--card-bg); 
            padding: 18px;
            border-top-left-radius: 16px; 
            border-top-right-radius: 16px; 
            position: relative;
            margin-top: -16px;
            border: 1px solid rgba(255,255,255,0.08);
            border-bottom: none;
        }
        
        .org-icon { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            background: #0b1226; 
            border: 2px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        
        .org-icon img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .title-row { 
            display: flex; 
            gap: 12px; 
            align-items: flex-start; 
            margin-bottom: 14px;
        }
        
        .title-left { flex: 1; }
        .title-h { font-size: 16px; font-weight: 800; color: #ffffff; line-height: 1.2; margin-bottom: 6px; }
        
        .match-info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .match-id {
            color: #a5b4fc;
            font-weight: 600;
            font-size: 12px;
            background: rgba(165, 180, 252, 0.1);
            padding: 3px 8px;
            border-radius: 6px;
        }

        .schedule-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #e5e7eb;
            font-size: 12px;
            font-weight: 600;
        }
        .schedule-icon { color: #f59e0b; }

        /* STAT GRID - exact match */
        .stat-grid { 
            display: grid; 
            grid-template-columns: repeat(3,1fr); 
            gap: 12px; 
            margin: 16px 0;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 70px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 8px 4px;
        }
        
        .stat .label { 
            font-size: 10px; 
            color: var(--muted); 
            text-transform: uppercase; 
            font-weight: 600; 
            margin-bottom: 6px;
        }
        
        .stat .val { 
            font-weight: 800; 
            color: white; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            font-size: 14px;
        }

        /* SMALL GRID (4 columns: MAP, TYPE, PLATFORM) — removed TIME cell */
        .small-grid { 
            display: grid; 
            grid-template-columns: repeat(3,1fr); 
            gap: 12px; 
            margin: 14px 0;
        }
        
        .small-grid > div {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 60px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            padding: 6px 2px;
        }
        
        .small-grid .slabel { 
            font-size: 10px; 
            color: var(--muted); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 4px; 
            text-transform: uppercase; 
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .small-grid .sval { 
            font-weight: 700; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            font-size: 13px;
        }

        /* Wallet mini card */
        .wallet-mini-card {
            background: linear-gradient(135deg, #1f2340, #121322);
            border-radius: 20px;
            padding: 20px;
            margin: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, #1f2340, #121322) padding-box,
                        linear-gradient(135deg, #3f3ef2, #6366f1, #8b5cf6) border-box;
            animation: borderGlow 3s infinite;
        }

        @keyframes borderGlow {
            0% { border-color: rgba(63,62,242,0.3); }
            50% { border-color: rgba(99,102,241,0.8); }
            100% { border-color: rgba(63,62,242,0.3); }
        }

        .wallet-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #3f3ef2, #06b6d4);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            color: white;
        }

        .balance-info .label {
            font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px;
        }

        .balance-info .amount {
            font-size: 26px; font-weight: 800; color: white; margin-top: 4px;
        }

        /* IGN input */
        .input-card {
            margin: 16px;
        }

        .input-card label {
            font-size: 12px; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 8px; margin-left: 4px;
        }

        .input-card input {
            width: 100%; padding: 16px; background: #0b1226; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; color: white; font-size: 16px; outline: none;
            transition: 0.2s;
        }

        .input-card input:focus {
            border-color: #3f3ef2; box-shadow: 0 0 0 3px rgba(63,62,242,0.3);
        }
        /* validation message */
        .validation-msg {
            color: #f87171;
            font-size: 12px;
            margin-top: 6px;
            margin-left: 8px;
        }

        .join-btn {
            display: block; width: calc(100% - 32px); margin: 24px 16px; padding: 18px 0;
            border: none; border-radius: 18px; font-weight: 800; font-size: 16px;
            background: linear-gradient(90deg, #10b981, #06b6d4);
            box-shadow: 0 12px 30px rgba(6,182,212,0.3);
            color: white; cursor: pointer; transition: 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .join-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 18px 35px rgba(6,182,212,0.4); }
        .join-btn:active:not(:disabled) { transform: translateY(0); }
        .join-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .join-btn.success { background: linear-gradient(90deg,#10b981,#059669); box-shadow: 0 8px 20px rgba(16,185,129,0.3); }
        .join-btn.warning { background: linear-gradient(90deg,#f59e0b,#d97706); box-shadow: 0 8px 20px rgba(245,158,11,0.3); }
        .join-btn.error { background: linear-gradient(90deg,#ef4444,#dc2626); box-shadow: 0 8px 20px rgba(239,68,68,0.3); }

        /* modal (unchanged) */
        .modal-bg {
            position: fixed; inset:0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }

        .modal-card {
            background: linear-gradient(135deg,#1f2340,#121322); padding: 32px 24px; border-radius: 28px;
            max-width: 360px; width: 90%; text-align: center; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .modal-icon {
            width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center; font-size: 36px;
        }

        .modal-icon.success { background: linear-gradient(135deg,#10b981,#06b6d4); }
        .modal-icon.error { background: linear-gradient(135deg,#ef4444,#dc2626); }
        .modal-icon.warning { background: linear-gradient(135deg,#f59e0b,#d97706); }

        .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
        .modal-message { color: #cbd5e1; margin-bottom: 28px; font-size: 15px; }

        .modal-button {
            background: linear-gradient(90deg,#3f3ef2,#06b6d4); border: none; color: white;
            padding: 14px 0; width: 100%; border-radius: 40px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px rgba(6,182,212,0.2); transition: 0.2s;
            margin-bottom: 10px;
        }
        .modal-button.secondary {
            background: transparent; border: 1px solid #3f3ef2; color: #a5b4fc; box-shadow: none;
        }
        .modal-button:hover { transform: scale(1.02); }

        .button-group {
            display: flex; gap: 10px; flex-direction: column;
        }

        /* ----- SIMPLE GREY SHIMMER SKELETON (no gradient colors) ----- */
        .skeleton-shimmer {
            background: #2a2f4b;  /* solid dark base */
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }
        .skeleton-shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.02) 0%, 
                rgba(255,255,255,0.08) 20%, 
                rgba(255,255,255,0.02) 40%,
                rgba(255,255,255,0.02) 100%);
            background-size: 200% 100%;
            animation: simpleShimmer 1.8s infinite;
            border-radius: 8px;
        }

        @keyframes simpleShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* banner skeleton */
        .skeleton-banner {
            width: 100%;
            height: 200px;
            background: #1e2436;
        }

        /* inline skeleton for text */
        .skeleton-text {
            display: inline-block;
            height: 1em;
            width: 80px;
            background: #2a2f4b;
            border-radius: 4px;
            vertical-align: middle;
        }
        .skeleton-text-small {
            width: 50px;
            height: 0.9em;
        }
        .skeleton-text-large {
            width: 120px;
            height: 1.2em;
        }
        /* hide skeleton after load */
        .hide-skeleton .skeleton-shimmer,
        .hide-skeleton .skeleton-banner,
        .hide-skeleton .skeleton-text {
            display: none !important;
        }

        .hidden { display: none; }

        /* room details chip */
        .match-id-chip {
            color: #a5b4fc;
            font-weight: 600;
            font-size: 11px;
            background: rgba(165, 180, 252, 0.1);
            padding: 2px 6px;
            border-radius: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- header -->
    <div class="header-bar">
        <button class="back-btn" id="backBtn"><i class="fa fa-arrow-left"></i></button>
        <div class="centered-logo-inline-container">
            <div class="app-logo-header">
                <img src="/logo.png" alt="ElitePros" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">
            </div>
            <div class="centered-logo-inline-label">Join Match</div>
        </div>
        <div style="width:44px;"></div>
    </div>

    <!-- main content (always visible structure, with skeleton placeholders inside values) -->
    <div id="mainContent">
        <!-- tournament card exactly like tournaments.html -->
        <div class="tournament-card">
            <!-- banner container with skeleton -->
            <div class="banner-container" id="bannerWrapper">
                <img id="matchBanner" src="" alt="tournament banner" style="display:none;" onerror="this.src='https://via.placeholder.com/720x1680?text=No+Banner';" />
            </div>
            <div class="details">
                <div class="title-row">
                    <div class="org-icon"><img src="https://i.ibb.co/Y7SksQy9/IMG-20250830-082315-071.jpg" alt="org" onerror="this.src='https://via.placeholder.com/50';" /></div>
                    <div class="title-left">
                        <div class="title-h" id="matchName">-</div>
                        <!-- match info row: ID + time (exactly like tournaments) -->
                        <div class="match-info-row">
                            <div class="match-id" id="matchIdContainer">
                                ID: <span id="matchIdValue"><span class="skeleton-text skeleton-shimmer"></span></span>
                            </div>
                            <div class="schedule-box">
                                <i class="fa-solid fa-clock schedule-icon"></i>
                                <div id="matchTimeValue"><span class="skeleton-text skeleton-shimmer"></span></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- STAT GRID: prize, kill, entry -->
                <div class="stat-grid">
                    <div class="stat"><div class="label"><i class="fa-solid fa-trophy text-yellow-400 mr-1"></i>PRIZE POOL</div><div class="val" id="prizePoolValue"><span class="skeleton-text skeleton-shimmer"></span></div></div>
                    <div class="stat"><div class="label"><i class="fa-solid fa-skull text-red-400 mr-1"></i>PER KILL</div><div class="val" id="perKillValue"><span class="skeleton-text skeleton-shimmer"></span></div></div>
                    <div class="stat"><div class="label"><i class="fa-solid fa-coins text-yellow-400 mr-1"></i>ENTRY FEE</div><div class="val" id="entryFeeValue"><span class="skeleton-text skeleton-shimmer"></span></div></div>
                </div>

                <!-- SMALL GRID (3 columns: map, type, platform) — time removed -->
                <div class="small-grid">
                    <div>
                        <div class="slabel"><i class="fa-solid fa-map"></i> MAP</div>
                        <div class="sval" id="mapValue"><span class="skeleton-text skeleton-shimmer"></span></div>
                    </div>
                    <div>
                        <div class="slabel"><i class="fa-solid fa-users"></i> TYPE</div>
                        <div class="sval" id="typeValue"><span class="skeleton-text skeleton-shimmer"></span></div>
                    </div>
                    <div>
                        <div class="slabel"><i class="fa-solid fa-gamepad"></i> PLATFORM</div>
                        <div class="sval" id="platformValue"><span class="skeleton-text skeleton-shimmer"></span></div>
                    </div>
                </div>

                <!-- room details (hidden initially) -->
                <div id="roomDetails" class="mt-4 p-3 bg-blue-600/20 rounded-xl border border-blue-500/30 hidden">
                    <div class="text-xs text-blue-300 mb-1">ROOM DETAILS</div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><span class="text-gray-400">ID:</span> <span class="font-mono" id="roomId">-</span></div>
                        <div><span class="text-gray-400">PASS:</span> <span class="font-mono" id="roomPass">-</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- wallet mini card (static) -->
        <div class="wallet-mini-card">
            <div class="wallet-icon"><i class="fa-solid fa-wallet"></i></div>
            <div class="balance-info">
                <div class="label">Total Balance</div>
                <div class="amount" id="totalBalance">₹0.00</div>
            </div>
        </div>

        <!-- IGN input with validation -->
        <div class="input-card">
            <label><i class="fa-regular fa-id-card mr-2"></i> IN-GAME NAME (IGN)</label>
            <input type="text" id="ignInput" placeholder="Enter your IGN" 
                   minlength="1" maxlength="15" pattern="[A-Za-z0-9 ]+" 
                   autocomplete="off" />
            <div class="validation-msg hidden" id="ignValidation">Only letters, numbers and spaces allowed (1-15 chars)</div>
        </div>

        <!-- join button (dynamic) -->
        <button class="join-btn" id="joinBtn" disabled><i class="fa-solid fa-circle-notch fa-spin"></i> LOADING...</button>
    </div>

    <!-- full-screen modal (unchanged) -->
    <div class="modal-bg" id="statusModal">
        <div class="modal-card">
            <div class="modal-icon success" id="modalIcon"><i class="fa-solid fa-circle-check"></i></div>
            <div class="modal-title" id="modalTitle">Success</div>
            <div class="modal-message" id="modalMessage">You have joined the match</div>
            <div class="button-group" id="modalButtonGroup">
                <button class="modal-button" id="modalPrimaryBtn">CONTINUE</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- CONFIG (identical, untouched) ----------
            const FIREBASE_CONFIG = {
                apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
                authDomain: "eliteprosofficial.firebaseapp.com",
                databaseURL: "https://eliteprosofficial-default-rtdb.firebaseio.com",
                projectId: "eliteprosofficial",
                storageBucket: "eliteprosofficial.firebasestorage.app",
                messagingSenderId: "646561207100",
                appId: "1:646561207100:web:47de7b648695367e208439"
            };
            firebase.initializeApp(FIREBASE_CONFIG);
            const auth = firebase.auth();

            const BACKEND_URL = "https://elitepros-backend.onrender.com";
            const JOIN_ENDPOINT = `${BACKEND_URL}/join-match`;
            const MATCH_DETAILS_ENDPOINT = (mid) => `${BACKEND_URL}/api/match/${mid}`;
            const WALLET_SUMMARY_ENDPOINT = `${BACKEND_URL}/api/wallet`;

            // ---------- URL PARAMS ----------
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('matchId');
            const redirectUrl = urlParams.get('redirect') || 'tournaments.html';
            if (!matchId) {
                alert('Match ID missing');
                window.location.href = 'tournaments.html';
            }

            // ---------- GLOBALS ----------
            let currentUser = null;
            let currentMatch = null;
            let joinStatus = 'idle';
            let userBalance = 0;
            let joinedCount = 0;

            // DOM elements
            const mainContent = document.getElementById('mainContent');
            const backBtn = document.getElementById('backBtn');
            const joinBtn = document.getElementById('joinBtn');
            const ignInput = document.getElementById('ignInput');
            const ignValidation = document.getElementById('ignValidation');
            const modal = document.getElementById('statusModal');
            const modalIconDiv = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const modalButtonGroup = document.getElementById('modalButtonGroup');
            const roomDetails = document.getElementById('roomDetails');

            // banner
            const matchBanner = document.getElementById('matchBanner');
            const bannerWrapper = document.getElementById('bannerWrapper');

            // text fields
            const matchIdValue = document.getElementById('matchIdValue');
            const matchTimeValue = document.getElementById('matchTimeValue');
            const matchName = document.getElementById('matchName');
            const prizePoolValue = document.getElementById('prizePoolValue');
            const perKillValue = document.getElementById('perKillValue');
            const entryFeeValue = document.getElementById('entryFeeValue');
            const mapValue = document.getElementById('mapValue');
            const typeValue = document.getElementById('typeValue');
            const platformValue = document.getElementById('platformValue');
            const totalBalanceSpan = document.getElementById('totalBalance');

            // Helper: remove skeletons from dynamic fields (just clear inner html, will be replaced)
            function clearSkeletons() {
                // replace skeleton spans with empty, then fill with actual data
                matchIdValue.innerHTML = ''; 
                matchTimeValue.innerHTML = '';
                prizePoolValue.innerHTML = '';
                perKillValue.innerHTML = '';
                entryFeeValue.innerHTML = '';
                mapValue.innerHTML = '';
                typeValue.innerHTML = '';
                platformValue.innerHTML = '';
                // banner: hide skeleton by showing image
                matchBanner.style.display = 'block';
                // remove any artificial skeleton background (banner bg is already dark)
            }

            // showModal unchanged
            function showModal(type, title, msg, buttons = [{ text: 'OK', action: 'close' }]) {
                modalIconDiv.className = 'modal-icon ' + type;
                let icon = 'fa-circle-check';
                if (type === 'error') icon = 'fa-circle-exclamation';
                if (type === 'warning') icon = 'fa-triangle-exclamation';
                modalIconDiv.innerHTML = `<i class="fa-solid ${icon}"></i>`;
                modalTitle.innerText = title;
                modalMessage.innerText = msg;

                modalButtonGroup.innerHTML = '';
                buttons.forEach(btn => {
                    const button = document.createElement('button');
                    button.className = btn.className || 'modal-button';
                    if (btn.secondary) button.classList.add('secondary');
                    button.innerText = btn.text;
                    button.onclick = (e) => {
                        modal.style.display = 'none';
                        if (btn.action === 'redirect' && btn.url) window.location.href = btn.url;
                        else if (btn.action === 'back') window.history.back();
                        else if (btn.action === 'close') { }
                        else if (typeof btn.action === 'function') btn.action();
                    };
                    modalButtonGroup.appendChild(button);
                });

                modal.style.display = 'flex';
            }

            function formatDateTime(timestamp) {
                if (!timestamp) return 'N/A';
                const date = new Date(timestamp);
                return date.toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', hour12:true });
            }

            function getTypeIcon(type) {
                type = (type || 'solo').toLowerCase();
                if (type === 'duo') return '<i class="fa-solid fa-user-group text-blue-400"></i>';
                if (type === 'squad') return '<i class="fa-solid fa-people-group text-blue-400"></i>';
                return '<i class="fa-solid fa-user text-blue-400"></i>';
            }

            // ---------- UI update from match ----------
            function updateUI() {
                if (!currentMatch) return;

                // clear all skeleton placeholders
                clearSkeletons();

                // banner
                matchBanner.src = currentMatch.banner || 'https://via.placeholder.com/720x1680?text=No+Banner';
                
                matchName.innerText = currentMatch.name || 'Match';
                matchIdValue.innerText = currentMatch.matchId || matchId.slice(0,8);
                matchTimeValue.innerText = formatDateTime(currentMatch.scheduleTime) || 'N/A';

                prizePoolValue.innerHTML = `₹${(currentMatch.prizePool || 0).toLocaleString()}`;
                perKillValue.innerHTML = `₹${(currentMatch.perKill || 0)}`;
                entryFeeValue.innerHTML = `₹${(currentMatch.entryFee || 0)}`;

                mapValue.innerText = currentMatch.map || 'N/A';
                const typeIcon = getTypeIcon(currentMatch.type);
                typeValue.innerHTML = `${typeIcon}<span>${(currentMatch.type || 'SOLO').toUpperCase()}</span>`;
                platformValue.innerHTML = `<i class="fa-solid fa-mobile-screen-button text-green-400"></i><span>${currentMatch.platform || 'Phone'}</span>`;

                // Room details (if any)
                if (currentMatch.roomId && currentMatch.roomPass) {
                    roomDetails.classList.remove('hidden');
                    document.getElementById('roomId').innerText = currentMatch.roomId || '-';
                    document.getElementById('roomPass').innerText = currentMatch.roomPass || '-';
                } else {
                    roomDetails.classList.add('hidden');
                }

                // No slots display

                renderJoinButton();
            }

            function renderJoinButton() {
                if (!currentMatch) return;

                joinBtn.disabled = true;
                joinBtn.className = 'join-btn';

                if (currentMatch.isJoined === true || joinStatus === 'alreadyjoined' || joinStatus === 'joined') {
                    joinBtn.innerHTML = '<i class="fa-solid fa-check-circle"></i> ALREADY JOINED';
                    joinBtn.classList.add('success');
                    joinBtn.disabled = true;
                }
                else if (joinStatus === 'full' || (currentMatch.joinedCount || 0) >= (currentMatch.slots || 100)) {
                    joinBtn.innerHTML = '<i class="fa-solid fa-ban"></i> MATCH FULL';
                    joinBtn.classList.add('error');
                    joinBtn.disabled = true;
                }
                else if (joinStatus === 'insufficient') {
                    joinBtn.innerHTML = '<i class="fa-solid fa-wallet"></i> INSUFFICIENT BALANCE';
                    joinBtn.classList.add('warning');
                    joinBtn.disabled = false;
                    joinBtn.onclick = (e) => {
                        e.preventDefault();
                        showModal('warning', 'Insufficient balance', 'Insufficient balance to join this match.', [
                            { text: 'ADD MONEY', className: 'modal-button', action: 'redirect', url: 'wallet.html' },
                            { text: 'BACK', className: 'modal-button secondary', action: 'redirect', url: redirectUrl }
                        ]);
                    };
                }
                else if (joinStatus === 'error') {
                    joinBtn.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> TRY AGAIN';
                    joinBtn.classList.add('error');
                    joinBtn.disabled = false;
                    joinBtn.onclick = handleJoinClick;
                }
                else { // idle / ready
                    joinBtn.innerHTML = '<i class="fa-solid fa-circle-check"></i> JOIN MATCH';
                    joinBtn.classList.remove('success', 'warning', 'error');
                    joinBtn.disabled = false;
                    joinBtn.onclick = handleJoinClick;
                }
            }

            // Wallet fetch
            async function fetchWalletSummary(token) {
                try {
                    const res = await fetch(WALLET_SUMMARY_ENDPOINT, { headers: { 'Authorization': `Bearer ${token}` }});
                    if (res.ok) {
                        const data = await res.json();
                        userBalance = data.balance || 0;
                        totalBalanceSpan.innerText = `₹${userBalance.toFixed(2)}`;
                        
                        if (currentMatch && joinStatus === 'idle' && !currentMatch.isJoined) {
                            if (userBalance < (currentMatch.entryFee || 0)) {
                                joinStatus = 'insufficient';
                                renderJoinButton();
                            }
                        }
                    }
                } catch (err) { console.error('wallet error', err); }
            }

            // Fetch match details
            async function fetchMatchDetails(token) {
                try {
                    const res = await fetch(MATCH_DETAILS_ENDPOINT(matchId), { headers: { 'Authorization': `Bearer ${token}` }});
                    if (!res.ok) {
                        if (res.status === 404) showModal('error', 'Not found', 'Match no longer exists.', [{ text:'OK', action:'redirect', url:'tournaments.html' }]);
                        else throw new Error();
                        return;
                    }
                    currentMatch = await res.json();

                    if (currentMatch.status === 'completed' || currentMatch.status === 'live' || currentMatch.status === 'started') {
                        showModal('error', 'Match unavailable', 'Already started/finished.', [{ text:'BACK', action:'redirect', url:redirectUrl }]);
                        return;
                    }
                    
                    if (currentMatch.isJoined) joinStatus = 'alreadyjoined';
                    else joinStatus = 'idle';

                    joinedCount = currentMatch.joinedCount || 0;
                    
                    updateUI();

                    if (userBalance !== undefined && joinStatus === 'idle' && !currentMatch.isJoined) {
                        if (userBalance < (currentMatch.entryFee || 0)) {
                            joinStatus = 'insufficient';
                            renderJoinButton();
                        }
                    }
                } catch (err) {
                    console.error(err);
                    showModal('error', 'Error', 'Could not load match details.', [{ text:'REFRESH', action:'redirect', url:window.location.href }]);
                }
            }

            // IGN validation
            function validateIgn() {
                const val = ignInput.value;
                const pattern = /^[A-Za-z0-9 ]+$/;
                if (val.length < 1 || val.length > 15 || !pattern.test(val)) {
                    ignValidation.classList.remove('hidden');
                    return false;
                } else {
                    ignValidation.classList.add('hidden');
                    return true;
                }
            }

            ignInput.addEventListener('input', validateIgn);

            // Join handler (unchanged logic)
            async function handleJoinClick() {
                if (!validateIgn()) {
                    showModal('warning', 'Invalid IGN', 'Only letters, numbers and spaces (1-15 chars).', [{ text:'OK', action:'close' }]);
                    return;
                }
                const ign = ignInput.value.trim();
                if (!ign) return;

                joinBtn.disabled = true;
                joinBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> PROCESSING...';

                try {
                    const token = await currentUser.getIdToken();
                    const response = await fetch(JOIN_ENDPOINT, {
                        method:'POST',
                        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` },
                        body: JSON.stringify({ matchId, ign })
                    });
                    const data = await response.json();

                    if (response.ok && data.status === 'SUCCESS') {
                        joinStatus = 'joined';
                        currentMatch.isJoined = true;
                        renderJoinButton();
                        localStorage.setItem('last_ign', ign);
                        showModal('success','Success!','Match joined successfully.', [{ text:'OK', action:'redirect', url:redirectUrl }]);

                        if (data.roomDetails) {
                            currentMatch.roomId = data.roomDetails.roomId;
                            currentMatch.roomPass = data.roomDetails.roomPass;
                            updateUI();
                        } else {
                            currentMatch.joinedCount = (currentMatch.joinedCount || 0) + 1;
                            updateUI();
                        }
                    } else {
                        const errorCode = data.error || '';
                        let title='Join failed', msg=data.message||'Could not join.', modalType='error', buttons=[{ text:'BACK', action:'redirect', url:redirectUrl }];

                        if (errorCode === 'ALREADY_JOINED') {
                            joinStatus='alreadyjoined'; currentMatch.isJoined=true; modalType='warning'; title='Already joined'; msg='You have already joined.'; buttons=[{ text:'OK', action:'redirect', url:redirectUrl }];
                        } else if (errorCode === 'MATCH_FULL') { joinStatus='full'; modalType='error'; title='Match full'; msg='This match is full.'; }
                        else if (errorCode === 'INSUFFICIENT_BALANCE') { joinStatus='insufficient'; modalType='warning'; title='Insufficient balance'; msg='Insufficient balance.'; buttons=[{ text:'ADD MONEY', className:'modal-button', action:'redirect', url:'wallet.html' },{ text:'BACK', className:'modal-button secondary', action:'redirect', url:redirectUrl }];
                        } else if (errorCode === 'MATCH_NOT_FOUND') { title='Not found'; msg='Match does not exist.'; buttons=[{ text:'BACK', action:'redirect', url:'tournaments.html' }];
                        } else if (errorCode === 'MATCH_STARTED') { joinStatus='error'; title='Match started'; msg='Cannot join started match.'; } 
                        else { joinStatus='error'; }
                        renderJoinButton();
                        showModal(modalType, title, msg, buttons);
                    }
                } catch (error) {
                    joinStatus='error'; renderJoinButton(); showModal('error','Network error','Failed to connect.', [{ text:'OK', action:'close' }]);
                }
            }

            // Auth
            auth.onAuthStateChanged(async user => {
                if (user) {
                    currentUser = user;
                    const token = await user.getIdToken();
                    const savedIgn = localStorage.getItem('last_ign');
                    if (savedIgn) ignInput.value = savedIgn;

                    await fetchWalletSummary(token);
                    await fetchMatchDetails(token);
                } else {
                    auth.signInAnonymously().catch(e => {
                        showModal('error','Auth failed','Cannot connect. Refresh.',[{ text:'REFRESH', action:'redirect', url:window.location.href }]);
                    });
                }
            });

            backBtn.addEventListener('click', () => history.back());

            // initial skeleton: everything is already shown via spans with skeleton-shimmer.
            // banner skeleton: bannerWrapper background is dark, img hidden until load.
            matchBanner.style.display = 'none';
        })();
    </script>
</body>
</html>
