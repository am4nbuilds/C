<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Join Match – ElitePros</title>

    <!-- Firebase (only auth compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <!-- NO database script -->

    <!-- Tailwind + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0b1020;
            --card-bg: #1f2340;
            --card-dark: #121322;
            --accent: #3f3ef2;
            --muted: #9aa3b2;
            --deposit: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-bottom: 24px;
        }

        /* header like wallet */
        .header-bar {
            background: var(--card-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        .centered-logo-inline-container {
            display: flex;
            align-items: center;
            gap: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .app-logo-header {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(99,102,241,0.5);
        }

        .centered-logo-inline-label {
            font-weight: 800;
            font-size: 18px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        /* glass card style - updated to match tournaments.html */
        .glass-card {
            background: linear-gradient(135deg, #1f2340 0%, #121322 100%);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 30px rgba(2,6,23,0.7);
            padding: 12px 14px;
            margin: 16px;
        }

        /* STAT GRID - exact match from tournaments.html */
        .stat-grid { 
            display: grid; 
            grid-template-columns: repeat(3,1fr); 
            gap: 8px;
            margin: 8px 0;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 55px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 6px 2px;
        }
        
        .stat-label { 
            font-size: 9px;
            color: var(--muted); 
            text-transform: uppercase; 
            font-weight: 600; 
            margin-bottom: 3px;
        }
        
        .stat-value { 
            font-weight: 800; 
            color: white; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            gap: 4px;
            font-size: 12px;
        }

        /* SMALL GRID - exact match from tournaments.html */
        .small-grid { 
            display: grid; 
            grid-template-columns: repeat(4,1fr); 
            gap: 8px;
            margin: 8px 0;
        }
        
        .small-grid > div {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 45px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            padding: 4px 2px;
        }
        
        .small-grid .slabel { 
            font-size: 9px;
            color: var(--muted); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 3px;
            text-transform: uppercase; 
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .small-grid .sval { 
            font-weight: 700; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 4px;
            font-size: 11px;
        }

        .wallet-mini-card {
            background: linear-gradient(135deg, #1f2340, #121322);
            border-radius: 20px;
            padding: 20px;
            margin: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, #1f2340, #121322) padding-box,
                        linear-gradient(135deg, #3f3ef2, #6366f1, #8b5cf6) border-box;
            animation: borderGlow 3s infinite;
        }

        @keyframes borderGlow {
            0% { border-color: rgba(63,62,242,0.3); }
            50% { border-color: rgba(99,102,241,0.8); }
            100% { border-color: rgba(63,62,242,0.3); }
        }

        .wallet-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #3f3ef2, #06b6d4);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            color: white;
        }

        .balance-info .label {
            font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px;
        }

        .balance-info .amount {
            font-size: 26px; font-weight: 800; color: white; margin-top: 4px;
        }

        .progress-container {
            height: 12px; background: #0b1226; border-radius: 999px; margin: 16px; overflow: hidden;
            border: 1px solid #3f3ef2;
        }

        .progress-fill {
            height: 100%; background: linear-gradient(90deg,#3f3ef2,#06b6d4); width: 0%;
            transition: width 0.4s ease;
        }

        .slots-text {
            text-align: center; font-size: 13px; color: #cbd5e1; margin-top: -8px; margin-bottom: 16px;
        }

        .input-card {
            margin: 16px;
        }

        .input-card label {
            font-size: 12px; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 8px; margin-left: 4px;
        }

        .input-card input {
            width: 100%; padding: 16px; background: #0b1226; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; color: white; font-size: 16px; outline: none;
            transition: 0.2s;
        }

        .input-card input:focus {
            border-color: #3f3ef2; box-shadow: 0 0 0 3px rgba(63,62,242,0.3);
        }

        .join-btn {
            display: block; width: calc(100% - 32px); margin: 24px 16px; padding: 18px 0;
            border: none; border-radius: 18px; font-weight: 800; font-size: 16px;
            background: linear-gradient(90deg, #10b981, #06b6d4);
            box-shadow: 0 12px 30px rgba(6,182,212,0.3);
            color: white; cursor: pointer; transition: 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .join-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 18px 35px rgba(6,182,212,0.4); }
        .join-btn:active:not(:disabled) { transform: translateY(0); }
        .join-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .join-btn.success { background: linear-gradient(90deg,#10b981,#059669); box-shadow: 0 8px 20px rgba(16,185,129,0.3); }
        .join-btn.warning { background: linear-gradient(90deg,#f59e0b,#d97706); box-shadow: 0 8px 20px rgba(245,158,11,0.3); }
        .join-btn.error { background: linear-gradient(90deg,#ef4444,#dc2626); box-shadow: 0 8px 20px rgba(239,68,68,0.3); }

        /* full-screen modal (professional cover) */
        .modal-bg {
            position: fixed; inset:0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }

        .modal-card {
            background: linear-gradient(135deg,#1f2340,#121322); padding: 32px 24px; border-radius: 28px;
            max-width: 360px; width: 90%; text-align: center; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .modal-icon {
            width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center; font-size: 36px;
        }

        .modal-icon.success { background: linear-gradient(135deg,#10b981,#06b6d4); }
        .modal-icon.error { background: linear-gradient(135deg,#ef4444,#dc2626); }
        .modal-icon.warning { background: linear-gradient(135deg,#f59e0b,#d97706); }

        .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
        .modal-message { color: #cbd5e1; margin-bottom: 28px; font-size: 15px; }

        .modal-button {
            background: linear-gradient(90deg,#3f3ef2,#06b6d4); border: none; color: white;
            padding: 14px 0; width: 100%; border-radius: 40px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px rgba(6,182,212,0.2); transition: 0.2s;
            margin-bottom: 10px;
        }
        .modal-button.secondary {
            background: transparent; border: 1px solid #3f3ef2; color: #a5b4fc; box-shadow: none;
        }
        .modal-button:hover { transform: scale(1.02); }

        .button-group {
            display: flex; gap: 10px; flex-direction: column;
        }

        /* skeleton shimmer */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 16px;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .skeleton-card { height: 160px; margin: 16px; }
        .skeleton-progress { height: 40px; margin: 16px; border-radius: 40px; }
        .skeleton-input { height: 68px; margin: 16px; border-radius: 20px; }
        .skeleton-btn { height: 62px; margin: 16px; border-radius: 30px; }

        .hidden { display: none; }

        /* match id chip style */
        .match-id-chip {
            color: #a5b4fc;
            font-weight: 600;
            font-size: 11px;
            background: rgba(165, 180, 252, 0.1);
            padding: 2px 6px;
            border-radius: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- header -->
    <div class="header-bar">
        <button class="back-btn" id="backBtn"><i class="fa fa-arrow-left"></i></button>
        <div class="centered-logo-inline-container">
            <div class="app-logo-header">
                <!-- Logo source /logo.png (current domain root) -->
                <img src="/logo.png" alt="ElitePros" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <div class="centered-logo-inline-label">Join Match</div>
        </div>
        <div style="width:44px;"></div>
    </div>

    <!-- skeleton loading (visible initially) -->
    <div id="skeletonWrapper">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card" style="height:100px;"></div>
        <div class="skeleton skeleton-progress"></div>
        <div class="skeleton skeleton-input"></div>
        <div class="skeleton skeleton-btn"></div>
    </div>

    <!-- main content (hidden until loaded) -->
    <div id="mainContent" style="display:none;">
        <!-- match card - UPDATED to match tournaments.html design -->
        <div class="glass-card" id="matchCard">
            <div class="flex items-center gap-2 mb-3">
                <div class="match-id-chip" id="matchId">#...</div>
                <span class="bg-blue-600/30 text-blue-300 text-xs px-3 py-1 rounded-full ml-auto" id="matchStatusBadge">open</span>
            </div>
            
            <div class="text-lg font-extrabold text-white mb-2" id="matchTitle">-</div>

            <!-- STAT GRID - exact match from tournaments.html -->
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-label"><i class="fa-solid fa-trophy text-yellow-400 mr-1"></i>PRIZE POOL</div>
                    <div class="stat-value text-yellow-400" id="prizePool">₹0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fa-solid fa-skull text-red-400 mr-1"></i>PER KILL</div>
                    <div class="stat-value text-red-400" id="perKill">₹0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fa-solid fa-coins text-yellow-400 mr-1"></i>ENTRY FEE</div>
                    <div class="stat-value text-yellow-400" id="entryFee">₹0</div>
                </div>
            </div>

            <!-- SMALL GRID - Time, Map, Type, Platform (4 columns) -->
            <div class="small-grid">
                <div>
                    <div class="slabel"><i class="fa-regular fa-clock"></i> TIME</div>
                    <div class="sval" id="matchTime">-</div>
                </div>
                <div>
                    <div class="slabel"><i class="fa-solid fa-map"></i> MAP</div>
                    <div class="sval" id="matchMap">-</div>
                </div>
                <div>
                    <div class="slabel"><i class="fa-solid fa-users"></i> TYPE</div>
                    <div class="sval" id="matchType">-</div>
                </div>
                <div>
                    <div class="slabel"><i class="fa-solid fa-gamepad"></i> PLATFORM</div>
                    <div class="sval" id="matchPlatform">-</div>
                </div>
            </div>

            <!-- Room details if available -->
            <div id="roomDetails" class="mt-4 p-3 bg-blue-600/20 rounded-xl border border-blue-500/30 hidden">
                <div class="text-xs text-blue-300 mb-1">ROOM DETAILS</div>
                <div class="grid grid-cols-2 gap-2">
                    <div><span class="text-gray-400">ID:</span> <span class="font-mono" id="roomId">-</span></div>
                    <div><span class="text-gray-400">PASS:</span> <span class="font-mono" id="roomPass">-</span></div>
                </div>
            </div>
        </div>

        <!-- wallet mini card -->
        <div class="wallet-mini-card">
            <div class="wallet-icon"><i class="fa-solid fa-wallet"></i></div>
            <div class="balance-info">
                <div class="label">Total Balance</div>
                <div class="amount" id="totalBalance">₹0.00</div>
            </div>
        </div>

        <!-- slots progress -->
        <div class="progress-container">
            <div class="progress-fill" id="slotsProgress"></div>
        </div>
        <div class="slots-text" id="slotsText">0 / 0 slots</div>

        <!-- IGN input -->
        <div class="input-card">
            <label><i class="fa-regular fa-id-card mr-2"></i> IN-GAME NAME (IGN)</label>
            <input type="text" id="ignInput" placeholder="Enter your IGN" autocomplete="off" />
        </div>

        <!-- join button (dynamic) -->
        <button class="join-btn" id="joinBtn" disabled><i class="fa-solid fa-circle-notch fa-spin"></i> LOADING...</button>
    </div>

    <!-- full-screen modal (professional) -->
    <div class="modal-bg" id="statusModal">
        <div class="modal-card">
            <div class="modal-icon success" id="modalIcon"><i class="fa-solid fa-circle-check"></i></div>
            <div class="modal-title" id="modalTitle">Success</div>
            <div class="modal-message" id="modalMessage">You have joined the match</div>
            <div class="button-group" id="modalButtonGroup">
                <button class="modal-button" id="modalPrimaryBtn">CONTINUE</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- CONFIG ----------
            const FIREBASE_CONFIG = {
                apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
                authDomain: "eliteprosofficial.firebaseapp.com",
                databaseURL: "https://eliteprosofficial-default-rtdb.firebaseio.com", // kept but unused
                projectId: "eliteprosofficial",
                storageBucket: "eliteprosofficial.firebasestorage.app",
                messagingSenderId: "646561207100",
                appId: "1:646561207100:web:47de7b648695367e208439"
            };
            firebase.initializeApp(FIREBASE_CONFIG);
            const auth = firebase.auth();
            // NO database

            const BACKEND_URL = "https://elitepros-backend.onrender.com";
            const JOIN_ENDPOINT = `${BACKEND_URL}/join-match`;
            const MATCH_DETAILS_ENDPOINT = (mid) => `${BACKEND_URL}/api/match/${mid}`;
            const WALLET_SUMMARY_ENDPOINT = `${BACKEND_URL}/api/wallet`;

            // ---------- URL PARAMS ----------
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('matchId');
            const redirectUrl = urlParams.get('redirect') || 'tournaments.html';
            if (!matchId) {
                alert('Match ID missing');
                window.location.href = 'tournaments.html';
            }

            // ---------- GLOBALS ----------
            let currentUser = null;
            let currentMatch = null;          // from backend API
            let joinStatus = 'idle';           // idle, joined, full, insufficient, alreadyjoined, error
            let userBalance = 0;
            let joinedCount = 0;                // from backend joinedCount

            // DOM elements
            const skeleton = document.getElementById('skeletonWrapper');
            const mainContent = document.getElementById('mainContent');
            const backBtn = document.getElementById('backBtn');
            const joinBtn = document.getElementById('joinBtn');
            const ignInput = document.getElementById('ignInput');
            const modal = document.getElementById('statusModal');
            const modalIconDiv = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const modalButtonGroup = document.getElementById('modalButtonGroup');
            const roomDetails = document.getElementById('roomDetails');

            // ---------- HELPER: show full screen modal with custom actions ----------
            function showModal(type, title, msg, buttons = [{ text: 'OK', action: 'close' }]) {
                modalIconDiv.className = 'modal-icon ' + type;
                let icon = 'fa-circle-check';
                if (type === 'error') icon = 'fa-circle-exclamation';
                if (type === 'warning') icon = 'fa-triangle-exclamation';
                modalIconDiv.innerHTML = `<i class="fa-solid ${icon}"></i>`;
                modalTitle.innerText = title;
                modalMessage.innerText = msg;

                modalButtonGroup.innerHTML = '';
                buttons.forEach(btn => {
                    const button = document.createElement('button');
                    button.className = btn.className || 'modal-button';
                    if (btn.secondary) button.classList.add('secondary');
                    button.innerText = btn.text;
                    button.onclick = (e) => {
                        modal.style.display = 'none';
                        if (btn.action === 'redirect' && btn.url) window.location.href = btn.url;
                        else if (btn.action === 'back') window.history.back();
                        else if (btn.action === 'close') { /* just close */ }
                        else if (typeof btn.action === 'function') btn.action();
                    };
                    modalButtonGroup.appendChild(button);
                });

                modal.style.display = 'flex';
            }

            // Format date/time from scheduleTime (ISO string) - matches tournaments.html format
            function formatDateTime(timestamp) {
                if (!timestamp) return 'N/A';
                const date = new Date(timestamp);
                return date.toLocaleString('en-IN', { 
                    day: '2-digit', 
                    month: 'short', 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: true 
                });
            }

            // Get type icon based on match type
            function getTypeIcon(type) {
                type = (type || 'solo').toLowerCase();
                if (type === 'duo') return '<i class="fa-solid fa-user-group text-blue-400"></i>';
                if (type === 'squad') return '<i class="fa-solid fa-people-group text-blue-400"></i>';
                return '<i class="fa-solid fa-user text-blue-400"></i>';
            }

            // ---------- UI update from match (backend) ----------
            function updateUI() {
                if (!currentMatch) return;

                joinedCount = currentMatch.joinedCount || 0;
                const totalSlots = Number(currentMatch.slots || 100);
                const isFull = joinedCount >= totalSlots;

                // Display public matchId from match object, not Firebase ID
                document.getElementById('matchId').innerText = `#${currentMatch.matchId || matchId.slice(0,8)}`;
                document.getElementById('matchTitle').innerText = currentMatch.name || 'Match';
                document.getElementById('prizePool').innerHTML = `₹${(currentMatch.prizePool || 0).toLocaleString()}`;
                document.getElementById('perKill').innerHTML = `₹${(currentMatch.perKill || 0)}`;
                document.getElementById('entryFee').innerHTML = `₹${(currentMatch.entryFee || 0)}`;

                // Time, Map, Type, Platform with icons
                document.getElementById('matchTime').innerHTML = formatDateTime(currentMatch.scheduleTime) || 'N/A';
                document.getElementById('matchMap').innerHTML = currentMatch.map || 'N/A';
                
                const typeIcon = getTypeIcon(currentMatch.type);
                document.getElementById('matchType').innerHTML = `${typeIcon}<span>${(currentMatch.type || 'SOLO').toUpperCase()}</span>`;
                
                const platformIcon = '<i class="fa-solid fa-mobile-screen-button text-green-400"></i>';
                document.getElementById('matchPlatform').innerHTML = `${platformIcon}<span>${currentMatch.platform || 'Phone'}</span>`;

                // Status badge
                const statusBadge = document.getElementById('matchStatusBadge');
                if (isFull) {
                    statusBadge.innerText = 'FULL';
                    statusBadge.className = 'bg-red-600/30 text-red-300 text-xs px-3 py-1 rounded-full';
                } else {
                    statusBadge.innerText = 'OPEN';
                    statusBadge.className = 'bg-blue-600/30 text-blue-300 text-xs px-3 py-1 rounded-full';
                }

                // Room details (only if full/started and fields exist)
                if (currentMatch.roomId && currentMatch.roomPass && (isFull || currentMatch.status === 'started')) {
                    roomDetails.classList.remove('hidden');
                    document.getElementById('roomId').innerText = currentMatch.roomId || '-';
                    document.getElementById('roomPass').innerText = currentMatch.roomPass || '-';
                } else {
                    roomDetails.classList.add('hidden');
                }

                // Slots progress
                const percent = Math.min(100, (joinedCount / totalSlots) * 100);
                document.getElementById('slotsProgress').style.width = percent + '%';
                document.getElementById('slotsText').innerText = `${joinedCount} / ${totalSlots} slots filled`;

                // If match is full, update joinStatus
                if (isFull && joinStatus !== 'joined' && joinStatus !== 'alreadyjoined' && joinStatus !== 'error') {
                    joinStatus = 'full';
                }

                renderJoinButton();
            }

            function renderJoinButton() {
                if (!currentMatch) return;

                joinBtn.disabled = true;
                joinBtn.className = 'join-btn';

                if (currentMatch.isJoined === true || joinStatus === 'alreadyjoined' || joinStatus === 'joined') {
                    joinBtn.innerHTML = '<i class="fa-solid fa-check-circle"></i> ALREADY JOINED';
                    joinBtn.classList.add('success');
                    joinBtn.disabled = true;
                    
                    if (currentMatch.roomId && currentMatch.roomPass) {
                        roomDetails.classList.remove('hidden');
                        document.getElementById('roomId').innerText = currentMatch.roomId || '-';
                        document.getElementById('roomPass').innerText = currentMatch.roomPass || '-';
                    }
                }
                else if (joinStatus === 'full' || joinedCount >= (currentMatch.slots || 100)) {
                    joinBtn.innerHTML = '<i class="fa-solid fa-ban"></i> MATCH FULL';
                    joinBtn.classList.add('error');
                    joinBtn.disabled = true;
                }
                else if (joinStatus === 'insufficient') {
                    joinBtn.innerHTML = '<i class="fa-solid fa-wallet"></i> INSUFFICIENT BALANCE';
                    joinBtn.classList.add('warning');
                    joinBtn.disabled = false;
                    joinBtn.onclick = (e) => {
                        e.preventDefault();
                        showModal('warning', 'Insufficient balance', 'Insufficient balance to join this match.', [
                            { text: 'ADD MONEY', className: 'modal-button', action: 'redirect', url: 'wallet.html' },
                            { text: 'BACK', className: 'modal-button secondary', action: 'redirect', url: redirectUrl }
                        ]);
                    };
                }
                else if (joinStatus === 'error') {
                    joinBtn.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> TRY AGAIN';
                    joinBtn.classList.add('error');
                    joinBtn.disabled = false;
                    joinBtn.onclick = handleJoinClick;
                }
                else { // idle / ready
                    joinBtn.innerHTML = '<i class="fa-solid fa-circle-check"></i> JOIN MATCH';
                    joinBtn.classList.remove('success', 'warning', 'error');
                    joinBtn.disabled = false;
                    joinBtn.onclick = handleJoinClick;
                }
            }

            // ---------- FETCH WALLET SUMMARY (and set balance) ----------
            async function fetchWalletSummary(token) {
                try {
                    const res = await fetch(WALLET_SUMMARY_ENDPOINT, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        userBalance = data.balance || 0;
                        document.getElementById('totalBalance').innerText = `₹${userBalance.toFixed(2)}`;
                        
                        if (currentMatch && joinStatus === 'idle' && !currentMatch.isJoined) {
                            if (userBalance < (currentMatch.entryFee || 0)) {
                                joinStatus = 'insufficient';
                                renderJoinButton();
                            }
                        }
                    }
                } catch (err) {
                    console.error('wallet fetch error', err);
                }
            }

            // ---------- FETCH MATCH DETAILS FROM BACKEND (only upcoming) ----------
            async function fetchMatchDetails(token) {
                try {
                    const res = await fetch(MATCH_DETAILS_ENDPOINT(matchId), {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!res.ok) {
                        if (res.status === 404) {
                            showModal('error', 'Match not found', 'This match no longer exists.', [{
                                text: 'OK', action: 'redirect', url: 'tournaments.html'
                            }]);
                        } else {
                            throw new Error('Failed to fetch match');
                        }
                        return;
                    }
                    currentMatch = await res.json();

                    // Ensure only upcoming matches (status must not be 'completed' or 'live')
                    if (currentMatch.status === 'completed' || currentMatch.status === 'live' || currentMatch.status === 'started') {
                        showModal('error', 'Match unavailable', 'This match has already started or finished.', [{
                            text: 'BACK', action: 'redirect', url: redirectUrl
                        }]);
                        return;
                    }
                    
                    if (currentMatch.isJoined) {
                        joinStatus = 'alreadyjoined';
                    } else {
                        joinStatus = 'idle';
                    }

                    joinedCount = currentMatch.joinedCount || 0;
                    
                    updateUI();

                    if (userBalance !== undefined && joinStatus === 'idle' && !currentMatch.isJoined) {
                        if (userBalance < (currentMatch.entryFee || 0)) {
                            joinStatus = 'insufficient';
                            renderJoinButton();
                        }
                    }

                    skeleton.style.display = 'none';
                    mainContent.style.display = 'block';
                } catch (err) {
                    console.error(err);
                    showModal('error', 'Error', 'Could not load match details. Please refresh.', [{
                        text: 'REFRESH', action: 'redirect', url: window.location.href
                    }]);
                }
            }

            // ---------- HANDLE JOIN (API CALL) ----------
            async function handleJoinClick() {
                const ign = ignInput.value.trim();
                if (!ign) {
                    showModal('warning', 'IGN required', 'Please enter your in-game name.', [{
                        text: 'OK', action: 'close'
                    }]);
                    ignInput.focus();
                    return;
                }
                if (!currentUser) {
                    showModal('error', 'Auth error', 'Please refresh and try again.', [{
                        text: 'OK', action: 'close'
                    }]);
                    return;
                }

                joinBtn.disabled = true;
                joinBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> PROCESSING...';

                try {
                    const token = await currentUser.getIdToken();
                    const response = await fetch(JOIN_ENDPOINT, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            matchId: matchId,
                            ign: ign
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.status === 'SUCCESS') {
                        joinStatus = 'joined';
                        currentMatch.isJoined = true;   // update locally
                        renderJoinButton();
                        
                        localStorage.setItem('last_ign', ign);

                        // Full screen success modal with OK -> redirect back
                        showModal('success', 'Success!', 'Match joined successfully.', [{
                            text: 'OK', action: 'redirect', url: redirectUrl
                        }]);

                        // if room details returned
                        if (data.roomDetails) {
                            currentMatch.roomId = data.roomDetails.roomId;
                            currentMatch.roomPass = data.roomDetails.roomPass;
                            updateUI();
                        } else {
                            // refresh player count maybe
                            joinedCount += 1;
                            currentMatch.joinedCount = joinedCount;
                            updateUI();
                        }
                    } else {
                        const errorCode = data.error || '';
                        let title = 'Join failed';
                        let msg = data.message || 'Could not join match.';
                        let modalType = 'error';
                        let buttons = [{ text: 'BACK', action: 'redirect', url: redirectUrl }];

                        if (errorCode === 'ALREADY_JOINED') {
                            joinStatus = 'alreadyjoined';
                            currentMatch.isJoined = true;
                            modalType = 'warning';
                            title = 'Already joined';
                            msg = 'You have already joined this match.';
                            buttons = [{ text: 'OK', action: 'redirect', url: redirectUrl }];
                        } else if (errorCode === 'MATCH_FULL') {
                            joinStatus = 'full';
                            modalType = 'error';
                            title = 'Match full';
                            msg = 'This match is full.';
                            buttons = [{ text: 'BACK', action: 'redirect', url: redirectUrl }];
                        } else if (errorCode === 'INSUFFICIENT_BALANCE') {
                            joinStatus = 'insufficient';
                            modalType = 'warning';
                            title = 'Insufficient balance';
                            msg = 'Insufficient balance to join this match.';
                            buttons = [
                                { text: 'ADD MONEY', className: 'modal-button', action: 'redirect', url: 'wallet.html' },
                                { text: 'BACK', className: 'modal-button secondary', action: 'redirect', url: redirectUrl }
                            ];
                        } else if (errorCode === 'MATCH_NOT_FOUND') {
                            title = 'Not found';
                            msg = 'Match does not exist.';
                            buttons = [{ text: 'BACK', action: 'redirect', url: 'tournaments.html' }];
                        } else if (errorCode === 'MATCH_STARTED') {
                            joinStatus = 'error';
                            title = 'Match started';
                            msg = 'Cannot join a match that has already started.';
                        } else {
                            joinStatus = 'error';
                        }

                        renderJoinButton();
                        showModal(modalType, title, msg, buttons);
                    }
                } catch (error) {
                    console.error('join error', error);
                    joinStatus = 'error';
                    renderJoinButton();
                    showModal('error', 'Network error', 'Failed to connect to server. Please check connection.', [{ text: 'OK', action: 'close' }]);
                }
            }

            // ---------- AUTH & INIT ----------
            auth.onAuthStateChanged(async user => {
                if (user) {
                    currentUser = user;
                    const token = await user.getIdToken();
                    
                    const savedIgn = localStorage.getItem('last_ign');
                    if (savedIgn) ignInput.value = savedIgn;

                    await fetchWalletSummary(token);
                    await fetchMatchDetails(token);
                } else {
                    auth.signInAnonymously().catch(e => {
                        console.error('anon signin failed', e);
                        showModal('error', 'Auth failed', 'Cannot connect. Refresh.', [{
                            text: 'REFRESH', action: 'redirect', url: window.location.href
                        }]);
                    });
                }
            });

            backBtn.addEventListener('click', () => history.back());

        })();
    </script>
</body>
</html>
