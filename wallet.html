<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - ElitePros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Firebase Auth only (no database) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --bg-dark: #0b1020;
            --card-bg: #1f2340;
            --card-dark: #121322;
            --accent: #3f3ef2;
            --muted: #9aa3b2;
            --deposit-color: #f59e0b;
            --winnings-color: #10b981;
            --balance-color: #3f3ef2;
        }
        
        body {
            background: var(--bg-dark);
            color: white;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            margin: 0;
            padding: 0;
            padding-bottom: 20px;
        }
        
        /* Header - Centered Icon + Label (Inline) */
        .header-bar {
            background: var(--card-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        .centered-logo-inline-container {
            display: flex;
            align-items: center;
            gap: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .app-logo-header {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(99, 102, 241, 0.5);
            flex-shrink: 0;
        }

        .centered-logo-inline-label {
            font-weight: 800;
            font-size: 18px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        /* Wallet Summary */
        .wallet-summary-section {
            padding: 20px 16px;
            background: linear-gradient(135deg, #111827, #1f2937);
            margin: 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 12px 35px rgba(2,6,23,0.8);
        }
        
        .wallet-summary-title {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 16px;
            font-weight: 600;
        }
        
        .wallet-total-card {
            background: linear-gradient(135deg, #1f2340, #121322);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid transparent;
            box-shadow: 0 8px 30px rgba(2,6,23,0.7);
            
            background: linear-gradient(135deg, #1f2340, #121322) padding-box,
                        linear-gradient(135deg, #3f3ef2, #6366f1, #8b5cf6, #ec4899) border-box;
            background-size: 400% 400%;
            animation: borderGradient 4s ease infinite;
        }
        
        @keyframes borderGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .total-balance-label {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .total-balance-amount {
            font-weight: 800;
            font-size: 32px;
            color: white;
            letter-spacing: 0.5px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .wallet-details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .wallet-detail-card {
            background: linear-gradient(135deg, #1f2340, #121322);
            border-radius: 16px;
            padding: 16px;
            border: 2px solid transparent;
            box-shadow: 0 4px 20px rgba(2,6,23,0.5);
            
            background: linear-gradient(135deg, #1f2340, #121322) padding-box,
                        linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)) border-box;
        }
        
        .wallet-detail-card.deposit-card {
            border-color: rgba(245, 158, 11, 0.3);
        }
        
        .wallet-detail-card.winnings-card {
            border-color: rgba(16, 185, 129, 0.3);
        }
        
        .detail-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        
        .detail-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
        }
        
        .detail-icon.deposit {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        
        .detail-icon.winnings {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        
        .detail-amount {
            font-weight: 800;
            font-size: 20px;
        }
        
        .detail-amount.deposit {
            color: #fbbf24;
        }
        
        .detail-amount.winnings {
            color: #34d399;
        }
        
        /* Quick Actions */
        .quick-actions-section {
            padding: 0 16px;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .compact-actions-container {
            background: linear-gradient(135deg, #1f2340, #121322);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 25px rgba(2,6,23,0.6);
        }
        
        .compact-action-btn {
            display: flex;
            align-items: center;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 8px;
            height: 56px;
        }
        
        .compact-action-btn:last-child {
            margin-bottom: 0;
        }
        
        .compact-action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }
        
        .compact-action-btn.deposit:hover {
            border-left: 4px solid rgba(245, 158, 11, 0.5);
        }
        
        .compact-action-btn.withdraw:hover {
            border-left: 4px solid rgba(239, 68, 68, 0.5);
        }
        
        .compact-action-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 1.1rem;
            color: white;
            flex-shrink: 0;
        }
        
        .compact-action-icon.deposit {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        
        .compact-action-icon.withdraw {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        
        .compact-action-info {
            flex: 1;
        }
        
        .compact-action-label {
            font-weight: 700;
            font-size: 14px;
            color: #e5e7eb;
            margin-bottom: 2px;
        }
        
        .compact-action-description {
            font-size: 12px;
            color: #9ca3af;
        }
        
        .compact-action-arrow {
            color: #9ca3af;
            font-size: 14px;
        }
        
        /* Recent Transactions */
        .recent-transactions-section {
            padding: 0 16px;
        }
        
        .transactions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .view-all-btn {
            color: #818cf8;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px 12px;
            border-radius: 8px;
        }
        
        .view-all-btn:hover {
            background: rgba(129, 140, 248, 0.1);
            color: #a5b4fc;
        }
        
        .transactions-list {
            background: linear-gradient(135deg, #1f2340, #121322);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 25px rgba(2,6,23,0.6);
        }
        
        .transaction-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .transaction-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .transaction-item:last-child {
            border-bottom: none;
        }
        
        .transaction-icon-container {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 1.2rem;
            color: white;
            flex-shrink: 0;
        }
        
        .transaction-icon-container.deposit {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        
        .transaction-icon-container.withdraw {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        
        .transaction-icon-container.winning {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        
        .transaction-icon-container.fee {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        
        .transaction-icon-container.refund {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        
        .transaction-icon-container.admin {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }
        
        .transaction-details {
            flex: 1;
            min-width: 0;
        }
        
        .transaction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .transaction-title {
            font-weight: 700;
            font-size: 14px;
            color: #e5e7eb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .transaction-amount {
            font-weight: 800;
            font-size: 15px;
            margin-left: 8px;
            white-space: nowrap;
        }
        
        .amount-positive {
            color: #34d399;
        }
        
        .amount-negative {
            color: #f87171;
        }
        
        .transaction-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }
        
        .transaction-id {
            color: #9ca3af;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            letter-spacing: 0.5px;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .copy-btn {
            background: transparent;
            border: none;
            color: #818cf8;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 9px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .copy-btn:hover {
            background: rgba(129, 140, 248, 0.1);
            color: #a5b4fc;
        }
        
        .copy-btn.copied {
            color: #10b981;
        }
        
        .transaction-time {
            color: #9ca3af;
        }
        
        .transaction-status {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 10px;
            margin-left: 8px;
            flex-shrink: 0;
        }
        
        .status-success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        /* Loading States */
        .loading-container {
            padding: 40px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
        }
        
        .loading-container i {
            font-size: 2rem;
            margin-bottom: 16px;
        }
        
        .skeleton-shimmer {
            background: linear-gradient(90deg, 
                rgba(255, 255, 255, 0.05) 25%, 
                rgba(255, 255, 255, 0.1) 50%, 
                rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-total-card {
            height: 120px;
            margin-bottom: 20px;
        }
        
        .skeleton-detail-card {
            height: 80px;
        }
        
        .skeleton-action-btn {
            height: 56px;
            margin-bottom: 8px;
        }
        
        .skeleton-transaction {
            height: 72px;
            margin-bottom: 1px;
        }
        
        /* Error Message */
        .error-message {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 12px 16px;
            text-align: center;
            margin: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(239,68,68,0.3);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: #9ca3af;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(34, 197, 94, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 1.7s;
            animation-fill-mode: forwards;
        }
        
        @keyframes toastSlideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        
        @keyframes toastFadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Header - Centered Icon + Label (Inline) -->
    <div class="header-bar">
        <button class="back-btn" id="backButton">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        
        <!-- Centered Logo + Label Container (Inline) -->
        <div class="centered-logo-inline-container">
            <div class="app-logo-header">
                <img id="appLogo" src="http://elitepros.wuaze.com/IMG-20260106-WA0000.jpg" alt="ElitePros" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <div class="centered-logo-inline-label">Wallet</div>
        </div>
        
        <!-- Empty div for spacing -->
        <div style="width:44px;"></div>
    </div>

    <!-- Wallet Summary -->
    <div class="wallet-summary-section">
        <div class="wallet-summary-title">Your Balance</div>
        
        <!-- Loading State -->
        <div id="walletLoading">
            <div class="wallet-total-card skeleton-shimmer skeleton-total-card"></div>
            <div class="wallet-details-grid">
                <div class="skeleton-shimmer skeleton-detail-card"></div>
                <div class="skeleton-shimmer skeleton-detail-card"></div>
            </div>
        </div>
        
        <!-- Content -->
        <div id="walletContent" style="display: none;">
            <div class="wallet-total-card">

                    <i class="fa-solid fa-wallet"></i>
                    <span>Total Balance</span>
                </div>
                <div id="totalBalanceAmount" class="total-balance-amount">₹0</div>

            <div class="wallet-details-grid">
                <div class="wallet-detail-card deposit-card">
                    <div class="detail-label">
                        <div class="detail-icon deposit">

                        </div>

                <div class="wallet-detail-card winnings-card">
                    <div class="detail-label">
                        <div class="detail-icon winnings">
                            <i class="fa-solid fa-trophy"></i>

                        <span>Winnings</span>
                    </div>
                    <div id="winningsAmount" class="detail-amount winnings">₹0</div>
                </div>
            </div>

    </div>

    <!-- Quick Actions - With Skeleton -->
    <div class="quick-actions-section">
        <div class="section-title">Quick Actions</div>
        
        <!-- Loading State -->
        <div id="actionsLoading">
            <div class="compact-actions-container">
                <div class="skeleton-shimmer skeleton-action-btn"></div>
                <div class="skeleton-shimmer skeleton-action-btn"></div>
            </div>
        </div>
        
        <!-- Content -->
        <div id="actionsContent" style="display: none;">
            <div class="compact-actions-container">
                <!-- Deposit Button -->
                <div class="compact-action-btn deposit" onclick="window.location.href='deposit.html'">
                    <div class="compact-action-icon deposit">
                        <i class="fa-solid fa-piggy-bank"></i>
                    </div>
                    <div class="compact-action-info">
                        <div class="compact-action-label">Deposit Money</div>
                        <div class="compact-action-description">Add funds to your wallet</div>
                    </div>
                    <div class="compact-action-arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </div>
                
                <!-- Withdraw Button -->
                <div class="compact-action-btn withdraw" onclick="window.location.href='withdraw.html'">
                    <div class="compact-action-icon withdraw">

                    </div>
                    <div class="compact-action-info">
                        <div class="compact-action-label">Withdraw Money</div>
                        <div class="compact-action-description">Transfer to your bank</div>
                    </div>
                    <div class="compact-action-arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Transactions -->
    <div class="recent-transactions-section">
        <div class="transactions-header">
            <div class="section-title">Recent Transactions</div>
            <div class="view-all-btn" onclick="window.location.href='transactions.html'">
                <span>View All</span>
                <i class="fa-solid fa-arrow-right"></i>
            </div>
        </div>
        
        <!-- Loading State -->
        <div id="transactionsLoading" class="transactions-list">
            <div class="skeleton-shimmer skeleton-transaction"></div>
            <div class="skeleton-shimmer skeleton-transaction"></div>
            <div class="skeleton-shimmer skeleton-transaction"></div>
        </div>
        
        <!-- Transactions Content -->
        <div id="transactionsContainer" style="display: none;">
            <!-- Transactions will be loaded here -->
        </div>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="error-message" style="display:none;">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="errorText"></span>
    </div>
<script>
    // Firebase configuration (Auth only)
    const firebaseConfig = {
        apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
        authDomain: "eliteprosofficial.firebaseapp.com",
        databaseURL: "https://eliteprosofficial-default-rtdb.firebaseio.com",
        projectId: "eliteprosofficial",
        storageBucket: "eliteprosofficial.firebasestorage.app",
        messagingSenderId: "646561207100",
        appId: "1:646561207100:web:47de7b648695367e208439",
        measurementId: "G-ZN5VNFCSEL"
    };

    // Initialize Firebase (Auth only – no database)
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // DOM Elements
    const backButton = document.getElementById('backButton');
    const walletLoading = document.getElementById('walletLoading');
    const walletContent = document.getElementById('walletContent');
    const actionsLoading = document.getElementById('actionsLoading');
    const actionsContent = document.getElementById('actionsContent');
    const transactionsLoading = document.getElementById('transactionsLoading');
    const transactionsContainer = document.getElementById('transactionsContainer');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const totalBalanceAmount = document.getElementById('totalBalanceAmount');
    const depositedAmount = document.getElementById('depositedAmount');
    const winningsAmount = document.getElementById('winningsAmount');

    // Back navigation logic (unchanged)
    let cameFromDepositOrWithdraw = false;
    
    function checkReferrer() {
        const referrer = document.referrer;
        if (referrer.includes('deposit.html') || referrer.includes('withdraw.html')) {
            cameFromDepositOrWithdraw = true;
        }
    }
    
    function handleBackClick() {
        if (cameFromDepositOrWithdraw) {
            window.location.href = 'home.html';
        } else {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'home.html';
            }
        }
    }
    
    // Show error
    function showError(message) {
        errorText.textContent = message;
        errorMessage.style.display = 'flex';
        setTimeout(() => {
            errorMessage.style.display = 'none';
        }, 5000);
    }

    // Format currency
    function formatCurrency(amount) {
        return '₹' + parseInt(amount).toLocaleString();
    }

    // Show toast
    function showToast(message) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-check-circle"></i><span>${message}</span>`;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 2000);
    }

    // Copy text
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'))
        .catch(() => {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast('Copied to clipboard!');
        });
    }

    // Copy transaction ID (global function)
    window.copyTransactionId = function(transactionId, event) {
        if (event) {
            event.stopPropagation();
            const button = event.currentTarget;
            const icon = button.querySelector('i');
            button.classList.add('copied');
            icon.className = 'fas fa-check';
            setTimeout(() => {
                button.classList.remove('copied');
                icon.className = 'fas fa-copy';
            }, 2000);
        }
        copyToClipboard(transactionId);
    };

    window.viewTransaction = function(transactionId) {
        console.log("View transaction:", transactionId);
        // placeholder for detail view
    };

    // Helper to extract transaction icon / styling (same as original)
    function getTransactionIcon(type) {
        const t = (type || '').toLowerCase();
        if (t.includes('deposit')) return { icon: 'fa-piggy-bank', class: 'deposit' };
        if (t.includes('withdraw')) return { icon: 'fa-hand-holding-dollar', class: 'withdraw' };
        if (t.includes('winning') || t.includes('prize') || t.includes('match')) return { icon: 'fa-trophy', class: 'winning' };
        if (t.includes('fee') || t.includes('entry')) return { icon: 'fa-coins', class: 'fee' };
        if (t.includes('refund')) return { icon: 'fa-arrow-rotate-left', class: 'refund' };
        if (t.includes('admin') || t.includes('manual')) return { icon: 'fa-user-shield', class: 'admin' };
        return { icon: 'fa-exchange-alt', class: 'deposit' };
    }

    function getStatusIcon(status) {
        const s = (status || 'success').toLowerCase();
        if (s.includes('fail') || s.includes('reject')) return { icon: 'fa-xmark', class: 'status-failed' };
        if (s.includes('pending') || s.includes('process')) return { icon: 'fa-clock', class: 'status-pending' };
        return { icon: 'fa-check', class: 'status-success' };
    }

    function formatTime(timestamp) {
        if (!timestamp) return "Recently";
        let date = new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        if (diffMins < 1) return "Just now";
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays < 7) return `${diffDays}d ago`;
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // Render transactions from API response (expected array, already sorted, max 5)
    function renderTransactions(transactions) {
        transactionsLoading.style.display = 'none';
        transactionsContainer.style.display = 'block';
        
        if (!transactions || transactions.length === 0) {
            transactionsContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-receipt"></i>
                    <div>No recent transactions</div>
                    <div style="font-size: 12px; margin-top: 8px; opacity: 0.7;">Your transactions will appear here</div>
                </div>
            `;
            return;
        }

        let html = '<div class="transactions-list">';
        
        transactions.forEach(t => {
            const amount = parseFloat(t.amount || 0);
            const isPositive = amount >= 0;
            const amountDisplay = `${isPositive ? '+' : '-'}₹${Math.abs(amount).toLocaleString()}`;
            const icon = getTransactionIcon(t.type || t.category);
            const statusIcon = getStatusIcon(t.status);
            const title = t.description || t.reason || t.type || t.category || 'Transaction';
            const timeAgo = formatTime(t.timestamp || t.date || t.createdAt);
            const displayId = t.id || 'N/A';
            const shortDisplayId = displayId.substring(0, 8) + (displayId.length > 8 ? '...' : '');
            
            html += `
                <div class="transaction-item" onclick="viewTransaction('${t.id}')">
                    <div class="transaction-icon-container ${icon.class}">
                        <i class="fa-solid ${icon.icon}"></i>
                    </div>
                    <div class="transaction-details">
                        <div class="transaction-header">
                            <div class="transaction-title" title="${title}">${title}</div>
                            <div class="transaction-amount ${isPositive ? 'amount-positive' : 'amount-negative'}">${amountDisplay}</div>
                        </div>
                        <div class="transaction-footer">
                            <div class="transaction-id" title="${displayId}">
                                ID: ${shortDisplayId}
                                <button class="copy-btn" onclick="copyTransactionId('${displayId}', event)">
                                    <i class="fas fa-copy"></i>
                                </button>
                            </div>
                            <div class="transaction-time">${timeAgo}</div>
                        </div>
                    </div>
                    <div class="transaction-status ${statusIcon.class}" title="${t.status || 'Success'}">
                        <i class="fa-solid ${statusIcon.icon}"></i>
                    </div>
                </div>
            `;
        });
        
        html += '</div>';
        transactionsContainer.innerHTML = html;
    }

    // Fetch wallet + transactions from backend
    async function fetchWalletData(user) {
        try {
            const idToken = await user.getIdToken();
            const response = await fetch('https://elitepros-backend.onrender.com/api/wallet', {
                headers: {
                    'Authorization': `Bearer ${idToken}`
                }
            });

            if (response.status === 401) {
                // Unauthorized -> redirect to login
                window.location.href = 'login.html';
                return;
            }

            if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
            }

            const data = await response.json();
            // expected shape: { wallet: { deposited, winnings, total }, transactions: [] }
            const wallet = data.wallet || { deposited: 0, winnings: 0, total: 0 };
            const transactions = data.transactions || [];

            // Update wallet summary
            depositedAmount.textContent = formatCurrency(wallet.deposited || 0);
            winningsAmount.textContent = formatCurrency(wallet.winnings || 0);
            totalBalanceAmount.textContent = formatCurrency(wallet.total || 0);

            // Render transactions (backend already provides latest 5, no frontend slice)
            renderTransactions(transactions);

            // Finish loading (hide skeletons)
            walletLoading.style.display = 'none';
            walletContent.style.display = 'block';
            actionsLoading.style.display = 'none';
            actionsContent.style.display = 'block';
        } catch (error) {
            console.error("Fetch wallet error:", error);
            showError("Failed to load wallet. Please try again.");
            // hide loading but show maybe empty? keep skeletons hidden? we hide loading and show empty content? 
            // for consistency, we still hide loading but show zero values + empty transactions
            walletLoading.style.display = 'none';
            walletContent.style.display = 'block';
            actionsLoading.style.display = 'none';
            actionsContent.style.display = 'block';
            depositedAmount.textContent = '₹0';
            winningsAmount.textContent = '₹0';
            totalBalanceAmount.textContent = '₹0';
            renderTransactions([]);
        }
    }

    // Initialize page
    document.addEventListener('DOMContentLoaded', function() {
        checkReferrer();
        backButton.addEventListener('click', handleBackClick);

        auth.onAuthStateChanged(user => {
            if (user) {
                fetchWalletData(user);
            } else {
                showError("Please log in to view your wallet");
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
        });
    });

    // Expose functions to global for onclick handlers (copyTransactionId, viewTransaction already global)
    // Also ensure viewTransaction is defined globally
    window.viewTransaction = window.viewTransaction || function(id){ console.log("view",id); };
</script>
</body>
