<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="htmlTitle">Match Details - Tournament App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
/* Enhanced Rules Icons */
.rules-list-enhanced {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.rules-item-enhanced {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 10px;
    border-left: 4px solid;
    transition: all 0.3s ease;
}

.rules-item-enhanced:hover {
    background: rgba(255, 255, 255, 0.06);
    transform: translateX(4px);
}

.rules-icon {
    font-size: 16px;
    width: 24px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 2px;
    border-radius: 6px;
    padding: 6px;
}

.rules-content {
    flex: 1;
}

.rules-text {
    color: #e2e8f0;
    font-size: 14px;
    line-height: 1.5;
    font-weight: 500;
}

/* Different border colors for variety */
.rules-item-enhanced:nth-child(1) { border-left-color: #f59e0b; }
.rules-item-enhanced:nth-child(2) { border-left-color: #ef4444; }
.rules-item-enhanced:nth-child(3) { border-left-color: #3b82f6; }
.rules-item-enhanced:nth-child(4) { border-left-color: #10b981; }
.rules-item-enhanced:nth-child(5) { border-left-color: #8b5cf6; }
.rules-item-enhanced:nth-child(6) { border-left-color: #ec4899; }
.rules-item-enhanced:nth-child(7) { border-left-color: #f97316; }
.rules-item-enhanced:nth-child(8) { border-left-color: #06b6d4; }
        body {
            background: #0b1020;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
            padding: 0 16px;
            background: #0f1724;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .back-btn,
        .participants-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .header-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            /* Space between logo and title */
        }

        .header-center img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        .page-title {
            font-weight: 700;
            font-size: 16px;
            text-align: center;
        }

        .match-id-text {
            font-size: 12px;
            color: #9aa3b2;
        }

        .banner {
            margin: 12px 16px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #3f3ef2;
        }

        .banner img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }

        .tab-bar {
            display: flex;
            justify-content: space-around;
            background: #1f2340;
            margin: 0 16px;
            border-radius: 8px;
            overflow: hidden;
            padding: 4px 0;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-weight: 600;
            font-size: 14px;
            color: #9aa3b2;
            cursor: pointer;
            transition: background 0.2s;
        }

        .tab-btn.active {
            background: #3f3ef2;
            color: white;
            border-radius: 6px;
        }

        .content-section {
            padding: 8px 16px;
        }

        .card {
            background: #1f2340;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
        }

        .card-header {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 16px;
        }

        /* Match Details Grid */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 12px;
            text-align: center;
        }

        .stat .label {
            font-size: 12px;
            color: #9aa3b2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat .val {
            margin-top: 6px;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .small-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 12px;
            text-align: center;
        }

        .small-grid .slabel {
            font-size: 12px;
            color: #9aa3b2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .small-grid .sval {
            margin-top: 6px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 14px;
            color: white;
        }

        /* Enhanced Prize Distribution Styles */
        .prize-list-enhanced {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .prize-item-enhanced {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid #3f3ef2;
        }

        .prize-icon {
            font-size: 16px;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .prize-content {
            flex: 1;
        }

        .prize-text {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
        }

        /* Rules and Details Enhanced Styles */
        .details-list-enhanced {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .details-item-enhanced {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .details-icon {
            font-size: 14px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .details-content {
            flex: 1;
        }

        .details-text {
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Room Credentials Enhanced Styles */
        .credential-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .credential-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: linear-gradient(135deg, rgba(63, 62, 242, 0.1), rgba(139, 92, 246, 0.1));
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            backdrop-filter: blur(10px);
        }

        .credential-info {
            flex: 1;
        }

        .credential-label {
            font-size: 12px;
            color: #cbd5e1;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .credential-value {
            font-size: 16px;
            color: white;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: inline-block;
            min-width: 120px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #3f3ef2, #6366f1);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            min-width: 90px;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .copy-btn:hover {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(63, 62, 242, 0.4);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .copy-btn.copied {
            background: linear-gradient(135deg, #10b981, #34d399);
        }

        .copy-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }

        .copy-btn i {
            font-size: 14px;
        }

        /* Status badges */
        .live-badge {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite;
            margin-left: 10px;
        }

        .upcoming-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 10px;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }
            70% {
                box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        /* Participants Table */
        .participants-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            table-layout: fixed;
        }

        .participants-table th,
        .participants-table td {
            padding: 12px;
            border-bottom: 1px solid #1f2340;
            text-align: left;
            font-size: 14px;
        }

        .pos-tag {
            font-weight: 800;
            color: #f97316;
        }

        .participant-ign {
            padding: 4px 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            display: inline-block;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Loading state */
        #mainContentContainer {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3f3ef2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
/* Match Live Popup Styles */
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(11, 16, 32, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
}

.popup-content {
    background: linear-gradient(135deg, #1f2340, #111827);
    border-radius: 20px;
    border: 2px solid #3f3ef2;
    box-shadow: 0 20px 60px rgba(63, 62, 242, 0.3);
    max-width: 450px;
    width: 100%;
    animation: popupSlideIn 0.3s ease-out;
}

@keyframes popupSlideIn {
    from {
        opacity: 0;
        transform: scale(0.9) translateY(-20px);
    }
    to {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

.popup-header {
    display: flex;
    align-items: center;
    padding: 24px 24px 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
}

.popup-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 16px;
}

.popup-icon i {
    font-size: 20px;
    color: white;
}

.popup-title {
    font-size: 24px;
    font-weight: 700;
    color: white;
    margin: 0;
    flex: 1;
}

.popup-close {
    background: none;
    border: none;
    color: #9ca3af;
    font-size: 24px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.2s;
}

.popup-close:hover {
    color: white;
    background: rgba(255, 255, 255, 0.1);
}

.popup-body {
    padding: 24px;
}

.popup-message {
    color: #e5e7eb;
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 24px;
    text-align: center;
}

.popup-credentials {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 20px;
}

.popup-credential-item {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.popup-credential-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #cbd5e1;
    font-weight: 600;
    font-size: 14px;
    min-width: 100px;
}

.popup-credential-label i {
    color: #3f3ef2;
}

.popup-credential-value {
    flex: 1;
    color: white;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    letter-spacing: 1px;
    padding: 0 12px;
}

.popup-copy-btn {
    background: linear-gradient(135deg, #3f3ef2, #6366f1);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s ease;
    min-width: 44px;
}

.popup-copy-btn:hover {
    background: linear-gradient(135deg, #6366f1, #818cf8);
    transform: translateY(-1px);
}

.popup-copy-btn.copied {
    background: linear-gradient(135deg, #10b981, #34d399);
}

.popup-tip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: rgba(59, 130, 246, 0.1);
    border-radius: 8px;
    border-left: 3px solid #3b82f6;
}

.popup-tip i {
    color: #3b82f6;
    font-size: 14px;
}

.popup-tip span {
    color: #93c5fd;
    font-size: 14px;
    font-weight: 500;
}

.popup-footer {
    display: flex;
    gap: 12px;
    padding: 16px 24px 24px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.popup-action-btn {
    flex: 1;
    background: linear-gradient(135deg, #10b981, #06b6d4);
    color: white;
    border: none;
    padding: 14px 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s ease;
}

.popup-action-btn:hover {
    background: linear-gradient(135deg, #34d399, #22d3ee);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
}

.popup-secondary-btn {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 14px 24px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.popup-secondary-btn:hover {
    background: rgba(255, 255, 255, 0.2);
}
    </style>
</head>

<body>

    <div class="topbar">
        <button class="back-btn" id="backBtn"><i class="fa fa-arrow-left text-xl"></i></button>

        <div class="header-center">
            <div class="header-title-row">
                <img src="https://i.ibb.co/Y7SksQy9/IMG-20250830-082315-071.jpg" alt="App Logo">
                <div class="page-title">Match Details</div>
            </div>
            <div class="match-id-text" id="matchIdDisplay">ID: Loading...</div>
        </div>

        <button class="participants-btn" id="participantsIconBtn" onclick="switchTab('participants')">
            <i class="fa-solid fa-users text-green-400 text-xl"></i>
        </button>
    </div>

    <div id="mainContentContainer">
        <div class="spinner"></div>
    </div>


    <template id="matchDetailsTemplate">
        <div>
            <div class="banner">
                <img id="matchBannerImg" src="https://via.placeholder.com/600x338" alt="Match Banner">
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" id="tabBtnDetails" onclick="switchTab('details')">Match Details</button>
                <button class="tab-btn" id="tabBtnRules" onclick="switchTab('rules')">Rules</button>
                <button class="tab-btn" id="tabBtnParticipants" onclick="switchTab('participants')">Participants</button>
            </div>

            <div class="content-section">

                <div id="details-content">
                    <div class="card">
                        <div class="card-header"><i class="fa-solid fa-info-circle text-blue-400"></i> Match Details</div>
                        <div class="stat-grid">
                            <div class="stat">
                                <div class="label">Prize Pool</div>
                                <div class="val"><i class="fa-solid fa-trophy text-yellow-400"></i> <span id="prizePool">₹0</span></div>
                            </div>
                            <div class="stat">
                                <div class="label">Per Kill</div>
                                <div class="val"><i class="fa-solid fa-skull text-red-400"></i> <span id="perKill">₹0</span></div>
                            </div>
                            <div class="stat">
                                <div class="label">Entry Fee</div>
                                <div class="val"><i class="fa-solid fa-coins text-yellow-400"></i> <span id="entryFee">₹0</span></div>
                            </div>
                        </div>
                        <div class="small-grid">
                            <div>
                                <div class="slabel">Type</div>
                                <div class="sval"><span id="typeIcon"></span> <span id="matchType">N/A</span></div>
                            </div>
                            <div>
                                <div class="slabel">Platform</div>
                                <div class="sval"><i class="fa-solid fa-mobile-screen-button text-green-400"></i> <span id="matchPlatform">Mobile</span></div>
                            </div>
                            <div>
                                <div class="slabel">Map</div>
                                <div class="sval"><i class="fa-solid fa-map text-purple-400"></i> <span id="matchMap">N/A</span></div>
                            </div>
                        </div>
                    </div>

                    <!-- Room Credentials Card - Only shown to joined users when match is ongoing -->
                    <div class="card" id="roomCredentialsCard" style="display: none;">
                        <div class="card-header">
                            <i class="fa-solid fa-key text-green-400"></i> Room Credentials
                            <span id="roomStatusBadge" class="live-badge">LIVE</span>
                        </div>
                        <div class="credential-container">
                            <div class="credential-item">
                                <div class="credential-info">
                                    <div class="credential-label">Room ID</div>
                                    <div class="credential-value" id="roomIdValue">Not available yet</div>
                                </div>
                                <button class="copy-btn" id="copyRoomIdBtn" data-copy="">
                                    <i class="fa-regular fa-copy"></i> Copy ID
                                </button>
                            </div>
                            <div class="credential-item">
                                <div class="credential-info">
                                    <div class="credential-label">Room Password</div>
                                    <div class="credential-value" id="roomPassValue">Not available yet</div>
                                </div>
                                <button class="copy-btn" id="copyRoomPassBtn" data-copy="">
                                    <i class="fa-regular fa-copy"></i> Copy Password
                                </button>
                            </div>
                        </div>
                        <div style="margin-top: 12px; padding: 8px 12px; background: rgba(59, 130, 246, 0.1); border-radius: 6px; border-left: 3px solid #3b82f6;">
                            <p style="color: #93c5fd; font-size: 12px; margin: 0; display: flex; align-items: center; gap: 6px;">
                                <i class="fa-solid fa-info-circle"></i>
                                Join the room using these credentials!
                            </p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><i class="fa-solid fa-gift text-pink-400"></i> Prize Pool Distribution</div>
                        <div id="prizeDistributionList">
                            <div id="prizeDistributionContent">
                                <p style="color:#9aa3b2; font-size:14px; text-align:center;">Prize distribution details are not available yet.</p>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><i class="fa-solid fa-clock text-green-400"></i> Match Timings</div>
                        <div id="matchTimingsContent">
                            <p style="color:#9aa3b2; font-size:14px; text-align:center;">Match timing details are not available yet.</p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><i class="fa-solid fa-cog text-orange-400"></i> Match Settings</div>
                        <div id="matchSettingsContent">
                            <p style="color:#9aa3b2; font-size:14px; text-align:center;">Match settings details are not available yet.</p>
                        </div>
                    </div>
                </div>

                <div id="rules-content" style="display: none;">
                    <div class="card">
                        <div class="card-header"><i class="fa-solid fa-list-check text-orange-400"></i> Official Rules</div>
                        <div id="rulesListContent">
                            <p style="color:#9aa3b2; font-size:14px; text-align:center;">No rules specified by the admin.</p>
                        </div>
                    </div>
                </div>

                <div id="participants-content" style="display: none;">
                    <div class="card">
                        <div class="card-header"><i class="fa-solid fa-users text-green-400"></i> Participants List (<span id="playerCount">0</span>/<span id="slotCount">0</span>)</div>
                        <table class="participants-table">

    /**
     * Enhanced copy handler with fallback for non-HTTPS
     */
    function setupCopyButtons() {
        const copyRoomIdBtn = document.getElementById('copyRoomIdBtn');
        const copyRoomPassBtn = document.getElementById('copyRoomPassBtn');

        if (copyRoomIdBtn) {
            copyRoomIdBtn.addEventListener('click', function() {
                const value = this.getAttribute('data-copy');
                if (value) {
                    copyToClipboard(value, this);
                }
            });
        }

        if (copyRoomPassBtn) {
            copyRoomPassBtn.addEventListener('click', function() {
                const value = this.getAttribute('data-copy');
                if (value) {
                    copyToClipboard(value, this);
                }
            });
        }
    }

    /**
     * Universal clipboard copy function with fallback
     */
    function copyToClipboard(text, button) {
        // Modern clipboard API (works on HTTPS and localhost)
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => {
                showCopySuccess(button);
            }).catch(err => {
                console.error('Clipboard API failed:', err);
                useFallbackCopy(text, button);
            });
        } else {
            // Fallback for non-HTTPS
            useFallbackCopy(text, button);
        }
    }

    /**
     * Fallback copy method using textarea
     */
    function useFallbackCopy(text, button) {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        
        // Make the textarea out of viewport
        textArea.style.position = 'fixed';
        textArea.style.left = '-999999px';
        textArea.style.top = '-999999px';
        document.body.appendChild(textArea);
        
        textArea.focus();
        textArea.select();
        
        try {
            const successful = document.execCommand('copy');
            document.body.removeChild(textArea);
            
            if (successful) {
                showCopySuccess(button);
            } else {
                showCopyError(button, 'Copy failed. Please copy manually.');
            }
        } catch (err) {
            document.body.removeChild(textArea);
            showCopyError(button, 'Copy not supported. Please copy manually: ' + text);
        }
    }

    /**
     * Show copy success animation
     */
    function showCopySuccess(button) {
        const originalHtml = button.innerHTML;
        const originalText = button.querySelector('span') ? button.querySelector('span').textContent : 'Copy';
        
        button.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
        button.classList.add('copied');
        
        setTimeout(() => {
            button.innerHTML = originalHtml;
            button.classList.remove('copied');
        }, 2000);
    }

    /**
     * Show copy error message
     */
    function showCopyError(button, message) {
        const originalHtml = button.innerHTML;
        
        button.innerHTML = '<i class="fa-solid fa-xmark"></i> Error';
        button.style.background = '#ef4444';
        
        // Show alert for manual copy
        alert(message);
        
        setTimeout(() => {
            button.innerHTML = originalHtml;
            button.style.background = '';
        }, 2000);
    }

    /**
     * Loads match details from Firebase and renders them.
     */
    async function loadMatchDetails() {
        const matchKey = getMatchKeyFromUrl();
        CURRENT_MATCH_KEY = matchKey;
        const contentDiv = document.getElementById('mainContentContainer');

        if (!matchKey) {
            contentDiv.innerHTML = `<p style="text-align:center; color:#ef4444; padding:40px;">Error: No match ID provided in the URL.</p>`;
            document.getElementById('matchIdDisplay').textContent = "ID: Error";
            return;
        }

        try {
            const snapshot = await database.ref('matches/' + matchKey).once('value');
            const match = snapshot.val();

            if (!match) {
                contentDiv.innerHTML = `<p style="text-align:center; color:#ef4444; padding:40px;">Match not found.</p>`;
                document.getElementById('matchIdDisplay').textContent = "ID: N/A";
                return;
            }

            // 1. Render HTML from Template
            const template = document.getElementById('matchDetailsTemplate');
            const clone = template.content.cloneNode(true);
            contentDiv.innerHTML = '';
            contentDiv.appendChild(clone);

            // 2. Initial Setup (Header & Tabs)
            document.getElementById('matchIdDisplay').textContent = `ID: ${match.matchId || 'N/A'}`;
            document.getElementById('htmlTitle').textContent = `${match.name || 'Match'} Details`;

            // 3. Update Banner
            document.getElementById('matchBannerImg').src = match.banner || 'https://via.placeholder.com/600x338';

            // 4. Update Match Details (Stats)
            document.getElementById('prizePool').textContent = `₹${parseFloat(match.prizePool || 0).toFixed(0).toLocaleString()}`;
            document.getElementById('perKill').textContent = `₹${parseFloat(match.perKill || 0).toFixed(0)}`;
            document.getElementById('entryFee').textContent = `₹${parseFloat(match.entryFee || 0).toFixed(0)}`;

            const matchType = (match.type || 'N/A').toUpperCase();
            document.getElementById('matchType').textContent = matchType;
            let typeIcon = '';
            if (matchType === 'DUO') typeIcon = '<i class="fa-solid fa-user-group text-blue-400"></i>';
            else if (matchType === 'SQUAD') typeIcon = '<i class="fa-solid fa-people-group text-blue-400"></i>';
            else typeIcon = '<i class="fa-solid fa-user text-blue-400"></i>';
            document.getElementById('typeIcon').innerHTML = typeIcon;

            document.getElementById('matchPlatform').textContent = match.platform || 'Phone';
            document.getElementById('matchMap').textContent = match.map || 'N/A';

            // 5. Update Prize Distribution
            renderPrizeDistribution(match.prizeDistribution || '');

            // 6. Update Rules with different icons
            renderRulesWithIcons(match.rules || '');

            // 7. Update Match Timings (Additional timing details)
            renderTextWithBullets(match.matchTimings || '', 'matchTimingsContent', 'fa-clock', '#10b981');

            // 8. Update Match Settings
            renderTextWithBullets(match.matchSettings || '', 'matchSettingsContent', 'fa-cog', '#f97316');

            // 9. Check authentication and room credentials visibility
            const roomCredentialsCard = document.getElementById('roomCredentialsCard');
            const roomIdValue = document.getElementById('roomIdValue');
            const roomPassValue = document.getElementById('roomPassValue');
            const copyRoomIdBtn = document.getElementById('copyRoomIdBtn');
            const copyRoomPassBtn = document.getElementById('copyRoomPassBtn');
            const roomStatusBadge = document.getElementById('roomStatusBadge');

            // Get current user
            currentUser = auth.currentUser;

            if (currentUser && match.status === 'ongoing') {
                // Check if current user has joined this match
                const userHasJoined = await hasUserJoinedMatch(matchKey, currentUser.uid);
                
                if (userHasJoined && match.roomId && match.roomPassword) {
                    // User has joined AND match is ongoing AND credentials exist - SHOW ROOM CREDENTIALS
                    
                    // Show in the card
                    roomIdValue.textContent = match.roomId;
                    roomIdValue.style.color = '#ffffff';
                    roomIdValue.style.background = 'rgba(34, 197, 94, 0.2)';
                    roomIdValue.style.border = '1px solid rgba(34, 197, 94, 0.4)';
                    
                    roomPassValue.textContent = match.roomPassword;
                    roomPassValue.style.color = '#ffffff';
                    roomPassValue.style.background = 'rgba(34, 197, 94, 0.2)';
                    roomPassValue.style.border = '1px solid rgba(34, 197, 94, 0.4)';
                    
                    // Update copy button data
                    copyRoomIdBtn.setAttribute('data-copy', match.roomId);
                    copyRoomPassBtn.setAttribute('data-copy', match.roomPassword);
                    
                    // Enable buttons
                    copyRoomIdBtn.disabled = false;
                    copyRoomPassBtn.disabled = false;
                    
                    // Update status badge
                    roomStatusBadge.textContent = 'LIVE';
                    roomStatusBadge.className = 'live-badge';
                    
                    roomCredentialsCard.style.display = 'block';
                    
                    // Setup copy buttons after credentials are loaded
                    setTimeout(() => {
                        setupCopyButtons();
                    }, 100);
                    
                    // 🎯 SHOW THE POPUP!
                    setTimeout(() => {
                        showMatchLivePopup(match.roomId, match.roomPassword);
                    }, 500); // Small delay to let the page load first
                    
                } else {
                    // User hasn't joined or credentials not available - HIDE ROOM CREDENTIALS
                    roomCredentialsCard.style.display = 'none';
                }
            } else {
                // User not logged in or match not ongoing - HIDE ROOM CREDENTIALS
                roomCredentialsCard.style.display = 'none';
            }

            // 10. Load Participants (Set the counts now, load data when tab is switched)
            document.getElementById('slotCount').textContent = match.slots || 0;

        } catch (error) {
            console.error("Error fetching match data:", error);
            contentDiv.innerHTML = `<p style="text-align:center; color:#ef4444; padding:40px;">Failed to load match data: ${error.message}</p>`;
        }
    }

    /**
     * Fetches and displays the list of participants.
     * This is called when the 'Participants' tab is clicked.
     */
    function loadParticipants(matchKey) {
        const tbody = document.getElementById('participantsTableBody');
        const playerCountDisplay = document.getElementById('playerCount');
        
        if (!tbody) {
            console.error("participantsTableBody not found");
            return;
        }
        
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Loading participants...</td></tr>';

        database.ref(`joinedPlayers/${matchKey}`).once('value')
            .then(snapshot => {
                const players = snapshot.val();

                if (!players) {
                    playerCountDisplay.textContent = '0';
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No players have joined yet.</td></tr>';
                    return;
                }

                const playerArray = Object.keys(players).map(uid => ({
                    uid: uid,
                    ...players[uid]
                }));

                playerArray.sort((a, b) => a.joinedAt - b.joinedAt);

                playerCountDisplay.textContent = playerArray.length;
                tbody.innerHTML = ''; // Clear loading row

                const fetchPromises = playerArray.map((player) => {
                    if (player.ign) {
                        return Promise.resolve({
                            ...player,
                            finalIgn: player.ign
                        });
                    }

                    return database.ref(`users/${player.uid}/ign`).once('value').then(ignSnap => {
                        return {
                            ...player,
                            finalIgn: ignSnap.val() || 'IGN N/A'
                        };
                    });
                });

                Promise.all(fetchPromises).then(finalPlayers => {

                    finalPlayers.forEach((player, index) => {
                        const position = index + 1;

                        const row = document.createElement('tr');
                        row.innerHTML = `
                    <td><span class="pos-tag">#${position}</span></td>
                    <td style="text-align:center;"><span class="participant-ign">${player.finalIgn}</span></td> 
                    <td style="text-align:right;">
                        <a href="view-profile.html?uid=${player.uid}" class="text-blue-400 hover:text-blue-200" title="View Profile">
                            <i class="fa-solid fa-eye text-xl"></i>
                        </a>
                    </td>
                `;
                        tbody.appendChild(row);
                    });
                });

            })
            .catch(error => {
                console.error("Error loading participants:", error);
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#ef4444;">Failed to load participants.</td></tr>';
            });
    }

    document.addEventListener('DOMContentLoaded', () => {

    /**

    window.switchTab = function(tabName) {

        document.getElementById('details-content').style.display = 'none';
        document.getElementById('rules-content').style.display = 'none';
        document.getElementById('participants-content').style.display = 'none';

        document.getElementById('tabBtnDetails').classList.remove('active');
        document.getElementById('tabBtnRules').classList.remove('active');
        document.getElementById('tabBtnParticipants').classList.remove('active');

        // Show selected content and add active class to button
        if (tabName === 'details') {
            document.getElementById('details-content').style.display = 'block';
            document.getElementById('tabBtnDetails').classList.add('active');
        } else if (tabName === 'rules') {
            document.getElementById('rules-content').style.display = 'block';
            document.getElementById('tabBtnRules').classList.add('active');
        } else if (tabName === 'participants') {
            document.getElementById('participants-content').style.display = 'block';
            document.getElementById('tabBtnParticipants').classList.add('active');
            // Load/refresh participants data when the tab is opened
            const matchKey = getMatchKeyFromUrl();
            loadParticipants(matchKey);
        }
    };

    // Navigation button
    document.getElementById('backBtn').addEventListener('click', () => {
        if (document.referrer && new URL(document.referrer).hostname === window.location.hostname) {
            window.history.back();
        } else {
            window.location.href = 'tournaments.html';
        }
    });
</script>
