<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tournaments · ElitePros</title>

  <!-- Firebase Auth only (no database) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  
  <!-- Tailwind & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    :root{
      --bg-dark: #0b1020;
      --card-bg: #1f2340;
      --card-dark: #121322;
      --accent: #3f3ef2;
      --muted: #9aa3b2;
      --header-bg: #111827;
      --wallet-bg: #1f2937;
      --joined-color: #0d9488;
    }

    body { 
      background: var(--bg-dark); 
      color: #fff; 
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Skeleton shimmer */
    .skeleton-shimmer {
      background: linear-gradient(90deg, 
        rgba(255, 255, 255, 0.05) 25%, 
        rgba(255, 255, 255, 0.1) 50%, 
        rgba(255, 255, 255, 0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
    }
    
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Topbar */
    .topbar { 
      background: var(--header-bg); 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 12px 16px; 
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    
    .back-btn { 
      width: 40px; 
      height: 40px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      border-radius: 10px; 
      background: rgba(255,255,255,0.05);
      cursor: pointer; 
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .back-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .top-title { 
      font-weight: 700; 
      font-size: 16px;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      flex: 1;
      margin: 0 10px;
    }

    /* Wallet button */
    .wallet-btn {
        background: linear-gradient(135deg, var(--wallet-bg), #111827);
        padding: 0.4rem 0.7rem;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        border: 1px solid rgba(255,255,255,0.1);
        transition: all 0.3s ease;
        min-width: 80px;
        justify-content: center;
    }
    
    .wallet-btn:hover {
        transform: translateY(-2px);
    }
    
    .wallet-balance {
        margin-left: 0.4rem;
        font-weight: 700;
        font-size: 13px;
        color: #facc15;
    }

    .wallet-loading {
        margin-left: 0.4rem;
        font-weight: 600;
        font-size: 12px;
        color: #9ca3af;
    }

    /* Tabs */
    .tabs { 
      display: flex; 
      gap: 8px; 
      padding: 16px; 
      justify-content: space-between;
      background: var(--bg-dark);
      position: sticky;
      top: 64px;
      z-index: 90;
      backdrop-filter: blur(10px);
    }
    
    .tab { 
      padding: 10px 14px; 
      border-radius: 10px; 
      background: rgba(255,255,255,0.03); 
      color: #cbd5e1; 
      cursor: pointer; 
      font-weight: 700; 
      text-align: center; 
      flex: 1;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 12px;
      letter-spacing: 0.3px;
    }
    
    .tab:hover {
      background: rgba(255,255,255,0.08);
    }
    
    .tab.active { 
      background: linear-gradient(135deg, #3f3ef2, #6366f1); 
      color: white; 
      box-shadow: 0 8px 25px rgba(63,62,242,0.25);
    }

    /* Tournament card */
    .tournament-card { 
      border-radius: 16px; 
      overflow: hidden; 
      background: linear-gradient(135deg, #1f2340 0%, #121322 100%); 
      border: 1px solid rgba(255,255,255,0.08); 
      box-shadow: 0 8px 30px rgba(2,6,23,0.7); 
      margin: 16px 16px; 
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .tournament-card:hover {
      transform: translateY(-3px);
      border-color: rgba(63, 62, 242, 0.3);
    }

    /* Banner container - fixed height approach instead of aspect ratio */
    .banner-container { 
      position: relative;
      width: 100%;
      height: 200px; /* Fixed height for consistency */
      overflow: hidden;
      background: #0b1020;
    }
    
    .banner-container img { 
      width: 100%; 
      height: 100%; 
      display: block; 
      object-fit: cover; /* This ensures image covers the area without distortion */
      object-position: center;
      transition: transform 0.3s ease;
    }
    
    .tournament-card:hover .banner-container img {
      transform: scale(1.02);
    }

    /* Alternative: If you want to maintain the exact 720x1680 ratio but fit properly */
    .banner-wrap-ratio { 
      position: relative;
      overflow: hidden;
      height: 0;
      padding-top: 233.33%; /* 1680/720 * 100% */
      background: #0b1020;
    }
    
    .banner-wrap-ratio img { 
      position: absolute;
      top: 0;
      left: 0;
      width: 100%; 
      height: 100%; 
      display: block; 
      object-fit: contain; /* Changed from cover to contain to show full image */
      background: #0b1020;
      transition: transform 0.3s ease;
    }

    .status-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      padding: 5px 10px;
      border-radius: 16px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      z-index: 10;
      box-shadow: 0 4px 12px rgba(239,68,68,0.3);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .details { 
      background: var(--card-bg); 
      padding: 18px;
      border-top-left-radius: 16px; 
      border-top-right-radius: 16px; 
      position: relative;
      margin-top: -16px;
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
    }
    
    .org-icon { 
      width: 50px; 
      height: 50px; 
      border-radius: 50%; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      background: #0b1226; 
      border: 2px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    
    .org-icon img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .title-row { 
      display: flex; 
      gap: 12px; 
      align-items: flex-start; 
      margin-bottom: 14px;
    }
    
    .title-left { flex: 1; }
    .title-h { font-size: 16px; font-weight: 800; color: #ffffff; line-height: 1.2; margin-bottom: 6px; }
    
    .match-info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    
    .match-id {
      color: #a5b4fc;
      font-weight: 600;
      font-size: 12px;
      background: rgba(165, 180, 252, 0.1);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .schedule-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      color: #e5e7eb;
      font-size: 12px;
      font-weight: 600;
    }
    .schedule-icon { color: #f59e0b; }

    /* Fixed stat grid with equal height and centered content */
    .stat-grid { 
      display: grid; 
      grid-template-columns: repeat(3,1fr); 
      gap: 12px; 
      margin: 16px 0;
    }
    
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 70px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 8px 4px;
    }
    
    .stat .label { 
      font-size: 10px; 
      color: var(--muted); 
      text-transform: uppercase; 
      font-weight: 600; 
      margin-bottom: 6px;
    }
    
    .stat .val { 
      font-weight: 800; 
      color: white; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      gap: 6px; 
      font-size: 14px;
    }

    .small-grid { 
      display: grid; 
      grid-template-columns: repeat(3,1fr); 
      gap: 12px; 
      margin: 14px 0;
    }
    
    .small-grid > div {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 60px;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      padding: 6px 2px;
    }
    
    .small-grid .slabel { 
      font-size: 10px; 
      color: var(--muted); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 4px; 
      text-transform: uppercase; 
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .small-grid .sval { 
      font-weight: 700; 
      color: white; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 6px; 
      font-size: 13px;
    }

    .progress-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      justify-content: space-between;
    }
    .progress-wrapper { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .slots-text { color: #cbd5e1; font-size: 11px; font-weight: 600; }
    .progress-track { 
      width: 100%; background: #111827; height: 8px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden; 
    }
    .progress-fill { 
      height: 100%; background: linear-gradient(90deg, #10b981, #4ade80); width: 0%; transition: width 0.6s ease; border-radius: 10px;
    }

    .join-btn { 
      padding: 12px 16px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; font-size: 14px; transition: all 0.3s ease;
    }
    .join-btn.joinable { background: linear-gradient(135deg, #10b981, #059669); }
    .join-btn.joinable:hover { background: linear-gradient(135deg, #34d399, #10b981); }
    .join-btn.joined { background: linear-gradient(135deg, #0d9488, #0f766e); cursor: default; }
    .join-btn.full { background: linear-gradient(135deg, #f59e0b, #d97706); cursor: not-allowed; }
    .full-note { color: #ff4d4f; font-weight: 700; font-size: 12px; margin-top: 8px; text-align: center; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 20px;
    }
    .empty-icon { font-size: 60px; margin-bottom: 16px; opacity: 0.6; color: #6366f1; }
    .empty-message { font-size: 16px; font-weight: 600; color: #cbd5e1; }

    /* Skeleton card - updated to match new banner height */
    .skeleton-card {
      margin: 16px;
      border-radius: 16px;
      overflow: hidden;
      background: var(--card-bg);
    }
    .skeleton-banner { 
      width: 100%; 
      height: 200px; /* Match fixed height */
      background: rgba(255,255,255,0.05); 
    }
    .skeleton-details { padding: 18px; }
    .skeleton-title { height: 20px; width: 70%; margin-bottom: 12px; }
    .skeleton-meta { height: 16px; width: 40%; margin-bottom: 16px; }
    .skeleton-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 16px 0; }
    .skeleton-stat { height: 70px; }
    .skeleton-progress { height: 8px; margin: 16px 0; border-radius: 10px; }
    .skeleton-btn { height: 48px; border-radius: 12px; margin-top: 14px; }

    .infinite-trigger {
      height: 20px;
      margin: 10px 0 30px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* Banner image error fallback */
    .banner-container img[src=""], 
    .banner-container img:not([src]) {
      opacity: 0;
    }
    
    .banner-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1f2340, #121322);
      display: none;
    }
    
    .banner-container img[src=""] + .banner-container::after,
    .banner-container img:not([src]) + .banner-container::after {
      display: block;
    }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <div class="topbar" id="mainHeader">
    <button class="back-btn" id="backBtn"><i class="fa fa-arrow-left text-xl"></i></button>
    <div class="top-title" id="pageTitle">ElitePros!</div>
    <div class="flex items-center gap-3">
      <button class="wallet-btn" id="walletBtn">
        <i class="fa-solid fa-wallet text-yellow-400 text-xl"></i>
        <div class="wallet-loading" id="topWallet">Loading...</div>
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab" data-tab="ongoing">ONGOING</div> 
    <div class="tab active" data-tab="upcoming">UPCOMING</div>
    <div class="tab" data-tab="completed">COMPLETED</div>
  </div>

  <!-- List container -->
  <div id="listContainer" class="pb-28"></div>

  <!-- Infinite scroll trigger -->
  <div id="infiniteTrigger" class="infinite-trigger"></div>

<script>
  // ==================== CONFIG ====================
  const firebaseConfig = {
    apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
    authDomain: "eliteprosofficial.firebaseapp.com",
    databaseURL: "https://eliteprosofficial-default-rtdb.firebaseio.com",
    projectId: "eliteprosofficial",
    storageBucket: "eliteprosofficial.firebasestorage.app",
    messagingSenderId: "646561207100",
    appId: "1:646561207100:web:47de7b648695367e208439",
    measurementId: "G-ZN5VNFCSEL"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ==================== STATE ====================
  const BACKEND_URL = 'https://elitepros-backend.onrender.com';
  const container = document.getElementById('listContainer');
  const infiniteTrigger = document.getElementById('infiniteTrigger');
  const pageTitle = document.getElementById('pageTitle');
  const topWallet = document.getElementById('topWallet');
  
  // Get game mode from localStorage
  let selectedGameMode = localStorage.getItem('selectedGameMode') || 'FF SURVIVAL';
  pageTitle.textContent = selectedGameMode;

  let currentUser = null;
  let idToken = null;

  // Tab management with independent state
  let currentTab = 'upcoming';
  const tabs = {
    upcoming: { 
      list: [], 
      cursor: null, 
      hasMore: true, 
      loading: false,
      abortController: null 
    },
    ongoing: {  
      list: [], 
      cursor: null, 
      hasMore: true, 
      loading: false,
      abortController: null 
    },
    completed: {
      list: [], 
      cursor: null, 
      hasMore: true, 
      loading: false,
      abortController: null 
    }
  };
  const LIMIT = 10;

  // Intersection observer for infinite scroll
  let observer = null;

  // ==================== API HELPER ====================
  async function apiFetch(endpoint, signal) {
    if (!idToken) throw new Error('No idToken available');
    const res = await fetch(BACKEND_URL + endpoint, {
      headers: { 'Authorization': `Bearer ${idToken}` },
      signal
    });
    if (res.status === 401) {
      window.location.href = 'login.html';
      return null;
    }
    if (!res.ok) throw new Error(`API error ${res.status}`);
    return res.json();
  }

  // ==================== LOAD WALLET ====================
  async function loadWallet() {
    try {
      const data = await apiFetch('/api/wallet');
      const wallet = data.wallet || { total:0 };
      topWallet.innerText = `₹${(wallet.total || 0).toFixed(0)}`;
      topWallet.className = 'wallet-balance';
    } catch (e) {
      console.warn('wallet fetch failed', e);
      topWallet.innerText = '₹0';
      topWallet.className = 'wallet-balance';
    }
  }

  // ==================== FETCH MATCHES ====================
  async function loadTabMatches(tab, append = false) {
    const state = tabs[tab];
    
    // Cancel any in-flight request for this tab
    if (state.abortController) {
      state.abortController.abort();
    }
    
    // Create new abort controller
    state.abortController = new AbortController();
    const signal = state.abortController.signal;

    if (state.loading || !state.hasMore) return;
    state.loading = true;

    // Show skeletons only if no data
    if (!append || container.children.length === 0) {
      renderSkeletons(3);
    }

    try {
      let url = `/api/matches?status=${tab}&limit=${LIMIT}`;
      if (state.cursor) url += `&cursor=${encodeURIComponent(state.cursor)}`;

      const data = await apiFetch(url, signal);
      
      // Check if this request was aborted
      if (signal.aborted) return;
      
      const matches = data.matches || [];
      const nextCursor = data.nextCursor || null;

      if (append) {
        state.list = [...state.list, ...matches];
      } else {
        state.list = matches;
      }
      
      state.cursor = nextCursor;
      state.hasMore = nextCursor !== null && matches.length === LIMIT;

      // Only render if this is still the current tab
      if (tab === currentTab) {
        renderCurrentTab();
      }
    } catch (err) {
      if (err.name === 'AbortError') {
        console.log(`Fetch aborted for ${tab} tab`);
        return;
      }
      console.error(`load ${tab} error`, err);
    } finally {
      state.loading = false;
      state.abortController = null;
    }
  }

  // ==================== RENDER CURRENT TAB ====================
  function renderCurrentTab() {
    const state = tabs[currentTab];
    const matches = state.list;

    container.innerHTML = '';

    if (!matches || matches.length === 0) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon"><i class="fas fa-search"></i></div>
        <div class="empty-message">No ${currentTab} matches</div>
      </div>`;
      return;
    }

    // Use document fragment for better performance
    const fragment = document.createDocumentFragment();
    matches.forEach(m => {
      const card = createMatchCard(m);
      fragment.appendChild(card);
    });
    container.appendChild(fragment);
  }

  // Create one match card (pure function)
  function createMatchCard(m) {
    const card = document.createElement('div');
    card.className = 'tournament-card';
    card.dataset.matchId = m.id;

    // Type icon
    let typeIcon = '<i class="fa-solid fa-user text-blue-400"></i>';
    const type = (m.type || 'solo').toLowerCase();
    if (type === 'duo') typeIcon = '<i class="fa-solid fa-user-group text-blue-400"></i>';
    if (type === 'squad') typeIcon = '<i class="fa-solid fa-people-group text-blue-400"></i>';

    const slotsFilled = m.joinedCount || 0;
    const slotsTotal = m.slots || 0;
    const isFull = slotsFilled >= slotsTotal;
    const isJoined = m.isJoined === true;
    const progressPercent = slotsTotal ? Math.min(100, (slotsFilled / slotsTotal) * 100) : 0;

    // Format schedule time
    const scheduleTime = m.scheduleTime ? new Date(m.scheduleTime) : new Date();
    const timeStr = scheduleTime.toLocaleString('en-IN', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: true
    }).replace(/,/, ' at');

    // Button HTML based on tab
    let btnHTML = '';
    let fullNote = 'none';
    
    if (currentTab === 'upcoming') {
      let btnClass = '', btnText = '', btnIcon = '';
      if (isJoined) {
        btnClass = 'joined'; btnText = 'JOINED'; btnIcon = 'fa-check-circle';
      } else if (isFull) {
        btnClass = 'full'; btnText = 'MATCH FULL'; btnIcon = 'fa-users-slash';
        fullNote = 'block';
      } else {
        btnClass = 'joinable'; btnText = 'JOIN NOW'; btnIcon = 'fa-play-circle';
      }
      btnHTML = `<button class="join-btn ${btnClass}" data-id="${m.id}"><i class="fa-solid ${btnIcon}"></i>${btnText}</button>`;
    } else if (currentTab === 'ongoing') {
      btnHTML = `<button class="join-btn joinable" data-id="${m.id}"><i class="fa-solid fa-eye"></i> VIEW DETAILS</button>`;
    } else {
      btnHTML = `<button class="join-btn joinable" data-id="${m.id}"><i class="fa-solid fa-trophy text-yellow-400"></i> VIEW RESULTS</button>`;
    }

    // Status badge for ongoing
    let statusBadge = (currentTab === 'ongoing') ? '<div class="status-badge">LIVE</div>' : '';

    // Use banner from API or fallback
    const bannerUrl = m.banner || 'https://via.placeholder.com/720x1680?text=No+Banner';
    
    // FIXED: Using fixed height container with object-fit: cover for consistent display
    card.innerHTML = `
      <div class="banner-container">
        ${statusBadge}
        <img src="${bannerUrl}" 
             alt="tournament banner" 
             loading="lazy"
             onerror="this.src='https://via.placeholder.com/720x1680?text=Image+Error'; this.onerror=null;" />
      </div>
      <div class="details">
        <div class="title-row">
          <div class="org-icon"><img src="https://i.ibb.co/Y7SksQy9/IMG-20250830-082315-071.jpg" alt="org" loading="lazy" onerror="this.src='https://via.placeholder.com/50';" /></div>
          <div class="title-left">
            <div class="title-h">${m.name || 'Match'}</div>
            <div class="match-info-row">
              <div class="match-id">ID: ${m.matchId || m.id?.slice(0,8) || 'XXXX'}</div>
              <div class="schedule-box"><i class="fa-solid fa-clock schedule-icon"></i><div>${timeStr}</div></div>
            </div>
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat"><div class="label">PRIZE POOL</div><div class="val"><i class="fa-solid fa-trophy text-yellow-400"></i>₹${(m.prizePool || 0).toLocaleString()}</div></div>
          <div class="stat"><div class="label">PER KILL</div><div class="val"><i class="fa-solid fa-skull text-red-400"></i>₹${(m.perKill || 0)}</div></div>
          <div class="stat"><div class="label">ENTRY FEE</div><div class="val"><i class="fa-solid fa-coins text-yellow-400"></i>₹${(m.entryFee || 0)}</div></div>
        </div>

        <div class="small-grid">
          <div><div class="slabel">TYPE</div><div class="sval">${typeIcon}<span>${(m.type || 'SOLO').toUpperCase()}</span></div></div>
          <div><div class="slabel">PLATFORM</div><div class="sval"><i class="fa-solid fa-mobile-screen-button text-green-400"></i><span>${m.platform || 'Phone'}</span></div></div>
          <div><div class="slabel">MAP</div><div class="sval"><i class="fa-solid fa-map text-purple-400"></i><span>${m.map || 'N/A'}</span></div></div>
        </div>

        ${currentTab !== 'completed' ? `
        <div class="progress-container">
          <div class="progress-wrapper">
            <div class="progress-header"><div class="slots-text">${slotsFilled}/${slotsTotal} Slots</div></div>
            <div class="progress-track"><div class="progress-fill" style="width:${progressPercent}%"></div></div>
          </div>
        </div>
        ` : ''}

        <div style="margin-top:14px;">${btnHTML}</div>
        <div class="full-note" style="display:${fullNote};">${isFull ? 'No Spots Left! Match is Full.' : ''}</div>
      </div>
    `;

    // Banner click navigation
    const banner = card.querySelector('.banner-container');
    if (banner) {
      banner.addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentTab === 'completed') {
          window.location.href = `match-results.html?matchId=${encodeURIComponent(m.id)}`;
        } else {
          window.location.href = `match-details.html?matchId=${encodeURIComponent(m.id)}`;
        }
      });
    }

    // Button click
    const btn = card.querySelector('.join-btn');
    if (btn) {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const mid = btn.dataset.id;
        if (currentTab === 'upcoming' && !btn.classList.contains('joined') && !btn.classList.contains('full')) {
          window.location.href = `join.html?matchId=${encodeURIComponent(mid)}`;
        } else if (currentTab === 'ongoing') {
          window.location.href = `match-details.html?matchId=${encodeURIComponent(mid)}`;
        } else if (currentTab === 'completed') {
          window.location.href = `match-results.html?matchId=${encodeURIComponent(mid)}`;
        }
      });
    }

    return card;
  }

  // Skeletons - updated to match fixed height banner
  function renderSkeletons(count = 3) {
    container.innerHTML = '';
    for (let i=0; i<count; i++) {
      const sk = document.createElement('div');
      sk.className = 'skeleton-card';
      sk.innerHTML = `
        <div class="skeleton-banner skeleton-shimmer"></div>
        <div class="skeleton-details">
          <div class="skeleton-title skeleton-shimmer"></div>
          <div class="skeleton-meta skeleton-shimmer"></div>
          <div class="skeleton-stats">
            <div class="skeleton-stat skeleton-shimmer"></div>
            <div class="skeleton-stat skeleton-shimmer"></div>
            <div class="skeleton-stat skeleton-shimmer"></div>
          </div>
          <div class="skeleton-progress skeleton-shimmer"></div>
          <div class="skeleton-btn skeleton-shimmer"></div>
        </div>
      `;
      container.appendChild(sk);
    }
  }

  // ==================== SETUP INFINITE SCROLL ====================
  function setupInfiniteScroll() {
    if (observer) {
      observer.disconnect();
    }
    
    observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        const state = tabs[currentTab];
        if (state.hasMore && !state.loading && currentUser) {
          loadTabMatches(currentTab, true);
        }
      }
    }, { threshold: 0.1, rootMargin: '100px' });
    
    observer.observe(infiniteTrigger);
  }

  // ==================== TAB CLICK HANDLER ====================
  document.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => {
      const newTab = el.dataset.tab;
      if (newTab === currentTab) return;
      
      // Cancel any ongoing fetch for the new tab
      if (tabs[newTab].abortController) {
        tabs[newTab].abortController.abort();
      }
      
      // Update UI
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      
      // Switch tab
      currentTab = newTab;
      
      // Render from cache or load if empty
      if (tabs[currentTab].list.length === 0 && currentUser) {
        loadTabMatches(currentTab, false);
      } else {
        renderCurrentTab();
      }
      
      // Re-setup infinite scroll for new tab
      setupInfiniteScroll();
    });
  });

  // ==================== BACK BUTTON ====================
  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = 'home.html';
  });

  // ==================== AUTH & INIT ====================
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user;
      try {
        idToken = await user.getIdToken();
        await loadWallet();
        await loadTabMatches('upcoming', false);
        setupInfiniteScroll();
      } catch (e) {
        console.error('token error', e);
      }
    } else {
      window.location.href = 'login.html';
    }
  });

  // Cleanup on page unload
  window.addEventListener('beforeunload', () => {
    if (observer) {
      observer.disconnect();
    }
    // Abort all pending requests
    Object.values(tabs).forEach(tab => {
      if (tab.abortController) {
        tab.abortController.abort();
      }
    });
  });
</script>
</body>
</html>
