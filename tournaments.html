<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tournaments · ElitePros</title>

  <!-- Firebase Auth only (no database) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  
  <!-- Tailwind & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    :root{
      --bg-dark: #0b1020;
      --card-bg: #1f2340;
      --card-dark: #121322;
      --accent: #3f3ef2;
      --muted: #9aa3b2;
      --header-bg: #111827;
      --joined-color: #0d9488;
    }

    body { 
      background: var(--bg-dark); 
      color: #fff; 
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Skeleton shimmer – neutral grey */
    .skeleton-shimmer {
      background: linear-gradient(90deg, 
        #202232 25%, 
        #2a2c3a 50%, 
        #202232 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
    }
    
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Topbar */
    .topbar { 
      background: var(--header-bg); 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 12px 16px; 
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    
    .back-btn { 
      width: 40px; 
      height: 40px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      border-radius: 10px; 
      background: rgba(255,255,255,0.05);
      cursor: pointer; 
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .back-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .top-title { 
      font-weight: 700; 
      font-size: 16px;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      flex: 1;
      margin: 0 10px;
    }

    /* Tabs */
    .tabs { 
      display: flex; 
      gap: 8px; 
      padding: 16px; 
      justify-content: space-between;
      background: var(--bg-dark);
      position: sticky;
      top: 64px;
      z-index: 90;
      backdrop-filter: blur(10px);
    }
    
    .tab { 
      padding: 10px 14px; 
      border-radius: 10px; 
      background: rgba(255,255,255,0.03); 
      color: #cbd5e1; 
      cursor: pointer; 
      font-weight: 700; 
      text-align: center; 
      flex: 1;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 12px;
      letter-spacing: 0.3px;
    }
    
    .tab:hover {
      background: rgba(255,255,255,0.08);
    }
    
    .tab.active { 
      background: linear-gradient(135deg, #3f3ef2, #6366f1); 
      color: white; 
      box-shadow: 0 8px 25px rgba(63,62,242,0.25);
    }

    /* Tournament card – more compact (reduced spacing) */
    .tournament-card { 
      border-radius: 16px; 
      overflow: hidden; 
      background: linear-gradient(135deg, #1f2340 0%, #121322 100%); 
      border: 1px solid rgba(255,255,255,0.08); 
      box-shadow: 0 8px 30px rgba(2,6,23,0.7); 
      margin: 12px 16px; 
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .tournament-card:hover {
      transform: translateY(-3px);
      border-color: rgba(63, 62, 242, 0.3);
    }

    /* Banner container */
    .banner-container { 
      position: relative;
      width: 100%;
      height: 180px;
      overflow: hidden;
      background: #0b1020;
    }
    
    .banner-loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1d2e;
      z-index: 2;
      transition: opacity 0.2s ease;
    }
    
    .banner-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .spinner-circle {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* fallback gradient when banner fails */
    .banner-fallback {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(145deg, #1f2338, #121528);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
      color: #a5b4fc;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .banner-container img { 
      width: 100%; 
      height: 100%; 
      display: block; 
      object-fit: cover;
      object-position: center;
      transition: opacity 0.25s ease-in;
      opacity: 0;
      position: relative;
      z-index: 1;
    }
    
    .banner-container img.loaded {
      opacity: 1;
    }

    .status-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      padding: 5px 10px;
      border-radius: 16px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      z-index: 5;
      box-shadow: 0 4px 12px rgba(239,68,68,0.3);
    }

    .details { 
      background: var(--card-bg); 
      padding: 12px 14px 14px;  /* reduced vertical */
      border-top-left-radius: 16px; 
      border-top-right-radius: 16px; 
      position: relative;
      margin-top: -16px;
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
    }
    
    .org-icon { 
      width: 44px; 
      height: 44px; 
      border-radius: 50%; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      background: #0b1226; 
      border: 2px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    
    .org-icon img {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .title-row { 
      display: flex; 
      gap: 10px; 
      align-items: flex-start; 
      margin-bottom: 6px; /* reduced */
    }
    
    .title-left { flex: 1; }
    .title-h { font-size: 15px; font-weight: 800; color: #ffffff; line-height: 1.2; margin-bottom: 2px; }
    
    .match-info-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;  /* reduced */
      flex-wrap: wrap;
    }
    
    .match-id {
      color: #a5b4fc;
      font-weight: 600;
      font-size: 11px;
      background: rgba(165, 180, 252, 0.1);
      padding: 2px 8px;
      border-radius: 6px;
    }

    .schedule-box {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.05);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      color: #e5e7eb;
      font-size: 11px;
      font-weight: 600;
    }
    .schedule-icon { color: #f59e0b; }

    .stat-grid { 
      display: grid; 
      grid-template-columns: repeat(3,1fr); 
      gap: 8px; 
      margin: 8px 0; /* reduced */
    }
    
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 56px;  /* slightly smaller */
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 6px 4px;
    }
    
    .stat .label { 
      font-size: 9px; 
      color: var(--muted); 
      text-transform: uppercase; 
      font-weight: 600; 
      margin-bottom: 4px;
    }
    
    .stat .val { 
      font-weight: 800; 
      color: white; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      gap: 4px; 
      font-size: 12px;
    }

    .small-grid { 
      display: grid; 
      grid-template-columns: repeat(3,1fr); 
      gap: 8px; 
      margin: 6px 0; /* reduced */
    }
    
    .small-grid > div {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 48px;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      padding: 4px 2px;
    }
    
    .small-grid .slabel { 
      font-size: 9px; 
      color: var(--muted); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 4px; 
      text-transform: uppercase; 
      font-weight: 600;
      margin-bottom: 2px;
    }
    
    .small-grid .sval { 
      font-weight: 700; 
      color: white; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 4px; 
      font-size: 12px;
    }

    /* action row: equal split */
    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    
    .progress-container {
      flex: 1 1 50%;  /* exactly half */
      min-width: 0;    /* prevent overflow */
    }
    
    .slots-text { 
      color: #cbd5e1; 
      font-size: 10px; 
      font-weight: 600; 
      margin-bottom: 2px;
    }
    
    .progress-track { 
      width: 100%; 
      background: #111827; 
      height: 6px; 
      border-radius: 10px; 
      border: 1px solid rgba(255,255,255,0.1); 
      overflow: hidden; 
    }
    .progress-fill { 
      height: 100%; 
      background: linear-gradient(90deg, #10b981, #4ade80); 
      width: 0%; 
      transition: width 0.6s ease; 
      border-radius: 10px;
    }

    .join-btn { 
      flex: 1 1 50%;    /* exactly half */
      padding: 10px 6px; 
      border-radius: 10px; 
      font-weight: 700; 
      border: none; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 6px; 
      font-size: 13px; 
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .join-btn.joinable { background: linear-gradient(135deg, #10b981, #059669); }
    .join-btn.joinable:hover { background: linear-gradient(135deg, #34d399, #10b981); }
    .join-btn.joined { background: linear-gradient(135deg, #0d9488, #0f766e); cursor: default; }
    .join-btn.full { background: linear-gradient(135deg, #f59e0b, #d97706); cursor: not-allowed; }

    .full-note { 
      color: #ff4d4f; 
      font-weight: 600; 
      font-size: 11px; 
      margin-top: 4px; 
      text-align: center; 
    }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 20px;
    }
    .empty-icon { font-size: 60px; margin-bottom: 16px; opacity: 0.6; color: #6366f1; }
    .empty-message { font-size: 16px; font-weight: 600; color: #cbd5e1; }

    /* Skeleton card – exact same dimensions as real cards */
    .skeleton-card {
      margin: 12px 16px;
      border-radius: 16px;
      overflow: hidden;
      background: var(--card-bg);
      height: auto;  /* let content define */
    }
    .skeleton-banner { 
      width: 100%; 
      height: 180px; 
      background: #202232; 
    }
    .skeleton-details { padding: 12px 14px 14px; }
    .skeleton-title { height: 18px; width: 70%; margin-bottom: 6px; }
    .skeleton-meta { height: 14px; width: 40%; margin-bottom: 8px; }
    .skeleton-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 8px 0; }
    .skeleton-stat { height: 50px; }
    .skeleton-smallgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 6px 0; }
    .skeleton-small { height: 44px; }
    .skeleton-progress { height: 6px; margin: 8px 0; border-radius: 10px; }
    .skeleton-action { display: flex; gap: 10px; margin-top: 8px; }
    .skeleton-progress-bar { height: 36px; flex: 1; border-radius: 10px; }
    .skeleton-btn { height: 36px; flex: 1; border-radius: 10px; }

    .infinite-trigger {
      height: 20px;
      margin: 10px 0 30px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    
    .loader-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 10px auto;
    }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <div class="topbar" id="mainHeader">
    <button class="back-btn" id="backBtn"><i class="fa fa-arrow-left text-xl"></i></button>
    <div class="top-title" id="pageTitle">ElitePros!</div>
    <div class="w-10"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab" data-tab="ongoing">ONGOING</div> 
    <div class="tab active" data-tab="upcoming">UPCOMING</div>
    <div class="tab" data-tab="completed">COMPLETED</div>
  </div>

  <!-- List container -->
  <div id="listContainer" class="pb-2"></div> <!-- reduced pb to avoid blank space -->

  <!-- Infinite scroll trigger & spinner -->
  <div id="infiniteTrigger" class="infinite-trigger">
    <div class="loader-spinner" id="infiniteSpinner" style="display:none;"></div>
  </div>

<script>
  // ==================== CONFIG ====================
  const firebaseConfig = {
    apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
    authDomain: "eliteprosofficial.firebaseapp.com",
    databaseURL: "https://eliteprosofficial-default-rtdb.firebaseio.com",
    projectId: "eliteprosofficial",
    storageBucket: "eliteprosofficial.firebasestorage.app",
    messagingSenderId: "646561207100",
    appId: "1:646561207100:web:47de7b648695367e208439",
    measurementId: "G-ZN5VNFCSEL"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ==================== STATE ====================
  const BACKEND_URL = 'https://elitepros-backend.onrender.com';
  const container = document.getElementById('listContainer');
  const infiniteTrigger = document.getElementById('infiniteTrigger');
  const infiniteSpinner = document.getElementById('infiniteSpinner');
  const pageTitle = document.getElementById('pageTitle');
  
  let selectedGameMode = localStorage.getItem('selectedGameMode') || 'FF SURVIVAL';
  pageTitle.textContent = selectedGameMode;

  let currentUser = null;
  let idToken = null;

  let currentTab = 'upcoming';
  const tabs = {
    upcoming: { list: [], cursor: null, hasMore: true, loading: false, abortController: null },
    ongoing:   { list: [], cursor: null, hasMore: true, loading: false, abortController: null },
    completed: { list: [], cursor: null, hasMore: true, loading: false, abortController: null }
  };
  const LIMIT = 10;

  let observer = null;

  // ==================== API HELPER ====================
  async function apiFetch(endpoint, signal) {
    if (!idToken) throw new Error('No idToken');
    const res = await fetch(BACKEND_URL + endpoint, {
      headers: { 'Authorization': `Bearer ${idToken}` },
      signal
    });
    if (res.status === 401) {
      window.location.href = 'login.html';
      return null;
    }
    if (!res.ok) throw new Error(`API error ${res.status}`);
    return res.json();
  }

  // ==================== FETCH MATCHES ====================
  async function loadTabMatches(tab, append = false) {
    const state = tabs[tab];
    
    if (state.abortController) state.abortController.abort();
    
    state.abortController = new AbortController();
    const signal = state.abortController.signal;

    if (state.loading || !state.hasMore) return;
    state.loading = true;

    if (append) infiniteSpinner.style.display = 'inline-block';
    
    // if not append and list empty, fill viewport with skeletons (at least 2, but we render 3 initially)
    if (!append && state.list.length === 0) renderSkeletons(3);

    try {
      // CORRECT ENDPOINTS per tab
      let url = `/api/matches?status=${tab}&limit=${LIMIT}`;
      if (state.cursor) url += `&cursor=${encodeURIComponent(state.cursor)}`;

      const data = await apiFetch(url, signal);
      if (signal.aborted) return;
      
      const matches = data.matches || [];
      const nextCursor = data.nextCursor || null;

      if (append) {
        state.list = [...state.list, ...matches];
      } else {
        state.list = matches;
      }
      
      state.cursor = nextCursor;
      state.hasMore = nextCursor !== null && matches.length === LIMIT;

      // Only render if this tab is still the current tab (avoid glitch)
      if (tab === currentTab) {
        renderCurrentTab();
        // after render, if list smaller than viewport, add skeleton fillers? but we will fill with skeleton cards manually:
        fillRemainingSpaceWithSkeletons();
      }
    } catch (err) {
      if (err.name === 'AbortError') return;
      console.error(err);
      if (tab === currentTab && state.list.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="empty-message">Failed to load</div></div>`;
      }
    } finally {
      state.loading = false;
      state.abortController = null;
      infiniteSpinner.style.display = 'none';
    }
  }

  // Fill remaining vertical space with skeleton cards (exact same height)
  function fillRemainingSpaceWithSkeletons() {
    // only if current list is not empty
    const state = tabs[currentTab];
    if (!state.list.length) return;

    // calculate how many skeleton cards fit (approx)
    const cardWithMargin = 420; // approximate total height of one card including margin (based on current compact)
    const windowHeight = window.innerHeight;
    const headerTabsOffset = 140; // topbar + tabs + some padding
    const available = windowHeight - headerTabsOffset;
    const visibleCards = Math.ceil(available / cardWithMargin);
    const currentCards = document.querySelectorAll('.tournament-card').length;
    const needed = Math.max(0, visibleCards - currentCards);
    
    if (needed > 0) {
      for (let i=0; i<needed; i++) {
        const sk = createSkeletonElement();
        container.appendChild(sk);
      }
    }
  }

  // ==================== RENDER ====================
  function renderCurrentTab() {
    const state = tabs[currentTab];
    const matches = state.list;

    container.innerHTML = ''; // clear instantly

    if (!matches || matches.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-search"></i></div><div class="empty-message">No ${currentTab} matches</div></div>`;
      return;
    }

    const fragment = document.createDocumentFragment();
    matches.forEach(m => fragment.appendChild(createMatchCard(m)));
    container.appendChild(fragment);
    
    // lazy load images with banner loader
    document.querySelectorAll('.banner-container').forEach(initBannerLoader);
  }

  // Banner loader with fallback
  function initBannerLoader(container) {
    const img = container.querySelector('img');
    const loader = container.querySelector('.banner-loader');
    if (!img || !loader) return;

    const showFallback = () => {
      // hide loader, hide img, show fallback text div
      loader.classList.add('hidden');
      img.style.display = 'none';
      // check if fallback already exists
      if (!container.querySelector('.banner-fallback')) {
        const fallbackDiv = document.createElement('div');
        fallbackDiv.className = 'banner-fallback';
        fallbackDiv.innerText = 'Banner not available';
        container.appendChild(fallbackDiv);
      }
    };

    if (img.complete && img.naturalWidth > 0) {
      img.classList.add('loaded');
      loader.classList.add('hidden');
    } else if (img.complete && img.naturalWidth === 0) {
      showFallback();
    } else {
      img.onload = () => {
        img.classList.add('loaded');
        loader.classList.add('hidden');
      };
      img.onerror = () => {
        showFallback();
      };
    }
  }

  function createMatchCard(m) {
    const card = document.createElement('div');
    card.className = 'tournament-card';
    card.dataset.matchId = m.id;

    let typeIcon = '<i class="fa-solid fa-user text-blue-400"></i>';
    const type = (m.type || 'solo').toLowerCase();
    if (type === 'duo') typeIcon = '<i class="fa-solid fa-user-group text-blue-400"></i>';
    if (type === 'squad') typeIcon = '<i class="fa-solid fa-people-group text-blue-400"></i>';

    const slotsFilled = m.joinedCount || 0;
    const slotsTotal = m.slots || 0;
    const isFull = slotsFilled >= slotsTotal;
    const isJoined = m.isJoined === true;
    const progressPercent = slotsTotal ? Math.min(100, (slotsFilled / slotsTotal) * 100) : 0;

    const scheduleTime = m.scheduleTime ? new Date(m.scheduleTime) : new Date();
    const timeStr = scheduleTime.toLocaleString('en-IN', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: true
    }).replace(/,/, ' at');

    let btnClass = '', btnText = '', btnIcon = '';
    if (currentTab === 'upcoming') {
      if (isJoined) { btnClass = 'joined'; btnText = 'JOINED'; btnIcon = 'fa-check-circle'; }
      else if (isFull) { btnClass = 'full'; btnText = 'FULL'; btnIcon = 'fa-users-slash'; }
      else { btnClass = 'joinable'; btnText = 'JOIN'; btnIcon = 'fa-play-circle'; }
    } else if (currentTab === 'ongoing') {
      btnClass = 'joinable'; btnText = 'VIEW'; btnIcon = 'fa-eye';
    } else {
      btnClass = 'joinable'; btnText = 'RESULTS'; btnIcon = 'fa-trophy';
    }

    let statusBadge = (currentTab === 'ongoing') ? '<div class="status-badge">LIVE</div>' : '';

    const bannerUrl = m.banner || '';

    card.innerHTML = `
      <div class="banner-container">
        <div class="banner-loader"><div class="spinner-circle"></div></div>
        ${statusBadge}
        <img src="${bannerUrl}" alt="banner" loading="lazy" crossorigin="anonymous" />
      </div>
      <div class="details">
        <div class="title-row">
          <div class="org-icon"><img src="https://i.ibb.co/Y7SksQy9/IMG-20250830-082315-071.jpg" alt="org" loading="lazy" onerror="this.src='https://via.placeholder.com/50';" /></div>
          <div class="title-left">
            <div class="title-h">${m.name || 'Match'}</div>
            <div class="match-info-row">
              <div class="match-id">ID: ${m.matchId || m.id?.slice(0,8) || 'XXXX'}</div>
              <div class="schedule-box"><i class="fa-solid fa-clock schedule-icon"></i><div>${timeStr}</div></div>
            </div>
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat"><div class="label">PRIZE</div><div class="val"><i class="fa-solid fa-trophy text-yellow-400"></i>₹${(m.prizePool || 0).toLocaleString()}</div></div>
          <div class="stat"><div class="label">PER KILL</div><div class="val"><i class="fa-solid fa-skull text-red-400"></i>₹${(m.perKill || 0)}</div></div>
          <div class="stat"><div class="label">ENTRY</div><div class="val"><i class="fa-solid fa-coins text-yellow-400"></i>₹${(m.entryFee || 0)}</div></div>
        </div>

        <div class="small-grid">
          <div><div class="slabel">TYPE</div><div class="sval">${typeIcon}<span>${(m.type || 'SOLO').toUpperCase()}</span></div></div>
          <div><div class="slabel">PLATFORM</div><div class="sval"><i class="fa-solid fa-mobile-screen-button text-green-400"></i><span>${m.platform || 'Phone'}</span></div></div>
          <div><div class="slabel">MAP</div><div class="sval"><i class="fa-solid fa-map text-purple-400"></i><span>${m.map || 'N/A'}</span></div></div>
        </div>

        ${currentTab !== 'completed' ? `
        <div class="action-row">
          <div class="progress-container">
            <div class="slots-text">${slotsFilled}/${slotsTotal} Slots</div>
            <div class="progress-track"><div class="progress-fill" style="width:${progressPercent}%"></div></div>
          </div>
          <button class="join-btn ${btnClass}" data-id="${m.id}"><i class="fa-solid ${btnIcon}"></i>${btnText}</button>
        </div>
        ` : `
        <div style="margin-top:6px;"><button class="join-btn ${btnClass}" style="width:100%;" data-id="${m.id}"><i class="fa-solid ${btnIcon}"></i>${btnText}</button></div>
        `}
        <div class="full-note" style="display:${isFull && currentTab==='upcoming' && !isJoined ? 'block' : 'none'};">No Spots Left</div>
      </div>
    `;

    // Banner click navigation
    card.querySelector('.banner-container').addEventListener('click', (e) => {
      e.stopPropagation();
      if (currentTab === 'completed') window.location.href = `match-results.html?matchId=${encodeURIComponent(m.id)}`;
      else window.location.href = `match-details.html?matchId=${encodeURIComponent(m.id)}`;
    });

    const btn = card.querySelector('.join-btn');
    if (btn) {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const mid = btn.dataset.id;
        if (currentTab === 'upcoming' && !btn.classList.contains('joined') && !btn.classList.contains('full')) {
          window.location.href = `join.html?matchId=${encodeURIComponent(mid)}`;
        } else if (currentTab === 'ongoing') {
          window.location.href = `match-details.html?matchId=${encodeURIComponent(mid)}`;
        } else if (currentTab === 'completed') {
          window.location.href = `match-results.html?matchId=${encodeURIComponent(mid)}`;
        }
      });
    }

    return card;
  }

  function createSkeletonElement() {
    const sk = document.createElement('div');
    sk.className = 'skeleton-card';
    sk.innerHTML = `
      <div class="skeleton-banner skeleton-shimmer"></div>
      <div class="skeleton-details">
        <div class="skeleton-title skeleton-shimmer"></div>
        <div class="skeleton-meta skeleton-shimmer"></div>
        <div class="skeleton-stats">
          <div class="skeleton-stat skeleton-shimmer"></div>
          <div class="skeleton-stat skeleton-shimmer"></div>
          <div class="skeleton-stat skeleton-shimmer"></div>
        </div>
        <div class="skeleton-smallgrid">
          <div class="skeleton-small skeleton-shimmer"></div>
          <div class="skeleton-small skeleton-shimmer"></div>
          <div class="skeleton-small skeleton-shimmer"></div>
        </div>
        <div class="skeleton-progress skeleton-shimmer"></div>
        <div class="skeleton-action">
          <div class="skeleton-progress-bar skeleton-shimmer"></div>
          <div class="skeleton-btn skeleton-shimmer"></div>
        </div>
      </div>
    `;
    return sk;
  }

  function renderSkeletons(count = 3) {
    container.innerHTML = '';
    for (let i=0; i<count; i++) {
      container.appendChild(createSkeletonElement());
    }
  }

  // ==================== INFINITE SCROLL ====================
  function setupInfiniteScroll() {
    if (observer) observer.disconnect();
    observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        const state = tabs[currentTab];
        if (state.hasMore && !state.loading && currentUser) {
          loadTabMatches(currentTab, true);
        }
      }
    }, { threshold: 0.1, rootMargin: '100px' });
    observer.observe(infiniteTrigger);
  }

  // ==================== TAB CLICK ====================
  document.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => {
      const newTab = el.dataset.tab;
      if (newTab === currentTab) return;
      
      // abort any ongoing fetch for old tab if needed
      if (tabs[currentTab].abortController) tabs[currentTab].abortController.abort();
      
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      
      currentTab = newTab;
      
      if (tabs[currentTab].list.length === 0 && currentUser) {
        // clear container and show skeletons
        renderSkeletons(3);
        loadTabMatches(currentTab, false);
      } else {
        renderCurrentTab();
        fillRemainingSpaceWithSkeletons();
      }
      setupInfiniteScroll();
    });
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = 'home.html';
  });

  // ==================== AUTH ====================
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user;
      try {
        idToken = await user.getIdToken();
        await loadTabMatches('upcoming', false);
        setupInfiniteScroll();
      } catch (e) { console.error(e); }
    } else {
      window.location.href = 'login.html';
    }
  });

  window.addEventListener('beforeunload', () => {
    if (observer) observer.disconnect();
    Object.values(tabs).forEach(t => t.abortController?.abort());
  });

  // fill on resize / after load
  window.addEventListener('resize', () => {
    if (tabs[currentTab].list.length) fillRemainingSpaceWithSkeletons();
  });
</script>
</body>
</html>
