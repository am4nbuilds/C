<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - ElitePros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-dark: #0b1020;
            --card-bg: #1f2340;
            --card-dark: #121322;
            --accent: #3f3ef2;
            --muted: #9aa3b2;
            --success: #10b981;
            --warning: #f59e0b;
            --withdraw-color: #ef4444;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            margin: 0;
            padding: 0;
            padding-bottom: 20px;
        }

        /* Header - Like Deposit/Wallet Page */
        .header-bar {
            background: var(--card-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        .centered-logo-inline-container {
            display: flex;
            align-items: center;
            gap: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .app-logo-header {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(99, 102, 241, 0.5);
            flex-shrink: 0;
        }

        .centered-logo-inline-label {
            font-weight: 800;
            font-size: 18px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Messages */
        .message-container {
            padding: 0 16px;
            margin-top: 12px;
        }

        .error-message, .success-message, .info-message {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .info-message {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Withdrawal Card */
        .withdraw-section {
            padding: 16px;
        }

        .withdraw-card {
            background: linear-gradient(135deg, var(--card-bg), var(--card-dark));
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .withdraw-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .withdraw-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .withdraw-header-text {
            flex: 1;
        }

        .withdraw-title {
            font-weight: 800;
            font-size: 22px;
            margin-bottom: 4px;
        }

        .withdraw-subtitle {
            color: var(--muted);
            font-size: 14px;
        }

        /* UPI Input */
        .upi-input-group {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 4px 16px;
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            transition: border 0.3s ease;
        }
        .upi-input-group:focus-within {
            border-color: #ef4444;
            box-shadow: 0 0 0 2px rgba(239,68,68,0.2);
        }
        .upi-icon {
            color: var(--muted);
            font-size: 1.2rem;
            margin-right: 10px;
        }
        .upi-input-group input {
            background: transparent;
            border: none;
            padding: 16px 0;
            color: white;
            font-size: 16px;
            width: 100%;
            outline: none;
        }
        .upi-input-group input::placeholder {
            color: var(--muted);
        }

        /* Amounts Grid */
        .withdraw-amounts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .withdraw-amount-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .withdraw-amount-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .withdraw-amount-card.selected {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
        }

        .amount-display {
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 6px;
        }

        .amount-label {
            font-size: 12px;
            color: var(--muted);
        }
        .withdraw-amount-card.selected .amount-label {
            color: white;
            opacity: 0.9;
        }

        /* Skeleton */
        .skeleton-shimmer {
            background: linear-gradient(90deg, 
                rgba(255, 255, 255, 0.05) 25%, 
                rgba(255, 255, 255, 0.1) 50%, 
                rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 14px;
        }
        .skeleton-amount {
            height: 100px;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Withdraw Button */
        .withdraw-btn-container {
            padding: 16px;
            padding-bottom: 30px;
        }

        .withdraw-btn {
            width: 100%;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            border: none;
            border-radius: 14px;
            padding: 20px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .withdraw-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .withdraw-btn:not(:disabled):hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }

        .withdraw-btn.glow {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
            50% { box-shadow: 0 0 30px rgba(239, 68, 68, 0.8); }
        }

        /* modal for confirmation (similar to deposit) */
        .withdraw-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }

        .withdraw-modal-content {
            background: linear-gradient(135deg, #1f2340, #121322);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-weight: 800;
            font-size: 20px;
        }
        .close-modal {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .close-modal:hover { color: white; }

        .withdraw-detail {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .detail-row:last-child { margin-bottom: 0; }
        .detail-label { color: #9ca3af; }
        .detail-value { font-weight: 700; color: #ef4444; }

        .modal-actions {
            display: flex;
            gap: 12px;
        }
        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .modal-btn.primary {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
        }
        .modal-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239,68,68,0.3);
        }
        .modal-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .modal-btn.secondary:hover {
            background: rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header-bar">
        <button class="back-btn" id="backButton"><i class="fa-solid fa-arrow-left"></i></button>
        <div class="centered-logo-inline-container">
            <div class="app-logo-header">
                <img id="appLogo" src="http://elitepros.wuaze.com/IMG-20260106-WA0000.jpg" alt="ElitePros" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <div class="centered-logo-inline-label">Withdraw</div>
        </div>
        <div style="width:44px;"></div>
    </div>

    <!-- Messages -->
    <div class="message-container">
        <div id="errorMessage" class="error-message"><i class="fas fa-exclamation-triangle"></i><span id="errorText"></span></div>
        <div id="successMessage" class="success-message"><i class="fas fa-check-circle"></i><span id="successText"></span></div>
        <div id="infoMessage" class="info-message"><i class="fas fa-info-circle"></i><span id="infoText"></span></div>
    </div>

    <!-- Withdraw Card -->
    <div class="withdraw-section">
        <div class="withdraw-card">
            <div class="withdraw-header">
                <div class="withdraw-icon"><i class="fa-solid fa-indian-rupee-sign"></i></div>
                <div class="withdraw-header-text">
                    <div class="withdraw-title">Withdraw Winnings</div>
                    <div class="withdraw-subtitle">Enter UPI ID & select amount</div>
                </div>
            </div>

            <!-- UPI input -->
            <div class="upi-input-group">
                <i class="fa-solid fa-qrcode upi-icon"></i>
                <input type="text" id="upiIdInput" placeholder="your UPI ID (e.g. name@okhdfcbank)" autocomplete="off">
            </div>

            <!-- Withdrawal amounts loading -->
            <div id="withdrawAmountsLoading">
                <div class="withdraw-amounts-grid">
                    <div class="skeleton-shimmer skeleton-amount"></div>
                    <div class="skeleton-shimmer skeleton-amount"></div>
                    <div class="skeleton-shimmer skeleton-amount"></div>
                    <div class="skeleton-shimmer skeleton-amount"></div>
                </div>
            </div>

            <div id="withdrawAmountsContent" style="display: none;">
                <div id="withdrawAmountsGrid" class="withdraw-amounts-grid"></div>
            </div>

            <div style="font-size: 13px; color: var(--muted); margin-top: 8px;">
                <i class="fa-regular fa-circle-check"></i> Amount will be deducted from winnings balance after admin approval.
            </div>
        </div>
    </div>

    <!-- Withdraw Button -->
    <div class="withdraw-btn-container">
        <button id="withdrawBtn" class="withdraw-btn" disabled>
            <i class="fa-solid fa-circle-arrow-right"></i>
            <span>Select Amount & UPI ID</span>
        </button>
    </div>

    <!-- Confirmation Modal -->
    <div id="withdrawModal" class="withdraw-modal">
        <div class="withdraw-modal-content">
            <div class="modal-header">
                <div class="modal-title">Confirm Withdrawal</div>
                <button class="close-modal" id="closeModal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="withdraw-detail">
                <div class="detail-row">
                    <span class="detail-label">UPI ID</span>
                    <span class="detail-value" id="modalUpiDisplay">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Amount</span>
                    <span class="detail-value" id="modalAmountDisplay">₹0</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value" style="color: #f59e0b;">Pending approval</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" id="cancelModalBtn">Cancel</button>
                <button class="modal-btn primary" id="confirmWithdrawBtn"><i class="fa-solid fa-check"></i> Confirm</button>
            </div>
        </div>
    </div>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
        authDomain: "eliteprosofficial.firebaseapp.com",
        databaseURL: "https://eliteprosofficial-default-rtdb.firebaseio.com",
        projectId: "eliteprosofficial",
        storageBucket: "eliteprosofficial.firebasestorage.app",
        messagingSenderId: "646561207100",
        appId: "1:646561207100:web:47de7b648695367e208439"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // State
    let currentUser = null;
    let currentUserIdToken = null;
    let selectedAmount = 0;
    let upiId = '';

    // Auth check
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        currentUser = user;
        try {
            currentUserIdToken = await user.getIdToken();
        } catch (e) {
            showErrorMessage("Auth error, refresh");
            return;
        }
        loadWithdrawalAmounts();
        // check for any pending withdrawal result? not needed, but we can optionally show winnings balance.
        // optional: load winnings to show info
        loadWinningsInfo();
    });

    async function loadWinningsInfo() {
        if (!currentUser) return;
        database.ref(`users/${currentUser.uid}/wallet/winnings`).once('value').then(snap => {
            const win = snap.val() || 0;
            // show info message with current winnings
            const infoDiv = document.getElementById('infoMessage');
            document.getElementById('infoText').innerText = `Available winnings: ₹${win}`;
            infoDiv.style.display = 'flex';
        }).catch(()=>{});
    }

    // Load withdrawal amounts from db/settings/withdrawalAmounts/
    function loadWithdrawalAmounts() {
        const ref = database.ref('settings/withdrawalAmounts');
        ref.once('value').then(snap => {
            const data = snap.val();
            let amounts = [];
            if (data && typeof data === 'object') {
                for (let key in data) {
                    let val = parseInt(data[key]);
                    if (!isNaN(val) && val > 0) amounts.push(val);
                }
            }
            if (amounts.length === 0) amounts = [100, 250, 500, 1000]; // fallback
            amounts.sort((a,b)=>a-b);
            displayWithdrawalAmounts(amounts);
        }).catch(err => {
            console.warn("Using fallback amounts", err);
            displayWithdrawalAmounts([100,250,500,1000]);
        });
    }

    function displayWithdrawalAmounts(amounts) {
        const container = document.getElementById('withdrawAmountsGrid');
        container.innerHTML = '';
        amounts.forEach(amt => {
            const card = document.createElement('div');
            card.className = 'withdraw-amount-card';
            card.dataset.amount = amt;
            card.onclick = () => selectAmount(amt);
            card.innerHTML = `<div class="amount-display">₹${amt}</div><div class="amount-label">Withdrawal</div>`;
            container.appendChild(card);
        });
        document.getElementById('withdrawAmountsLoading').style.display = 'none';
        document.getElementById('withdrawAmountsContent').style.display = 'block';
    }

    // Select amount and validate UPI
    function selectAmount(amt) {
        selectedAmount = amt;
        document.querySelectorAll('.withdraw-amount-card').forEach(c => {
            c.classList.toggle('selected', parseInt(c.dataset.amount) === amt);
        });
        updateWithdrawButton();
    }

    // UPI input listener
    document.getElementById('upiIdInput').addEventListener('input', (e) => {
        upiId = e.target.value.trim();
        updateWithdrawButton();
    });

    function updateWithdrawButton() {
        const btn = document.getElementById('withdrawBtn');
        const isValidUpi = /^[a-zA-Z0-9.\-_]{2,}@[a-zA-Z]{3,}$/.test(upiId); // basic UPI pattern
        if (selectedAmount > 0 && isValidUpi) {
            btn.disabled = false;
            btn.classList.add('glow');
            btn.innerHTML = `<i class="fa-solid fa-indian-rupee-sign"></i> Withdraw ₹${selectedAmount}`;
        } else {
            btn.disabled = true;
            btn.classList.remove('glow');
            btn.innerHTML = `<i class="fa-solid fa-circle-arrow-right"></i> Select Amount & valid UPI ID`;
        }
    }

    // Back button
    document.getElementById('backButton').onclick = () => window.history.back();

    // Click withdraw button -> open modal
    document.getElementById('withdrawBtn').onclick = () => {
        if (!selectedAmount || !upiId) return;
        document.getElementById('modalUpiDisplay').innerText = upiId;
        document.getElementById('modalAmountDisplay').innerText = `₹${selectedAmount}`;
        document.getElementById('withdrawModal').style.display = 'flex';
    };

    // Close modal
    const closeModal = () => document.getElementById('withdrawModal').style.display = 'none';
    document.getElementById('closeModal').onclick = closeModal;
    document.getElementById('cancelModalBtn').onclick = closeModal;

    // Confirm withdrawal -> call backend /request-withdraw
    document.getElementById('confirmWithdrawBtn').onclick = async () => {
        if (!selectedAmount || !upiId || !currentUserIdToken) return;

        const confirmBtn = document.getElementById('confirmWithdrawBtn');
        const originalText = confirmBtn.innerHTML;
        confirmBtn.disabled = true;
        confirmBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

        try {
            const response = await fetch("https://elitepros-backend.onrender.com/request-withdraw", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${currentUserIdToken}`
                },
                body: JSON.stringify({
                    amount: selectedAmount,
                    upiId: upiId
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || `HTTP ${response.status}`);
            }

            if (data.status === "PENDING") {
                // success
                showSuccessMessage(`Withdrawal request of ₹${selectedAmount} submitted (ID: ${data.transactionId})`);
                closeModal();
                // reset selection
                selectedAmount = 0;
                upiId = '';
                document.getElementById('upiIdInput').value = '';
                document.querySelectorAll('.withdraw-amount-card').forEach(c => c.classList.remove('selected'));
                updateWithdrawButton();
                // optionally update winnings info
                loadWinningsInfo();
            } else {
                throw new Error("Unexpected response");
            }

        } catch (error) {
            console.error("Withdraw error:", error);
            showErrorMessage(error.message || "Withdrawal failed");
            // keep modal open? close for simplicity
            closeModal();
        } finally {
            confirmBtn.disabled = false;
            confirmBtn.innerHTML = originalText;
        }
    };

    // Helper functions
    function showSuccessMessage(msg) {
        document.getElementById('successText').innerText = msg;
        document.getElementById('successMessage').style.display = 'flex';
        setTimeout(() => document.getElementById('successMessage').style.display = 'none', 4000);
    }
    function showErrorMessage(msg) {
        document.getElementById('errorText').innerText = msg;
        document.getElementById('errorMessage').style.display = 'flex';
        setTimeout(() => document.getElementById('errorMessage').style.display = 'none', 4000);
    }
    function showInfoMessage(msg) {
        document.getElementById('infoText').innerText = msg;
        document.getElementById('infoMessage').style.display = 'flex';
        setTimeout(() => document.getElementById('infoMessage').style.display = 'none', 4000);
    }
</script>
</body>
</html>
