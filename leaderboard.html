   <script>
    // ====================================================================
    // LEADERBOARD JAVASCRIPT WITH TRANSACTION-BASED WINNINGS CALCULATION
    // ====================================================================

    const firebaseConfig = {
        apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
        authDomain: "eliteprosofficial.firebaseapp.com",
        databaseURL: "https://eliteprosofficial-default-rtdb.firebaseio.com",
        projectId: "eliteprosofficial",
        storageBucket: "eliteprosofficial.firebasestorage.app",
        messagingSenderId: "646561207100",
        appId: "1:646561207100:web:47de7b648695367e208439",
        measurementId: "G-ZN5VNFCSEL"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // Global State
    let USER_UID = null;
    let currentFilter = 'today';
    let leaderboardRewards = {
        today: {},
        weekly: {},
        monthly: {}
    };
    
    // DOM Elements
    const skeletonContainer = document.getElementById('skeletonContainer');
    const mainContent = document.getElementById('mainContent');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const leaderboardList = document.getElementById('leaderboardList');
    const leaderboardTitle = document.getElementById('leaderboardTitle');
    const filterSelectButton = document.getElementById('filterSelectButton');
    const filterDropdown = document.getElementById('filterDropdown');
    const currentFilterText = document.getElementById('currentFilterText');

    // Header Titles Mapping
    const headerTitles = {
        today: "Players of the Day",
        weekly: "Players of the Week",
        monthly: "Players of the Month",
        allTime: "All Time Champions"
    };

    // Utility Functions
    function getCutoffTimestamp(filter) {
        const now = new Date();
        
        switch(filter) {
            case 'today':
                // Start of today (midnight)
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                return today.getTime();
                
            case 'weekly':
                // Start of current week (Monday)
                const day = now.getDay(); // 0 = Sunday, 1 = Monday
                const diff = day === 0 ? 6 : day - 1; // Days since Monday
                const monday = new Date(now);
                monday.setDate(now.getDate() - diff);
                monday.setHours(0, 0, 0, 0);
                return monday.getTime();
                
            case 'monthly':
                // Start of current month
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
                return firstDay.getTime();
                
            case 'allTime':
                // All time (earliest possible date)
                return 0;
                
            default:
                return 0;
        }
    }

    // Filter Dropdown Functions
    function toggleFilterDropdown() {
        filterDropdown.classList.toggle('open');
        filterSelectButton.classList.toggle('open');
        
        // Close dropdown when clicking outside
        if (filterDropdown.classList.contains('open')) {
            setTimeout(() => {
                document.addEventListener('click', closeFilterDropdownOutside);
            }, 10);
        } else {
            document.removeEventListener('click', closeFilterDropdownOutside);
        }
    }
    
    function closeFilterDropdownOutside(event) {
        if (!filterSelectButton.contains(event.target) && !filterDropdown.contains(event.target)) {
            filterDropdown.classList.remove('open');
            filterSelectButton.classList.remove('open');
            document.removeEventListener('click', closeFilterDropdownOutside);
        }
    }
    
    function selectFilter(filter) {
        currentFilter = filter;
        
        // Shorten display text for the button
        let displayText = formatTimeFilter(filter);
        if (displayText === 'This Week') displayText = 'Week';
        if (displayText === 'This Month') displayText = 'Month';
        if (displayText === 'All Time') displayText = 'All Time';
        
        currentFilterText.textContent = displayText;
        
        // Update active option in dropdown
        document.querySelectorAll('.filter-option').forEach(option => {
            if (option.dataset.filter === filter) {
                option.classList.add('active');
            } else {
                option.classList.remove('active');
            }
        });
        
        // Close dropdown
        filterDropdown.classList.remove('open');
        filterSelectButton.classList.remove('open');
        document.removeEventListener('click', closeFilterDropdownOutside);
        
        // Load leaderboard with new filter
        loadLeaderboard(filter);
    }

    // UI Functions
    function showError(message) {
        errorText.textContent = message;
        errorMessage.style.display = 'flex';
        setTimeout(() => {
            errorMessage.style.display = 'none';
        }, 5000);
    }

    function formatCurrency(amount) {
        return '₹' + parseInt(amount || 0).toLocaleString();
    }

    function formatTimeFilter(filter) {
        switch(filter) {
            case 'today': return 'Today';
            case 'weekly': return 'This Week';
            case 'monthly': return 'This Month';
            case 'allTime': return 'All Time';
            default: return 'Today';
        }
    }

    // Calculate winnings from transactions for a specific user and time period
    async function calculateUserWinnings(userId, filter) {
        try {
            const cutoffTimestamp = getCutoffTimestamp(filter);
            
            // For allTime, get total winnings from wallet
            if (filter === 'allTime') {
                const userSnapshot = await database.ref('users/' + userId).once('value');
                const userData = userSnapshot.val();
                if (userData && userData.wallet && userData.wallet.winnings !== undefined) {
                    return parseFloat(userData.wallet.winnings) || 0;
                }
                return 0;
            }
            
            // For time-based filters, calculate from transactions
            let totalWinnings = 0;
            
            // Get transactions for this user
            const transactionsRef = database.ref('transactions/' + userId);
            const snapshot = await transactionsRef.once('value');
            
            if (snapshot.exists()) {
                const transactions = snapshot.val();
                
                Object.values(transactions).forEach(transaction => {
                    // Check if transaction is within the time period
                    const txTimestamp = transaction.timestamp || 0;
                    
                    if (txTimestamp >= cutoffTimestamp) {
                        // Check if it's a winning transaction
                        const txType = transaction.type || '';
                        const txStatus = transaction.status || '';
                        const amount = parseFloat(transaction.amount) || 0;
                        
                        // Winning transaction types (based on your wallet.html)
                        const winningTypes = [
                            'Match Winnings', 
                            'Winning', 
                            'Winnings', 
                            'Tournament Win',
                            'Refund' // Refunds are also positive additions
                        ];
                        
                        // Only count successful winning transactions with positive amount
                        if ((winningTypes.includes(txType) || txType.toLowerCase().includes('win')) 
                            && (txStatus === 'Success' || txStatus === 'Completed' || !txStatus) 
                            && amount > 0) {
                            totalWinnings += amount;
                        }
                    }
                });
            }
            
            return totalWinnings;
            
        } catch (error) {
            console.error('Error calculating winnings for user:', userId, error);
            return 0;
        }
    }

    // Load reward amounts from Firebase
    async function loadRewardAmounts() {
        try {
            const rewardsSnapshot = await database.ref('leaderboardRewards').once('value');
            if (rewardsSnapshot.exists()) {
                leaderboardRewards = rewardsSnapshot.val();
                console.log('Loaded rewards:', leaderboardRewards);
            } else {
                // Set default rewards if none exist
                leaderboardRewards = {
                    today: {1: 1000, 2: 500, 3: 250, 4: 100, 5: 50, 6: 40, 7: 30, 8: 20, 9: 10, 10: 5},
                    weekly: {1: 5000, 2: 2500, 3: 1000, 4: 500, 5: 250, 6: 100, 7: 50, 8: 25, 9: 10, 10: 5},
                    monthly: {1: 20000, 2: 10000, 3: 5000, 4: 2500, 5: 1000, 6: 500, 7: 250, 8: 100, 9: 50, 10: 25}
                };
                
                try {
                    // Try to save default rewards to Firebase
                    await database.ref('leaderboardRewards').set(leaderboardRewards);
                } catch (writeError) {
                    console.log('Could not write default rewards (admin only), using local defaults');
                }
            }
        } catch (error) {
            console.error('Error loading rewards:', error);
            // Use local defaults if can't load from Firebase
            leaderboardRewards = {
                today: {1: 1000, 2: 500, 3: 250, 4: 100, 5: 50, 6: 40, 7: 30, 8: 20, 9: 10, 10: 5},
                weekly: {1: 5000, 2: 2500, 3: 1000, 4: 500, 5: 250, 6: 100, 7: 50, 8: 25, 9: 10, 10: 5},
                monthly: {1: 20000, 2: 10000, 3: 5000, 4: 2500, 5: 1000, 6: 500, 7: 250, 8: 100, 9: 50, 10: 25}
            };
        }
    }
    
    // Get reward amount for a specific rank and filter
    function getRewardAmount(filter, rank) {
        if (filter === 'allTime') return 0; // No rewards for all-time
        
        const rewards = leaderboardRewards[filter];
        return rewards && rewards[rank] ? rewards[rank] : 0;
    }

    // Load leaderboard with transaction-based winnings
    async function loadLeaderboard(filter = 'today') {
        console.log('Loading leaderboard for:', filter, 'with transaction calculation');
        
        // Update header title
        leaderboardTitle.textContent = headerTitles[filter] || headerTitles.today;
        
        // Show loading state
        leaderboardList.innerHTML = `
            <div style="text-align: center; padding: 80px 20px; color: #94a3b8; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 300px;">
                <div class="loading-spinner" style="margin: 0 auto 20px; width: 30px; height: 30px;"></div>
                <p style="font-size: 16px;">Loading leaderboard...</p>
            </div>
        `;
        
        try {
            const snapshot = await database.ref('users').once('value');
            console.log('Total users in database:', snapshot.numChildren());
            
            if (!snapshot.exists()) {
                showNoData();
                return;
            }
            
            const usersData = snapshot.val();
            const usersArray = [];
            
            // Process each user to calculate winnings
            const userPromises = Object.entries(usersData).map(async ([userId, userData]) => {
                if (!userData) return null;
                
                // Get username
                let userName = 'Player';
                if (userData.username) {
                    userName = userData.username;
                } else if (userData.name) {
                    userName = userData.name;
                } else if (userData.ign) {
                    userName = userData.ign;
                } else if (userData.email) {
                    userName = userData.email.split('@')[0];
                } else {
                    userName = 'Player_' + userId.substring(0, 4);
                }
                
                // Calculate winnings for this filter period
                const earnings = await calculateUserWinnings(userId, filter);
                
                // Only include users with earnings > 0
                if (earnings > 0) {
                    return {
                        id: userId,
                        name: userName,
                        earnings: earnings,
                        isCurrentUser: userId === USER_UID
                    };
                }
                
                return null;
            });
            
            // Wait for all calculations to complete
            const userResults = await Promise.all(userPromises);
            
            // Filter out null results and sort
            const validUsers = userResults.filter(user => user !== null);
            
            console.log('Users with winnings for', filter + ':', validUsers.length);
            
            if (validUsers.length === 0) {
                showNoData();
                return;
            }
            
            // Sort by earnings (descending)
            validUsers.sort((a, b) => b.earnings - a.earnings);
            
            // Take only top 10
            const top10Users = validUsers.slice(0, 10);
            
            // Display leaderboard
            displayLeaderboard(top10Users, filter);
            
        } catch (error) {
            console.error('Leaderboard error:', error);
            showError('Failed to load leaderboard. Please try again.');
            showNoData();
        }
    }

    function displayLeaderboard(users, filter) {
        let html = '';
        
        users.forEach((user, index) => {
            const rank = index + 1;
            
            // Get reward amount
            const rewardAmount = getRewardAmount(filter, rank);
            
            html += `
                <div class="leaderboard-item ${user.isCurrentUser ? 'current-user' : ''}" id="player-${rank}">
                    <div class="rank-badge">${rank}</div>
                    
                    <div class="user-info">
                        <div class="user-name">
                            <span class="username-prefix">@</span>
                            <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                                ${user.name}
                            </span>
                        </div>
                    </div>
                    
                    <div class="winnings">
                        <div class="winnings-amount">${formatCurrency(user.earnings)}</div>
                        <div class="winnings-label">Winnings</div>
                    </div>
                    
                    <div class="reward">
                        <div class="reward-amount">${formatCurrency(rewardAmount)}</div>
                        <div class="reward-label">Prize</div>
                    </div>
                    
                    <div class="profile-column">
                        <button class="profile-link" onclick="viewProfile('${user.id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            `;
        });
        
        leaderboardList.innerHTML = html;
    }

    // View user profile
    function viewProfile(userId) {
        window.location.href = `view-profile.html?uid=${userId}`;
    }

    function showNoData() {
        leaderboardList.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">
                    <i class="fas fa-trophy"></i>
                </div>
                <h3>No ${formatTimeFilter(currentFilter).toLowerCase()} data yet</h3>
                <p>Start playing tournaments to appear on the leaderboard!</p>
            </div>
        `;
    }

    // Finish loading UI
    function finishLoading() {
        skeletonContainer.style.display = 'none';
        mainContent.style.display = 'block';
    }

    // ===============================================================
    // INITIALIZATION
    // ===============================================================
    document.addEventListener('DOMContentLoaded', function() {
        console.log('Leaderboard page loaded');
        
        // Show skeleton initially
        skeletonContainer.style.display = 'block';
        mainContent.style.display = 'none';

        // Load reward amounts first
        loadRewardAmounts().then(() => {
            // Authentication State Listener
            auth.onAuthStateChanged(user => {
                if (user) {
                    USER_UID = user.uid;
                }
                
                // Load leaderboard for both guests and logged-in users
                loadLeaderboard('today').finally(() => {
                    finishLoading();
                });
            });
        });

        // Connection Status Check
        database.ref('.info/connected').on('value', function(snap) {
            if (!snap.val()) {
                console.warn('Database Connection Warning: Client disconnected');
            } else {
                console.info('Database Connection: Client connected');
            }
        });
    });
</script>
