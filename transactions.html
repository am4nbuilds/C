<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Transactions - Wallet · ElitePros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Firebase Auth only (no database) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        /* ----------------------------------------------
            EXACT visual language from wallet.html 
        ------------------------------------------------ */
        :root {
            --bg-dark: #0b1020;
            --card-bg: #1f2340;
            --card-dark: #121322;
            --accent: #3f3ef2;
            --muted: #9aa3b2;
            --deposit-color: #f59e0b;
            --winnings-color: #10b981;
            --balance-color: #3f3ef2;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            margin: 0;
            padding: 0;
            padding-bottom: 20px;
            min-height: 100vh;
        }

        /* Header – same as wallet.html (back + centered logo) */
        .header-bar {
            background: var(--card-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        .centered-logo-inline-container {
            display: flex;
            align-items: center;
            gap: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .app-logo-header {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(99, 102, 241, 0.5);
            flex-shrink: 0;
        }

        .centered-logo-inline-label {
            font-weight: 800;
            font-size: 18px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* transaction cards – perfectly match the preview items from wallet.html */
        .transactions-wrapper {
            padding: 0 16px;
            margin-top: 8px;
        }

        .transactions-list {
            background: linear-gradient(135deg, #1f2340, #121322);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 25px rgba(2,6,23,0.6);
        }

        .transaction-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .transaction-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-icon-container {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 1.2rem;
            color: white;
            flex-shrink: 0;
        }

        .transaction-icon-container.deposit {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .transaction-icon-container.withdraw {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .transaction-icon-container.winning {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .transaction-icon-container.fee {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .transaction-icon-container.refund {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .transaction-icon-container.admin {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .transaction-details {
            flex: 1;
            min-width: 0;
        }

        .transaction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .transaction-title {
            font-weight: 700;
            font-size: 14px;
            color: #e5e7eb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .transaction-amount {
            font-weight: 800;
            font-size: 15px;
            margin-left: 8px;
            white-space: nowrap;
        }

        .amount-positive {
            color: #34d399;
        }

        .amount-negative {
            color: #f87171;
        }

        .transaction-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }

        .transaction-id {
            color: #9ca3af;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            letter-spacing: 0.5px;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: #818cf8;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 9px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover {
            background: rgba(129, 140, 248, 0.1);
            color: #a5b4fc;
        }

        .copy-btn.copied {
            color: #10b981;
        }

        .transaction-time {
            color: #9ca3af;
            margin-left: 6px;
        }

        .transaction-status {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 10px;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .status-success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        /* empty state / error / loading */
        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: #9ca3af;
            background: linear-gradient(135deg, #1f2340, #121322);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .error-message {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 12px 16px;
            text-align: center;
            margin: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(239,68,68,0.3);
        }

        .loading-container {
            padding: 40px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            background: linear-gradient(135deg, #1f2340, #121322);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .loading-container i {
            font-size: 2rem;
            margin-bottom: 16px;
        }

        .skeleton-shimmer {
            background: linear-gradient(90deg, 
                rgba(255, 255, 255, 0.05) 25%, 
                rgba(255, 255, 255, 0.1) 50%, 
                rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-transaction {
            height: 72px;
            margin-bottom: 1px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(34, 197, 94, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 1.7s;
            animation-fill-mode: forwards;
        }
        @keyframes toastSlideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to   { opacity: 1; transform: translate(-50%, 0); }
        }
        @keyframes toastFadeOut {
            from { opacity: 1; }
            to   { opacity: 0; }
        }

        /* small bottom loader */
        .infinite-scroll-loader {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            color: #9ca3af;
            background: transparent;
        }
        .infinite-scroll-loader i {
            font-size: 1.5rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Header – exactly like wallet.html (back + centered logo) -->
    <div class="header-bar">
        <button class="back-btn" id="backButton">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="centered-logo-inline-container">
            <div class="app-logo-header">
                <img id="appLogo" src="http://elitepros.wuaze.com/IMG-20260106-WA0000.jpg" alt="ElitePros" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <div class="centered-logo-inline-label">All Transactions</div>
        </div>
        <div style="width:44px;"></div>
    </div>

    <!-- main container -->
    <div class="transactions-wrapper">
        <div id="transactionsContainer">
            <!-- loading skeleton (first load) -->
            <div id="loadingSkeleton" class="transactions-list">
                <div class="skeleton-shimmer skeleton-transaction"></div>
                <div class="skeleton-shimmer skeleton-transaction"></div>
                <div class="skeleton-shimmer skeleton-transaction"></div>
                <div class="skeleton-shimmer skeleton-transaction"></div>
                <div class="skeleton-shimmer skeleton-transaction"></div>
                <div class="skeleton-shimmer skeleton-transaction"></div>
                <div class="skeleton-shimmer skeleton-transaction"></div>
                <div class="skeleton-shimmer skeleton-transaction"></div>
                <div class="skeleton-shimmer skeleton-transaction"></div>
                <div class="skeleton-shimmer skeleton-transaction"></div>
            </div>

            <!-- dynamic content will replace this -->
            <div id="transactionsContent" style="display: none;"></div>
            <!-- bottom loader for infinite scroll (hidden by default) -->
            <div id="infiniteLoader" class="infinite-scroll-loader" style="display: none;">
                <i class="fa-solid fa-circle-notch"></i>
                <span style="margin-left: 8px;">Loading more...</span>
            </div>
        </div>
    </div>

    <!-- hidden error fallback container -->
    <div id="errorContainer" class="error-message" style="display: none;">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="errorText"></span>
    </div>

    <script>
        // -------------------- Firebase Auth only --------------------
        const firebaseConfig = {
            apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
            authDomain: "eliteprosofficial.firebaseapp.com",
            databaseURL: "https://eliteprosofficial-default-rtdb.firebaseio.com",
            projectId: "eliteprosofficial",
            storageBucket: "eliteprosofficial.firebasestorage.app",
            messagingSenderId: "646561207100",
            appId: "1:646561207100:web:47de7b648695367e208439",
            measurementId: "G-ZN5VNFCSEL"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // DOM elements
        const backBtn = document.getElementById('backButton');
        const loadingSkeleton = document.getElementById('loadingSkeleton');
        const transactionsContent = document.getElementById('transactionsContent');
        const errorContainer = document.getElementById('errorContainer');
        const errorText = document.getElementById('errorText');
        const infiniteLoader = document.getElementById('infiniteLoader');

        // ---------- Pagination state ----------
        let transactionsCache = [];            // all fetched transactions
        let nextCursor = null;
        let hasMore = true;
        let isLoadingMore = false;
        let currentUser = null;

        // Helper: show error (and hide loading)
        function showError(msg) {
            loadingSkeleton.style.display = 'none';
            transactionsContent.style.display = 'none';
            errorContainer.style.display = 'flex';
            errorText.innerText = msg;
        }

        // Helper: toast (copied etc)
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-check-circle"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Copy to clipboard + visual feedback (global function for onclick)
        window.copyTransactionId = function(id, event) {
            event.stopPropagation();
            const btn = event.currentTarget;
            const icon = btn.querySelector('i');
            btn.classList.add('copied');
            icon.className = 'fas fa-check';

            navigator.clipboard.writeText(id).then(() => {
                showToast('Copied to clipboard!');
            }).catch(() => {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = id;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Copied to clipboard!');
            });

            setTimeout(() => {
                btn.classList.remove('copied');
                icon.className = 'fas fa-copy';
            }, 1500);
        };

        // view transaction placeholder (can be extended)
        window.viewTransaction = function(id) {
            console.log('view transaction', id);
            // you could open a modal later
        };

        // ----- style helpers (copy-pasted from wallet for consistency) -----
        function getTransactionIcon(type) {
            const t = (type || '').toLowerCase();
            if (t.includes('deposit')) return { icon: 'fa-piggy-bank', class: 'deposit' };
            if (t.includes('withdraw')) return { icon: 'fa-hand-holding-dollar', class: 'withdraw' };
            if (t.includes('winning') || t.includes('prize') || t.includes('match')) return { icon: 'fa-trophy', class: 'winning' };
            if (t.includes('fee') || t.includes('entry')) return { icon: 'fa-coins', class: 'fee' };
            if (t.includes('refund')) return { icon: 'fa-arrow-rotate-left', class: 'refund' };
            if (t.includes('admin') || t.includes('manual')) return { icon: 'fa-user-shield', class: 'admin' };
            return { icon: 'fa-exchange-alt', class: 'deposit' };
        }

        function getStatusIcon(status) {
            const s = (status || 'success').toLowerCase();
            if (s.includes('fail') || s.includes('reject')) return { icon: 'fa-xmark', class: 'status-failed' };
            if (s.includes('pending') || s.includes('process')) return { icon: 'fa-clock', class: 'status-pending' };
            return { icon: 'fa-check', class: 'status-success' };
        }

        function formatTime(timestamp) {
            if (!timestamp) return "Recently";
            let date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            if (diffMins < 1) return "Just now";
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // Render the full transaction list from cache (no replace, always append)
        function renderAllTransactions() {
            if (!transactionsCache || transactionsCache.length === 0) {
                transactionsContent.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-receipt"></i>
                        <div>No transactions yet</div>
                        <div style="font-size: 12px; margin-top: 8px; opacity: 0.7;">Deposit or play matches to see them here</div>
                    </div>
                `;
                return;
            }

            let html = '<div class="transactions-list">';
            transactionsCache.forEach(t => {
                const amount = parseFloat(t.amount || 0);
                const isPositive = amount >= 0;
                const amountDisplay = `${isPositive ? '+' : '-'}₹${Math.abs(amount).toLocaleString()}`;
                const icon = getTransactionIcon(t.type || t.category);
                const statusIcon = getStatusIcon(t.status);
                const title = t.description || t.reason || t.type || t.category || 'Transaction';
                const timeAgo = formatTime(t.timestamp || t.date || t.createdAt);
                const displayId = t.id || t.txnId || 'N/A';
                const shortDisplayId = displayId.substring(0, 10) + (displayId.length > 10 ? '…' : '');

                html += `
                    <div class="transaction-item" onclick="viewTransaction('${displayId}')">
                        <div class="transaction-icon-container ${icon.class}">
                            <i class="fa-solid ${icon.icon}"></i>
                        </div>
                        <div class="transaction-details">
                            <div class="transaction-header">
                                <div class="transaction-title" title="${title}">${title}</div>
                                <div class="transaction-amount ${isPositive ? 'amount-positive' : 'amount-negative'}">${amountDisplay}</div>
                            </div>
                            <div class="transaction-footer">
                                <div class="transaction-id" title="${displayId}">
                                    ID: ${shortDisplayId}
                                    <button class="copy-btn" onclick="copyTransactionId('${displayId}', event)">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                                <div class="transaction-time">${timeAgo}</div>
                            </div>
                        </div>
                        <div class="transaction-status ${statusIcon.class}" title="${t.status || 'Success'}">
                            <i class="fa-solid ${statusIcon.icon}"></i>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            transactionsContent.innerHTML = html;
        }

        // fetch transactions (first page or next)
        async function fetchTransactionsPage(cursor = null) {
            if (!currentUser) return null;
            try {
                const idToken = await currentUser.getIdToken();
                let url = 'https://elitepros-backend.onrender.com/api/wallet/transactions?limit=10';
                if (cursor) {
                    url += `&lastTimestamp=${cursor}`;
                }
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${idToken}` }
                });

                if (response.status === 401) {
                    window.location.href = 'login.html';
                    return null;
                }
                if (!response.ok) {
                    throw new Error(`API error ${response.status}`);
                }
                const data = await response.json();
                // expected shape: { transactions: [], hasMore: boolean, nextCursor: number }
                return {
                    transactions: data.transactions || [],
                    hasMore: data.hasMore || false,
                    nextCursor: data.nextCursor || null
                };
            } catch (err) {
                console.error('Fetch page error:', err);
                showError('Failed to load more transactions.');
                return null;
            }
        }

        // initial load (reset state)
        async function loadInitialTransactions(user) {
            currentUser = user;
            // reset state
            transactionsCache = [];
            nextCursor = null;
            hasMore = true;

            // show skeleton, hide content, hide error
            loadingSkeleton.style.display = 'block';
            transactionsContent.style.display = 'none';
            errorContainer.style.display = 'none';
            infiniteLoader.style.display = 'none';

            const result = await fetchTransactionsPage(null);
            if (!result) return;

            transactionsCache = result.transactions || [];
            nextCursor = result.nextCursor;
            hasMore = result.hasMore;

            // render
            renderAllTransactions();
            loadingSkeleton.style.display = 'none';
            transactionsContent.style.display = 'block';

            // attach scroll listener for infinite scroll
            attachInfiniteScroll();
        }

        // load next page and append
        async function loadMoreTransactions() {
            if (!hasMore || isLoadingMore || !currentUser) return;
            isLoadingMore = true;
            infiniteLoader.style.display = 'flex';

            const result = await fetchTransactionsPage(nextCursor);
            if (result) {
                const newTransactions = result.transactions || [];
                if (newTransactions.length > 0) {
                    transactionsCache = [...transactionsCache, ...newTransactions];
                    nextCursor = result.nextCursor;
                    hasMore = result.hasMore;
                    // re-render full list (append)
                    renderAllTransactions();
                } else {
                    hasMore = false; // no transactions, stop
                }
            } else {
                hasMore = false; // error, stop trying
            }

            isLoadingMore = false;
            infiniteLoader.style.display = 'none';
        }

        // Infinite scroll detection
        function attachInfiniteScroll() {
            // remove previous listener to avoid duplicates
            window.removeEventListener('scroll', scrollHandler);
            window.addEventListener('scroll', scrollHandler);
        }

        function scrollHandler() {
            if (!hasMore || isLoadingMore) return;
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;
            const documentHeight = document.documentElement.scrollHeight;
            // when user is within 200px of bottom
            if (scrollY + windowHeight >= documentHeight - 200) {
                loadMoreTransactions();
            }
        }

        // back navigation (same as wallet)
        let cameFromDepositOrWithdraw = false;
        function checkReferrer() {
            const ref = document.referrer;
            if (ref.includes('deposit.html') || ref.includes('withdraw.html')) {
                cameFromDepositOrWithdraw = true;
            }
        }
        function handleBack() {
            if (cameFromDepositOrWithdraw) {
                window.location.href = 'home.html';
            } else {
                if (window.history.length > 1) window.history.back();
                else window.location.href = 'home.html';
            }
        }
        backBtn.addEventListener('click', handleBack);

        // on load, check referrer and auth
        document.addEventListener('DOMContentLoaded', () => {
            checkReferrer();

            auth.onAuthStateChanged(user => {
                if (user) {
                    loadInitialTransactions(user);
                } else {
                    showError('You need to be logged in. Redirecting...');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                }
            });
        });

        // also expose viewTransaction globally (in case inline onclick used)
        window.viewTransaction = window.viewTransaction || function(id){ console.log('view tx', id); };
    </script>
</body>
</html>
