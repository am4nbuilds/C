<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - ElitePros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
   <style>
    :root {
        --bg-dark: #0b1020;
        --card-bg: #1f2340;
        --card-dark: #121322;
        --accent: #3f3ef2;
        --muted: #9aa3b2;
        --success: #10b981;
        --warning: #f59e0b;
        --deposit-color: #f59e0b;
        --winnings-color: #10b981;
        --balance-color: #3f3ef2;
    }
    
    body {
        background: var(--bg-dark);
        color: white;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        margin: 0;
        padding: 0;
        padding-bottom: 20px;
    }
    
    /* Header - Like Wallet Page */
    .header-bar {
        background: var(--card-dark);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        position: relative;
    }

    .centered-logo-inline-container {
        display: flex;
        align-items: center;
        gap: 12px;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }

    .app-logo-header {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid rgba(99, 102, 241, 0.5);
        flex-shrink: 0;
    }

    .centered-logo-inline-label {
        font-weight: 800;
        font-size: 18px;
        background: linear-gradient(135deg, #fff, #a5b4fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        white-space: nowrap;
    }

    .back-btn {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: white;
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }

    .back-btn:hover {
        background: rgba(255, 255, 255, 0.15);
    }
    
    /* Messages */
    .message-container {
        padding: 0 16px;
        margin-top: 12px;
    }
    
    .error-message,
    .success-message {
        display: none;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 14px;
        margin-bottom: 12px;
        animation: slideIn 0.3s ease;
    }
    
    .error-message {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
    }
    
    .success-message {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #4ade80;
    }
    
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    /* Deposit Section */
    .deposit-section {
        padding: 16px;
    }
    
    .deposit-card {
        background: linear-gradient(135deg, var(--card-bg), var(--card-dark));
        border-radius: 20px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .deposit-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
    }
    
    .deposit-icon {
        width: 60px;
        height: 60px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--warning), #d97706);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
    }
    
    .deposit-header-text {
        flex: 1;
    }
    
    .deposit-title {
        font-weight: 800;
        font-size: 22px;
        margin-bottom: 4px;
    }
    
    .deposit-subtitle {
        color: var(--muted);
        font-size: 14px;
    }
    
    /* Deposit Amounts Grid */
    .deposit-amounts-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 24px;
    }
    
    .deposit-amount-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 20px 12px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        user-select: none;
    }
    
    .deposit-amount-card:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-2px);
    }
    
    .deposit-amount-card.selected {
        background: linear-gradient(135deg, var(--warning), #d97706);
        border-color: transparent;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(245, 158, 11, 0.3);
    }
    
    .amount-display {
        font-weight: 800;
        font-size: 24px;
        margin-bottom: 6px;
    }
    
    .amount-bonus {
        font-size: 12px;
        color: var(--muted);
    }
    
    .deposit-amount-card.selected .amount-bonus {
        color: white;
        opacity: 0.9;
    }
    
    /* Skeleton Loading */
    .skeleton-shimmer {
        background: linear-gradient(90deg, 
            rgba(255, 255, 255, 0.05) 25%, 
            rgba(255, 255, 255, 0.1) 50%, 
            rgba(255, 255, 255, 0.05) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 14px;
    }
    
    .skeleton-deposit-amount {
        height: 100px;
    }
    
    @keyframes shimmer {
        0% {
            background-position: -200% 0;
        }
        100% {
            background-position: 200% 0;
        }
    }
    
    /* Deposit Button */
    .deposit-btn-container {
        padding: 16px;
        padding-bottom: 30px;
    }
    
    .deposit-btn {
        width: 100%;
        background: linear-gradient(135deg, var(--accent), #6366f1);
        border: none;
        border-radius: 14px;
        padding: 20px;
        color: white;
        font-weight: 700;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .deposit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
    }
    
    .deposit-btn:not(:disabled):hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(63, 62, 242, 0.3);
    }
    
    .deposit-btn.glow {
        animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
        0%, 100% {
            box-shadow: 0 0 20px rgba(63, 62, 242, 0.5);
        }
        50% {
            box-shadow: 0 0 30px rgba(63, 62, 242, 0.8);
        }
    }
    
    /* Payment Modal */
    .payment-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        display: none;
    }

    .payment-modal-content {
        background: linear-gradient(135deg, #1f2340, #121322);
        border-radius: 20px;
        padding: 24px;
        width: 90%;
        max-width: 400px;
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .modal-title {
        font-weight: 800;
        font-size: 20px;
        color: white;
    }

    .close-modal {
        background: none;
        border: none;
        color: #9ca3af;
        font-size: 1.5rem;
        cursor: pointer;
        transition: color 0.3s ease;
    }

    .close-modal:hover {
        color: white;
    }

    .payment-amount-display {
        text-align: center;
        margin-bottom: 24px;
    }

    .payment-label {
        font-size: 14px;
        color: #9ca3af;
        margin-bottom: 8px;
    }

    .payment-value {
        font-weight: 800;
        font-size: 32px;
        color: #f59e0b;
    }

    .payment-instructions {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 24px;
    }

    .instruction-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        font-size: 14px;
        color: #e5e7eb;
    }

    .instruction-item:last-child {
        margin-bottom: 0;
    }

    .instruction-number {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #f59e0b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
    }

    .payment-status {
        text-align: center;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        display: none;
    }

    .payment-status.success {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .payment-status.error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .payment-status i {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    .payment-status.success i {
        color: #22c55e;
    }

    .payment-status.error i {
        color: #ef4444;
    }

    .modal-actions {
        display: flex;
        gap: 12px;
    }

    .modal-btn {
        flex: 1;
        padding: 14px;
        border-radius: 12px;
        border: none;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .modal-btn.primary {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: white;
    }

    .modal-btn.primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(245, 158, 11, 0.3);
    }
</style>
</head>

<body>
    <!-- Header - Like Wallet Page -->
    <div class="header-bar">
        <button class="back-btn" id="backButton">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        
        <!-- Centered Logo + Label Container (Inline) -->
        <div class="centered-logo-inline-container">
            <div class="app-logo-header">
                <img id="appLogo" src="http://elitepros.wuaze.com/IMG-20250106-WA0000.jpg" alt="ElitePros" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <div class="centered-logo-inline-label">Deposit</div>
        </div>
        
        <!-- Empty div for spacing -->
        <div style="width:44px;"></div>
    </div>

    <!-- Messages -->
    <div class="message-container">
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText"></span>
        </div>
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>
    </div>

    <!-- Deposit Card -->
    <div class="deposit-section">
        <div class="deposit-card">
            <div class="deposit-header">
                <div class="deposit-icon">
                    <i class="fa-solid fa-piggy-bank"></i>
                </div>
                <div class="deposit-header-text">
                    <div class="deposit-title">Select Deposit Amount</div>
                    <div class="deposit-subtitle">Choose amount and complete payment</div>
                </div>
            </div>
            
            <!-- Deposit Amounts Grid -->
            <div id="depositAmountsLoading">
                <div class="deposit-amounts-grid">
                    <div class="skeleton-shimmer skeleton-deposit-amount"></div>
                    <div class="skeleton-shimmer skeleton-deposit-amount"></div>
                    <div class="skeleton-shimmer skeleton-deposit-amount"></div>
                    <div class="skeleton-shimmer skeleton-deposit-amount"></div>
                </div>
            </div>
            
            <div id="depositAmountsContent" style="display: none;">
                <div id="depositAmountsGrid" class="deposit-amounts-grid">
                    <!-- Deposit amounts will be loaded from backend API -->
                </div>
            </div>
        </div>
    </div>

    <!-- Deposit Button -->
    <div class="deposit-btn-container">
        <button id="depositBtn" class="deposit-btn" disabled>
            <i class="fa-solid fa-circle-arrow-right"></i>
            <span>Select Amount</span>
        </button>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="payment-modal">
        <div class="payment-modal-content">
            <div class="modal-header">
                <div class="modal-title">Complete Payment</div>
                <button class="close-modal" id="closeModal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="payment-amount-display">
                <div class="payment-label">Amount to Pay</div>
                <div id="paymentAmountValue" class="payment-value">₹0</div>
            </div>
            
            <div class="payment-instructions">
                <div class="instruction-item">
                    <div class="instruction-number">1</div>
                    <div>Click "Pay Now" to open payment gateway</div>
                </div>
                <div class="instruction-item">
                    <div class="instruction-number">2</div>
                    <div>Complete payment in the new window</div>
                </div>
                <div class="instruction-item">
                    <div class="instruction-number">3</div>
                    <div>Return here after payment completion</div>
                </div>
            </div>
            
            <div id="paymentStatus" class="payment-status">
                <!-- Payment status will be shown here -->
            </div>
            
            <div class="modal-actions">
                <button id="payNowBtn" class="modal-btn primary">
                    <i class="fa-solid fa-credit-card"></i> Pay Now
                </button>
            </div>
        </div>
    </div>

<script>
/* =====================================
   FIREBASE INITIALIZATION (AUTH ONLY)
   ===================================== */
const firebaseConfig = {
  apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
  authDomain: "eliteprosofficial.firebaseapp.com",
  databaseURL: "https://eliteprosofficial-default-rtdb.firebaseio.com",
  projectId: "eliteprosofficial",
  storageBucket: "eliteprosofficial.firebasestorage.app",
  messagingSenderId: "646561207100",
  appId: "1:646561207100:web:47de7b648695367e208439"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

/* =====================================
   GLOBAL STATE
   ===================================== */
let currentUser = null;
let currentUserIdToken = null;
let selectedAmount = 0;
let currentOrderId = null;

/* =====================================
   AUTH CHECK
   ===================================== */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  currentUser = user;
  
  // Get ID token for authenticated API calls
  try {
    currentUserIdToken = await user.getIdToken();
  } catch (error) {
    console.error("Error getting ID token:", error);
    showErrorMessage("Authentication error. Please refresh the page.");
    return;
  }
  
  // Load deposit amounts from backend API
  await loadDepositAmounts();
  
});

/* =====================================
   LOAD DEPOSIT AMOUNTS FROM BACKEND API
   ===================================== */
async function loadDepositAmounts() {
  try {
    if (!currentUserIdToken) {
      throw new Error("No authentication token");
    }

    // Fetch deposit amounts from backend API
    const response = await fetch("https://elitepros-backend.onrender.com/api/deposit-options", {
      method: "GET",
      headers: { 
        "Authorization": `Bearer ${currentUserIdToken}`,
        "Content-Type": "application/json"
      }
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }

    const data = await response.json();
    
    // Validate response - expect array of amounts
    let amounts = [];
    if (Array.isArray(data)) {
      amounts = data.filter(amount => typeof amount === 'number' && amount > 0);
    } else if (data.amounts && Array.isArray(data.amounts)) {
      amounts = data.amounts.filter(amount => typeof amount === 'number' && amount > 0);
    } else if (data.data && Array.isArray(data.data)) {
      amounts = data.data.filter(amount => typeof amount === 'number' && amount > 0);
    }

    // Sort in ascending order
    amounts.sort((a, b) => a - b);

    if (amounts.length === 0) {
      console.log("No amounts from API, using defaults");
      showDefaultDepositAmounts();
      return;
    }

    // Display the deposit amounts
    displayDepositAmounts(amounts);

  } catch (error) {
    console.error("Error loading deposit amounts from API:", error);
    showDefaultDepositAmounts();
  }
}

/* =====================================
   DISPLAY DEPOSIT AMOUNTS
   ===================================== */
function displayDepositAmounts(amounts) {
  const container = document.getElementById('depositAmountsGrid');
  container.innerHTML = '';
  
  amounts.forEach((amount) => {
    const amountCard = document.createElement('div');
    amountCard.className = 'deposit-amount-card';
    amountCard.dataset.amount = amount;
    amountCard.onclick = () => selectAmount(amount);
    
    amountCard.innerHTML = `
      <div class="amount-display">₹${amount}</div>
      <div class="amount-bonus">Deposit Amount</div>
    `;
    
    container.appendChild(amountCard);
  });
  
  // Show content and hide loading
  document.getElementById('depositAmountsLoading').style.display = 'none';
  document.getElementById('depositAmountsContent').style.display = 'block';
}

/* =====================================
   DEFAULT DEPOSIT AMOUNTS (FALLBACK)
   ===================================== */
function showDefaultDepositAmounts() {
  const defaultAmounts = [100, 250, 500, 1000];
  displayDepositAmounts(defaultAmounts);
}


/* =====================================
   AMOUNT SELECTION
   ===================================== */
function selectAmount(amount) {
  selectedAmount = amount;
  
  // Update UI for selected amount
  document.querySelectorAll(".deposit-amount-card").forEach(card => {
    const cardAmount = parseInt(card.dataset.amount);
    card.classList.toggle("selected", cardAmount === amount);
  });

  updateDepositButton();
}

function updateDepositButton() {
  const btn = document.getElementById("depositBtn");
  btn.disabled = false;
  btn.classList.add("glow");
  btn.innerHTML = `<i class="fa-solid fa-credit-card"></i> Pay ₹${selectedAmount}`;
}

/* =====================================
   EVENT LISTENERS
   ===================================== */
document.getElementById("backButton").onclick = () => {
  window.history.back();
};

/* =====================================
   SHOW PAYMENT MODAL
   ===================================== */
document.getElementById("depositBtn").onclick = () => {
  if (!selectedAmount) {
    alert("Please select an amount first");
    return;
  }
  document.getElementById("paymentAmountValue").innerText = `₹${selectedAmount}`;
  document.getElementById("paymentModal").style.display = "flex";
  
  // Reset modal state
  document.getElementById("paymentStatus").style.display = "none";
};

/* =====================================
   INITIATE PAYMENT - OPTIMIZED FOR SPEED
   ===================================== */
document.getElementById("payNowBtn").onclick = async () => {
  if (!selectedAmount || !currentUserIdToken) return;

  const btn = document.getElementById("payNowBtn");
  const originalBtnHTML = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

  try {
    console.log("Creating payment for amount:", selectedAmount);
    
    // Use AbortController for timeout
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
    
    // Call Node.js backend /create-payment endpoint with authentication
    const response = await fetch("https://elitepros-backend.onrender.com/create-payment", {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "Authorization": `Bearer ${currentUserIdToken}`
      },
      body: JSON.stringify({
        amount: selectedAmount,
        timestamp: Date.now()
      }),
      signal: controller.signal
    });
    
    clearTimeout(timeoutId);
    
    console.log("Backend response status:", response.status);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    
    const data = await response.json();
    console.log("Backend response:", data);
    
    if (!data.payment_url || !data.order_id) {
      throw new Error("Invalid response from payment server");
    }
    
    // Store order_id in localStorage for payment verification
    localStorage.setItem('last_deposit_order_id', data.order_id);
    currentOrderId = data.order_id;
    
    console.log("Payment URL received, redirecting immediately...");
    
    // Immediate redirect without delay
    document.getElementById("paymentModal").style.display = "none";
    
    // Redirect to payment gateway
    window.location.href = data.payment_url;
    
  } catch (error) {
    console.error("Payment creation error:", error);
    
    // Reset button
    btn.disabled = false;
    btn.innerHTML = originalBtnHTML;
    
    // Show error in modal
    const statusDiv = document.getElementById("paymentStatus");
    statusDiv.className = "payment-status error";
    let errorMessage = error.message;
    
    if (error.name === 'AbortError') {
      errorMessage = "Request timeout. Please check your internet connection and try again.";
    }
    
    statusDiv.innerHTML = `
      <i class="fas fa-times-circle"></i>
      <div style="font-weight: bold; margin-bottom: 5px;">Payment Failed</div>
      <div>${errorMessage}</div>
    `;
    statusDiv.style.display = "block";
    
    // Also show in message container
    showErrorMessage(`Payment failed: ${errorMessage}`);
  }
};

/* =====================================
   CLOSE MODAL FUNCTION
   ===================================== */
document.getElementById("closeModal").onclick = () => {
  document.getElementById("paymentModal").style.display = "none";
  
  // Reset payment button
  const btn = document.getElementById("payNowBtn");
  btn.disabled = false;
  btn.innerHTML = `<i class="fa-solid fa-credit-card"></i> Pay Now`;
};
</script>
</body>
</html>
