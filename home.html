<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElitePros - Tournament Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Firebase Auth only (NO database) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        /* ====================================================================
           COMMON STYLES (Shared across all sections)
        ==================================================================== */
        :root {
            --bg-dark: #0b1020;
            --card-bg: #1f2340;
            --card-dark: #121322;
            --accent: #3f3ef2;
            --muted: #9aa3b2;
            --primary-green: #4ade80;
            --header-bg: #111827;
            --wallet-bg: #1f2937;
            --joined-color: #0d9488;
            --first-place: #ff4757;
            --second-place: #2ed573;
            --third-place: #1e90ff;
            --top10-border: #374151;
        }
        
        body {
            background: var(--bg-dark);
            color: white;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            margin: 0;
            padding: 0;
            padding-bottom: 70px;
            overflow-x: hidden;
        }
        
        .page-section {
            display: none;
            width: 100%;
            min-height: calc(100vh - 70px);
        }
        
        .page-section.active {
            display: block;
        }
        
        .header-bar {
            background: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .app-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(99, 102, 241, 0.5);
            flex-shrink: 0;
        }
        
        .welcome-message {
            text-align: center;
            flex: 1;
            margin: 0 10px;
        }
        
        .welcome-text {
            font-weight: 600;
            font-size: 14px;
            color: #9ca3af;
        }
        
        .username {
            font-weight: 700;
            font-size: 16px;
            min-height: 24px; /* maintain space for skeleton */
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Wallet Button */
        .wallet-btn {
            background: linear-gradient(135deg, var(--wallet-bg), #111827);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            min-width: 100px;
            justify-content: center;
        }
        
        .wallet-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }
        
        .wallet-balance {
            margin-left: 8px;
            font-weight: 800;
            font-size: 16px;
            color: #facc15;
            text-shadow: 0 2px 4px rgba(250, 204, 21, 0.3);
        }
        
        .wallet-btn i {
            font-size: 18px;
        }
        
        .login-btn {
            background: linear-gradient(135deg, #3f3ef2, #6366f1);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #111827, #1f2937);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #9ca3af;
            text-decoration: none;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 12px;
            position: relative;
            min-width: 70px;
        }
        
        .nav-item:hover {
            color: #a5b4fc;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .nav-item.active {
            color: #ffffff;
            background: linear-gradient(135deg, #3f3ef2, #6366f1);
            box-shadow: 0 8px 25px rgba(63,62,242,0.25);
            transform: translateY(-15px);
        }
        
        .nav-item i {
            font-size: 1.25rem;
            margin-bottom: 4px;
        }
        
        .nav-item span {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        /* Skeleton Loaders - INLINE shimmer for text/bars */
        .skeleton-shimmer {
            background: linear-gradient(90deg, 
                rgba(255, 255, 255, 0.05) 25%, 
                rgba(255, 255, 255, 0.15) 50%, 
                rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Inline skeleton for username / balance / announcement text */
        .skeleton-text {
            display: inline-block;
            width: 80px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        .skeleton-balance {
            width: 50px;
            height: 20px;
            margin-left: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        .skeleton-announcement-text {
            width: 220px;
            height: 18px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        /* Banner skeleton (image placeholder) */
        .banner-skeleton {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #1f2340, #2a2f4a, #1f2340);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 18px;
            z-index: 2;
        }

        /* Game mode skeleton card */
        .game-mode-skeleton {
            border-radius: 12px;
            aspect-ratio: 16/9;
            background: linear-gradient(90deg, #1f2340, #2a2f4a, #1f2340);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            width: 100%;
        }
        
        .error-message {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 12px 16px;
            text-align: center;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 10px rgba(239,68,68,0.3);
        }

        /* Ban Modal */
        .ban-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 16, 32, 0.98);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
        }
        
        .ban-modal-content {
            background: linear-gradient(135deg, #1a1f3a, #0f1328);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 2px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 20px 60px rgba(239, 68, 68, 0.2);
            animation: modalAppear 0.5s ease-out;
        }
        
        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .ban-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 2.5rem;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
        }
        
        .ban-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ef4444, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* HOME SPECIFIC STYLES */
        .content-container {
            padding-bottom: 20px;
        }
        
        .announcement-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 14px 16px;
            margin: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            cursor: default;
        }
        
        .announcement-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3f3ef2, #6366f1);
            border-radius: 10px;
            font-size: 1.2rem;
            flex-shrink: 0;
            color: white;
        }
        
        .announcement-text {
            flex: 1;
            font-weight: 600;
            color: #e5e7eb;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-height: 20px;
            display: flex;
            align-items: center;
        }
        
        .banner-container {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            margin: 0 16px 16px;
            box-shadow: 0 12px 35px rgba(2,6,23,0.8);
            height: 0;
            padding-top: 42.86%;
            width: calc(100% - 32px);
            background: #1a1f3a; /* fallback */
        }
        
        .banner-slides {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.5s ease-in-out;
            z-index: 3;
        }
        
        .banner-slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 18px;
        }
        
        .banner-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .banner-dots {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 10;
        }
        
        .banner-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .banner-dot.active {
            background: white;
            transform: scale(1.2);
        }
        
        .features-container {
            background: linear-gradient(135deg, #1f2340 0%, #121322 100%);
            border-radius: 16px;
            margin: 0 16px 20px;
            padding: 16px 12px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 30px rgba(2,6,23,0.7);
        }
        
        .features-section {
            display: flex;
            justify-content: space-around;
            gap: 8px;
        }
        
        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 100px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 16px;
            padding: 12px 8px;
            border: 1.5px solid transparent;
            background: linear-gradient(135deg, var(--card-bg) 0%, var(--card-dark) 100%) padding-box,
                        linear-gradient(135deg, rgba(63, 62, 242, 0.3), rgba(99, 102, 241, 0.2)) border-box;
            box-shadow: 0 4px 20px rgba(2, 6, 23, 0.5);
        }
        
        .feature-item:hover {
            transform: translateY(-5px);
        }
        
        .feature-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .feature-matches .feature-circle {
            background: linear-gradient(135deg, #3f3ef2, #6366f1);
        }
        
        .feature-wallet .feature-circle {
            background: linear-gradient(135deg, #047857, #059669, #10b981);
        }
        
        .feature-contact .feature-circle {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
        }
        
        .feature-icon {
            color: white !important;
            font-size: 1.4rem;
        }
        
        .feature-title {
            font-weight: 700;
            font-size: 12px;
            color: #e5e7eb;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        .section-title {
            font-weight: 800;
            font-size: 18px;
            margin: 20px 16px 12px;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 16px;
        }
        
        /* hide original full-page skeleton */
        #homeSkeletonContainer {
            display: none !important;
        }

        /* fade transition for content replacement */
        .fade-replace {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body>
    <!-- Ban Modal -->
    <div id="banModal" class="ban-modal" style="display:none;">
        <div class="ban-modal-content">
            <div class="ban-icon"><i class="fas fa-ban"></i></div>
            <h2 class="ban-title">Account Suspended</h2>
            <p class="ban-subtitle" id="banMessage">
                Your account has been suspended due to violation of our platform policies. If you believe this is an error, please contact support.
            </p>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 25px;">
                <button class="ban-button" id="banContactBtn" style="background: linear-gradient(135deg, #3f3ef2, #6366f1); border: none; color: white; padding: 12px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px;">
                    <i class="fas fa-headset"></i> Contact Support
                </button>
                <button class="ban-button" id="banRedirectBtn" style="background: linear-gradient(135deg, #ef4444, #dc2626); border: none; color: white; padding: 12px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px;">
                    <i class="fas fa-sign-out-alt"></i> Back to Login
                </button>
            </div>
        </div>
    </div>

    <!-- Global Error Message -->
    <div id="errorMessage" class="error-message" style="display:none;">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="errorText"></span>
    </div>

    <!-- ==================== HOME SECTION (always visible) ==================== -->
    <section id="homeSection" class="page-section active">
        <div class="header-bar">
            <div class="app-logo">
                <img id="appLogo" src="/logo.png" alt="ElitePros" loading="eager">
            </div>

            <div class="welcome-message">
                <div class="welcome-text">Welcome Back</div>
                <div class="username" id="homeUsername">
                    <!-- skeleton placeholder (inline) -->
                    <span class="skeleton-text skeleton-shimmer"></span>
                </div>
            </div>

            <div id="homeWalletContainer" class="wallet-btn" onclick="redirectToWallet()">
                <i class="fa-solid fa-wallet text-yellow-400"></i>
                <span id="homeWalletBalance" class="wallet-balance">
                    <span class="skeleton-balance skeleton-shimmer"></span>
                </span>
            </div>
            
            <!-- login prompt hidden by default because we expect auth, but kept for fallback -->
            <button id="loginPrompt" class="login-btn" onclick="redirectToLogin()" style="display: none;">
                <i class="fas fa-sign-in-alt"></i> Log In
            </button>
        </div>

        <!-- Home content is ALWAYS visible, only dynamic parts get skeleton inside -->
        <div id="homeMainContent" class="content-container">
            <!-- Announcement box - icon always visible, text skeleton -->
            <div class="announcement-box" id="announcementBox">
                <i class="fa-solid fa-bullhorn announcement-icon"></i>
                <span id="announcementText" class="announcement-text">
                    <span class="skeleton-announcement-text skeleton-shimmer"></span>
                </span>
            </div>

            <!-- Banner container with immediate skeleton overlay -->
            <div class="banner-container" id="bannerContainer">
                <div class="banner-slides" id="bannerSlides"></div>
                <div class="banner-dots" id="bannerDots"></div>
                <!-- skeleton overlay (visible until banners load) -->
                <div class="banner-skeleton" id="bannerSkeleton"></div>
            </div>

            <!-- Features (static icons, always visible) -->
            <div class="features-container">
                <div class="features-section" id="featuresSection">
                    <div class="feature-item feature-matches" onclick="redirectToMyMatches()">
                        <div class="feature-circle"><i class="fa-solid fa-gamepad feature-icon"></i></div>
                        <div class="feature-title">My Matches</div>
                    </div>
                    <div class="feature-item feature-wallet" onclick="redirectToWallet()">
                        <div class="feature-circle"><i class="fa-solid fa-wallet feature-icon"></i></div>
                        <div class="feature-title">Wallet</div>
                    </div>
                    <div class="feature-item feature-contact" onclick="redirectToContact()">
                        <div class="feature-circle"><i class="fa-solid fa-headset feature-icon"></i></div>
                        <div class="feature-title">Contact Us</div>
                    </div>
                </div>
            </div>

            <!-- Game modes grid with 4 skeleton cards -->
            <div class="section-title">Game Modes</div>
            <div class="grid-container" id="gameModesGrid">
                <div class="game-mode-skeleton skeleton-shimmer"></div>
                <div class="game-mode-skeleton skeleton-shimmer"></div>
                <div class="game-mode-skeleton skeleton-shimmer"></div>
                <div class="game-mode-skeleton skeleton-shimmer"></div>
            </div>
        </div>
        
        <!-- old skeleton container disabled -->
        <div id="homeSkeletonContainer" style="display:none;"></div>
    </section>

    <!-- Account Section (lazy) ... -->
    <section id="accountSection" class="page-section">...</section>
    <section id="leaderboardSection" class="page-section">...</section>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">...</nav>

    <script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyC86fii3isDnSOof71h_18PdZehzCEFIFw",
        authDomain: "eliteprosofficial.firebaseapp.com",
        projectId: "eliteprosofficial",
        storageBucket: "eliteprosofficial.firebasestorage.app",
        messagingSenderId: "646561207100",
        appId: "1:646561207100:web:47de7b648695367e208439",
        measurementId: "G-ZN5VNFCSEL"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const API_BASE_URL = 'https://elitepros-backend.onrender.com';
    let currentUser = null;
    let bannerInterval = null;
    let currentBannerIndex = 0;
    let bannerCount = 0;

    // utility
    function showError(msg) {
        const el = document.getElementById('errorMessage');
        document.getElementById('errorText').innerText = msg;
        el.style.display = 'flex';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    function showBanModal() {
        document.getElementById('banModal').style.display = 'flex';
    }

    function redirectToLogin() {
        window.location.href = 'login.html';
    }

    async function fetchWithAuth(endpoint, options = {}) {
        const user = auth.currentUser;
        if (!user) { redirectToLogin(); return null; }
        try {
            const token = await user.getIdToken();
            const res = await fetch(`${API_BASE_URL}${endpoint}`, {
                ...options,
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }
            });
            if (res.status === 403) { showBanModal(); return { banned: true }; }
            if (res.status === 401) { redirectToLogin(); return null; }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (e) {
            showError('Network error');
            return null;
        }
    }

    // ========== HOME LOADING (after UI paints) ==========
    async function loadHomeData() {
        if (!auth.currentUser) {
            redirectToLogin();
            return;
        }

        const data = await fetchWithAuth('/api/home');
        if (!data) return;
        if (data.banned) { showBanModal(); return; }

        // Remove skeleton overlays & replace with real data with fade
        // Username
        const usernameEl = document.getElementById('homeUsername');
        usernameEl.innerHTML = data.user?.username || 'Player';
        usernameEl.classList.add('fade-replace');

        // Wallet
        const deposited = data.wallet?.deposited || 0;
        const winnings = data.wallet?.winnings || 0;
        const total = deposited + winnings;
        const balanceSpan = document.getElementById('homeWalletBalance');
        balanceSpan.innerText = `₹${total}`;
        balanceSpan.classList.add('fade-replace');

        // Announcement
        const annText = document.getElementById('announcementText');
        if (data.announcement && data.announcement.active) {
            annText.innerText = data.announcement.message;
        } else {
            annText.innerText = 'No announcements';
        }
        annText.classList.add('fade-replace');

        // Remove banner skeleton
        const bannerSkel = document.getElementById('bannerSkeleton');
        if (bannerSkel) bannerSkel.remove();

        // Render banners & game modes
        if (data.banners?.length) renderBanners(data.banners);
        if (data.gameModes?.length) renderGameModes(data.gameModes);

        // Hide login prompt if visible
        document.getElementById('loginPrompt').style.display = 'none';
    }

    function renderBanners(banners) {
        const container = document.getElementById('bannerSlides');
        const dots = document.getElementById('bannerDots');
        if (!container) return;

        bannerCount = banners.length;
        container.innerHTML = '';
        dots.innerHTML = '';

        banners.forEach((banner, idx) => {
            const slide = document.createElement('div');
            slide.className = 'banner-slide';
            const img = document.createElement('img');
            img.src = banner.src;
            img.alt = 'banner';
            img.loading = 'lazy';
            img.onclick = () => banner.link && window.location.assign(banner.link);
            slide.appendChild(img);
            container.appendChild(slide);

            const dot = document.createElement('div');
            dot.className = `banner-dot ${idx === 0 ? 'active' : ''}`;
            dot.onclick = () => goToBanner(idx);
            dots.appendChild(dot);
        });

        if (bannerCount > 1) startBannerRotation();
        updateBannerPosition();
    }

    function renderGameModes(modes) {
        const grid = document.getElementById('gameModesGrid');
        if (!grid) return;
        grid.innerHTML = ''; // replace skeleton cards
        modes.sort((a,b) => (a.order||999)-(b.order||999)).forEach(mode => {
            const card = document.createElement('div');
            card.className = 'game-mode-card';
            card.onclick = () => {
                localStorage.setItem('selectedGameMode', mode.name);
                window.location.href = 'tournaments.html';
            };
            card.innerHTML = `
                <div class="game-mode-img-container">
                    <img src="${mode.banner}" alt="${mode.name}" class="game-mode-img" loading="lazy">
                </div>
                <div class="game-mode-label">${mode.name}</div>
            `;
            grid.appendChild(card);
        });
        // fade effect
        grid.classList.add('fade-replace');
        setTimeout(() => grid.classList.remove('fade-replace'), 300);
    }

    function startBannerRotation() {
        if (bannerInterval) clearInterval(bannerInterval);
        bannerInterval = setInterval(() => {
            if (bannerCount === 0) return;
            currentBannerIndex = (currentBannerIndex + 1) % bannerCount;
            updateBannerPosition();
        }, 3000);
    }

    function updateBannerPosition() {
        const slides = document.getElementById('bannerSlides');
        const dots = document.querySelectorAll('.banner-dot');
        if (slides) slides.style.transform = `translateX(-${currentBannerIndex * 100}%)`;
        dots.forEach((d,i) => d.classList.toggle('active', i === currentBannerIndex));
    }

    function goToBanner(idx) {
        if (idx < 0 || idx >= bannerCount) return;
        currentBannerIndex = idx;
        updateBannerPosition();
        if (bannerInterval) { clearInterval(bannerInterval); startBannerRotation(); }
    }

    // other sections (minimized for brevity, same as original)
    window.redirectToMyMatches = () => { if (!auth.currentUser) redirectToLogin(); else window.location.href = 'tournaments.html?filter=myMatches'; };
    window.redirectToWallet = () => { if (!auth.currentUser) redirectToLogin(); else window.location.href = 'wallet.html'; };
    window.redirectToContact = () => { if (!auth.currentUser) redirectToLogin(); else window.location.href = 'contact.html'; };
    window.logoutUser = () => auth.signOut().then(() => window.location.href='login.html');

    // init: UI already visible, just start auth & data load after paint
    document.addEventListener('DOMContentLoaded', () => {
        // setup nav listeners (simplified)
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const section = item.dataset.section;
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                document.getElementById(section+'Section').classList.add('active');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                // lazy load other sections if needed (omitted for brevity, same logic as original)
            });
        });

        auth.onAuthStateChanged(user => {
            if (!user) { redirectToLogin(); return; }
            currentUser = user;
            // Use requestAnimationFrame to ensure UI paint before network
            requestAnimationFrame(() => loadHomeData());
        });

        // Ban modal buttons
        document.getElementById('banRedirectBtn').onclick = () => {
            auth.signOut().then(() => window.location.href='login.html');
        };
        document.getElementById('banContactBtn').onclick = () => {
            window.location.href='contact.html';
        };
    });

    window.addEventListener('beforeunload', () => { if (bannerInterval) clearInterval(bannerInterval); });
    </script>
</body>
</html>
